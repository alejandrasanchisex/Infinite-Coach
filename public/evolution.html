    <script>
        // Safe localStorage wrapper to prevent QuotaExceededError crashes
        (function() {
            try {
                const originalSetItem = localStorage.setItem;
                localStorage.setItem = function(key, value) {
                    try {
                        originalSetItem.call(localStorage, key, value);
                    } catch (err) {
                        console.warn("Storage write failed for key:", key, err);
                    }
                };
            } catch (e) {}
        })();
        // Force PWA cache bust / reload
        (function() {
            const CURRENT_VERSION = '688';
            window.APP_VERSION = CURRENT_VERSION;
            const savedVersion = localStorage.getItem('app_version');
            if (savedVersion && savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
                if ('caches' in window) {
                    caches.keys().then(keys => {
                        keys.forEach(k => caches.delete(k));
                    });
                }
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(regs) {
                        for (let r of regs) r.unregister();
                    }).finally(function() {
                        window.location.reload(true);
                    });
                } else {
                    window.location.reload(true);
                }
                return;
            } else if (savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
            }
            if (typeof window !== 'undefined' && window.location && navigator.onLine !== false) {
                const checkKey = '_lastVersionCheck';
                const lastCheck = sessionStorage.getItem(checkKey);
                if (!lastCheck || (Date.now() - parseInt(lastCheck) > 10000)) {
                    sessionStorage.setItem(checkKey, String(Date.now()));
                    fetch('/version.json?cb=' + Date.now())
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.version && data.version !== CURRENT_VERSION) {
                                localStorage.setItem('app_version', data.version);
                                if ('caches' in window) {
                                    caches.keys().then(keys => {
                                        keys.forEach(k => caches.delete(k));
                                    });
                                }
                                const params = new URLSearchParams(window.location.search);
                                params.set('v', data.version);
                                window.location.replace(window.location.pathname + '?' + params.toString());
                            }
                        })
                        .catch(() => {});
                }
            }
        })();
    </script>

        .gap-xs { gap: 6px; }
        
        /* PR Celebration Modal */
        .celebration-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); animation: fadeIn 0.4s ease; }
        .celebration-card { background: linear-gradient(135deg, #1e1e2d 0%, #0a0a0c 100%); border: 2px solid #FFD700; border-radius: 24px; padding: 40px; text-align: center; max-width: 90%; width: 350px; position: relative; box-shadow: 0 0 50px rgba(255,215,0,0.3); }

        .celebration-stat { font-size: 2.2rem; font-weight: 900; color: white; display: block; margin-bottom: 5px; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounce { from { transform: translateY(0) scale(1.1); } to { transform: translateY(-15px) scale(0.9); } }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr !important;
                gap: 16px !important;

        @media (max-width: 600px) {
            /* Force strength selectors to stack vertically below heading, and sit side-by-side with 50% width */

                flex-direction: column;
                align-items: stretch !important;

                margin-bottom: 4px;
            }
            .evo-section .flex.gap-sm {
                width: 100% !important;
                display: flex !important;
                gap: 8px !important;
            }
            .evo-section .flex.gap-sm select {
                flex: 1 !important;
                width: 50% !important;
                min-width: 0 !important;
            }
            /* Render photos in a 2x2 grid instead of 4 squished columns on tiny screens */
            .grid-4 {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 8px !important;
            }
        }
    </style>

    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var tid = params.get('t') || localStorage.getItem('activeTrainerId') || 'default';
            if (tid) {
                var lower = tid.toLowerCase().trim();
                if (lower === 'asteam' || lower === 'alejandra') {
                    tid = 't-w0iybl7qb';
                } else if (lower === 'toledo' || lower === 'vtoledo') {
                    tid = 't-8umeizyns';
                }
            }
            
            // Si el cliente está logueado, intentar deducir su entrenador para PWA
            var clientId = localStorage.getItem('clientId') || sessionStorage.getItem('clientId');
            if (clientId) {
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    if (key && key.indexOf('fitnessAppData_') === 0 && key.indexOf('_backup') === -1) {
                        var raw = localStorage.getItem(key);
                        if (raw) {
                            try {
                                var parsed = JSON.parse(raw);
                                if (parsed && parsed.clients) {
                                    for (var j = 0; j < parsed.clients.length; j++) {
                                        if (parsed.clients[j].id === clientId) {
                                            var foundTid = key.replace('fitnessAppData_', '');
                                            if (foundTid && foundTid !== 'default' && foundTid !== 'admin') {
                                                tid = foundTid;
                                                break;
                                            }
                                        }
                                    }
                                }
                            } catch(e) {}
                        }
                    }
                    if (tid && tid !== 'default' && tid !== 'admin') break;
                }
            }
            
            var brandName = 'Infinite Coach';
            var iconUrl = 'img/logo-infinite-coach.png';
            if (tid === 't-w0iybl7qb') {
                brandName = 'ASTeam';
                iconUrl = 'https://bieeydhacavxymoosasx.supabase.co/storage/v1/object/public/Media/1779724548154_Gemini_Generated_Image_vse84nvse84nvse8.png';
            } else if (tid === 't-8umeizyns') {
                brandName = 'Toledo The Bull';
                iconUrl = 'https://bieeydhacavxymoosasx.supabase.co/storage/v1/object/public/Media/1781711106755_toledo_the_bull.png';
            }
            
            if (tid && tid !== 'default' && tid !== 'admin') {
                try {
                    localStorage.setItem('activeTrainerId', tid);
                    sessionStorage.setItem('activeTrainerId', tid);
                    window.activeTrainerId = tid;
                } catch(e) {}
            }
            document.write('<meta name="apple-mobile-web-app-title" content="' + brandName + '">');
            document.write('<link rel="apple-touch-icon" href="' + iconUrl + '">');
            document.write('<link rel="manifest" href="manifest.json?t=' + tid + '">');
        })();
    </script>

    <script>
        const cId = sessionStorage.getItem('clientId') || localStorage.getItem('clientId');
        if (!cId) {
            window.location.replace('acceso.html');
        } else {
            sessionStorage.setItem('clientId', cId);
            localStorage.setItem('clientId', cId);
        }

        let brand = {};
        let c = { weightHistory: [] };
        let bks = [];
        let lgs = [];
        let ch1 = null, ch2 = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!cId) return;
            // Sincronizar con la nube (Supabase es ahora el primario)
            if (window.SupabaseService) {
                window.SupabaseService.init();
                await window.syncFromCloud();
            } else if (window.FirebaseService) {
                await window.FirebaseService.init();
                await window.syncFromCloud();
            }

            try { BrandConfig.applyTheme(); } catch(e){}
            brand = BrandConfig.get() || {};
            document.getElementById('brandName').textContent = brand.name || 'Infinite Coach';
            if (brand.logo) { document.getElementById('brandLogo').src=brand.logo; document.getElementById('brandLogo').style.display='block'; }

            const fetchedClient = Clients.getById(cId);
            if (!fetchedClient) {
                const activeId = localStorage.getItem('activeTrainerId') || 'default';
                window.location.replace('acceso.html?reauth=true&t=' + activeId);
                return;
            }

            // Redireccionar al Dashboard si está inactivo o tiene pagos pendientes (Opción 3)
            const isInactive = fetchedClient.status === 'inactive';
            const isUnpaid = fetchedClient.paymentStatus !== 'paid' || fetchedClient.status === 'unpaid';
            if (isInactive || isUnpaid) {
                window.location.replace('dashboard.html');
                return;
            }

            if (brand && brand.clientSettings && brand.clientSettings.showEvolution === false) {
                window.location.replace('dashboard.html');
                return;
            }
            c = fetchedClient;
            if (c.name) document.getElementById('pageTitle').textContent = 'Progreso de ' + c.name;

            bks = TrainingBlocks.getByClientId(cId) || [];
            lgs = TrainingLogs.getByClientId(cId) || [];

            showTab('t1');
        });

        function populatePRSuggestions() {
            const dl = document.getElementById('prSuggestions');
            if (!dl) return;

            const exercisesSet = new Set();
            let activeBlock = bks.find(b => b.status === 'active');
            if (!activeBlock) {
                activeBlock = bks.find(b => b.status === 'planned') || bks[0];
            }

            if (activeBlock && activeBlock.weeks) {
                activeBlock.weeks.forEach(week => {
                    if (week && week.days) {
                        week.days.forEach(day => {
                            if (day && day.exercises) {
                                day.exercises.forEach(ex => {
                                    if (ex && ex.name) {
                                        exercisesSet.add(ex.name.trim());
                                    }
                                });
                            }
                        });
                    }
                });
            }

            dl.innerHTML = Array.from(exercisesSet)
                .sort()
                .map(name => `<option value="${name}"></option>`)
                .join('');
        }

        function showTab(tabId) {
            console.log('Mostrando pestaña:', tabId);
            ['t1','t2','t3'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.toggle('active', id === tabId);
                
                const btn = document.getElementById('btn' + id.toUpperCase());
                if (btn) {
                    btn.classList.toggle('btn-primary', id === tabId);
                    btn.classList.toggle('btn-outline', id !== tabId);
                }
            });
            
            if (tabId === 't1') renderEvo();
            if (tabId === 't2') {
                populatePRSuggestions();
                renderPRs();
            }
            if (tabId === 't3') renderPhotos();
        }

        function getWeek(d) {
            const date = new Date(d); if (isNaN(date)) return null;
            for (const b of bks) {
                if (b.startDate && date >= new Date(b.startDate)) {
                    const diff = Math.floor((date - new Date(b.startDate)) / 86400000);
                    const w = Math.floor(diff/7)+1;
                    if (w <= (b.weeks?.length || 52)) return w;
                }
            }
            return null;
        }

        function renderEvo() {
            let hist = (c.weightHistory || []).map(h => ({ ...h }));
            (Feedbacks.getByClientId(cId) || []).forEach(f => {
                const ex = hist.some(h => Math.abs(new Date(h.date)-new Date(f.date))<300000);
                if (!ex && (f.weight || f.perimeters)) hist.push({date:f.date, weight:f.weight, perimeters:f.perimeters});
            });
            hist.sort((a,b)=>new Date(a.date)-new Date(b.date));

            const pers = (c && Array.isArray(c.customPerimeters) && c.customPerimeters.length > 0)
                ? c.customPerimeters
                : (Array.isArray(brand.trainerPerimeters) ? brand.trainerPerimeters : ['Cintura','Cadera','Pecho','Brazo','Muslo']);
            document.getElementById('hTableHead').innerHTML = `<tr><th>FECHA</th><th>SEM.</th><th>PESO</th>${pers.map(p=>`<th>${p.substring(0,3).toUpperCase()}</th>`).join('')}</tr>`;
            
            const body = document.getElementById('hTableBody');
            if (hist.length === 0) { body.innerHTML = '<tr><td colspan="10">No hay datos.</td></tr>'; }
            else {
                body.innerHTML = hist.slice().reverse().map(h => {
                    const w = getWeek(h.date);
                    const fm = {'Cintura':h.waist||'-','Cadera':h.glute||'-','Pecho':h.chest||'-','Brazo':h.arm||'-','Muslo':h.leg||'-'};
                    return `<tr>
                        <td>${new Date(h.date).toLocaleDateString()}</td>
                        <td><span class="badge-s">${w ? 'S'+w : '-'}</span></td>
                        <td><strong>${h.weight ? Math.round(parseFloat(h.weight) * 100) / 100 + 'k' : '-'}</strong></td>
                        ${pers.map(p => `<td>${(h.perimeters?.[p]) || fm[p] || '-'}</td>`).join('')}
                    </tr>`;
                }).join('');
            }

            const client = Clients.getById(cId); // Corrected clientId to cId
            if (client) {
                const avatar = document.getElementById('clientProfileAvatar');
                if (avatar) {
                    if (client.profilePhoto) {
                        avatar.innerHTML = `<img src="${client.profilePhoto}" style="width:100%;height:100%;object-fit:cover;">`;
                        avatar.style.background = 'transparent';
                    } else {
                        avatar.textContent = client.name.charAt(0).toUpperCase();
                        avatar.style.background = 'var(--primary-color)';
                    }
                }
            }
            const ctx = document.getElementById('cWeight');
            if (ctx && hist.length > 0 && typeof Chart !== 'undefined') {
                if (ch1) ch1.destroy();
                ch1 = new Chart(ctx, { type:'line', data:{
                    labels: hist.map(h=>new Date(h.date).toLocaleDateString()),
                    datasets:[{label:'Peso', data:hist.map(h=> h.weight ? Math.round(parseFloat(h.weight)*100)/100 : null), borderColor:brand.colors?.primary||'#3b82f6', tension:0.4, fill:true, backgroundColor: (brand.colors?.primary||'#3b82f6')+'22', pointRadius: 5}]
                }, options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} }});
            }
            updateExSels();
        }

        function updateExSels() {
            const bSel = document.getElementById('selBlock');
            if (bSel && bSel.options.length <= 1) {
                bSel.innerHTML = '<option value="">Todos los Bloques</option>' + bks.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
            }
            const exs = new Set(); lgs.forEach(l=>(l.exercises||[]).forEach(e=>exs.add(e.name)));
            const eSel = document.getElementById('selEx');
            if (eSel && exs.size > 0 && !eSel.value) {
                eSel.innerHTML = '<option value="">Selecciona ejercicio...</option>' + Array.from(exs).sort().map(e=>`<option value="${e}">${e}</option>`).join('');
                eSel.value = Array.from(exs).sort()[0];
                renderExProg();
            }
        }

        function renderExProg() {
            const exVal = document.getElementById('selEx').value; if (!exVal) return;
            const bId = document.getElementById('selBlock').value;
            const fl = lgs.filter(l => !bId || l.blockId == bId).sort((a,b)=>new Date(a.date)-new Date(b.date));
            const data = [], labels = [];
            fl.forEach(l => {
                const e = (l.exercises||[]).find(x=>x.name===exVal);
                if (e && e.sets?.length > 0) {
                    const bw = Math.max(...e.sets.map(s => parseFloat(s.weight)||0));
                    if (bw > 0) { data.push(bw); labels.push(new Date(l.date).toLocaleDateString()); }
                }
            });
            const ctx = document.getElementById('cEx');
            if (ctx && typeof Chart !== 'undefined') {
                if (ch2) ch2.destroy();
                ch2 = new Chart(ctx, { type:'line', data:{ labels, datasets:[{label:exVal, data, borderColor:brand.colors?.accent||'#10b981', tension:0.3, pointRadius: 5}] }, options:{ responsive:true, maintainAspectRatio:false }});
            }
            const msg = document.getElementById('noDataMsg');
            if (msg) msg.style.display = data.length === 0 ? 'flex' : 'none';
        }

        function renderPRs() {
            const container = document.getElementById('prList');
            const searchTerm = document.getElementById('prSearch')?.value.toLowerCase() || '';
            const muscleFilter = document.getElementById('prMuscleFilter')?.value || '';
            if (!container) return;

            // Get exercise metadata to identify muscle groups from routines and blocks
            const allRoutines = Routines.getAll() || [];
            const allBlocks = TrainingBlocks.getByClientId(cId) || [];
            const exMeta = {};
            
            const scan = (exs) => {
                (exs || []).forEach(e => {
                    const name = (e.name || '').toLowerCase().trim();
                    if (!name) return;
                    const mg = (e.muscleGroup || e.category || '').toLowerCase().trim();
                    if (mg && mg !== 'varios' && mg !== '---') {
                        exMeta[name] = mg;
                    }
                });
            };

            allRoutines.forEach(r => (r.days || []).forEach(d => scan(d.exercises)));
            allBlocks.forEach(b => (b.weeks || []).forEach(w => (w.days || []).forEach(d => scan(d.exercises))));

            const exs = new Set(); lgs.forEach(l=>(l.exercises||[]).forEach(e=>exs.add(e.name)));
            const prs = Array.from(exs).map(exName => {
                let best = { w: 0, r: 0 };
                lgs.forEach(l=>(l.exercises||[]).forEach(e=>{
                    if (e.name===exName) e.sets?.forEach(s=>{
                        const w = parseFloat(s.weight)||0; const r = parseInt(s.reps)||0;
                        if (w > best.w) { best = { w, r }; } else if (w>0 && w===best.w && r>best.r) { best.r = r; }
                    });
                }));
                const muscle = exMeta[exName.toLowerCase()] || '';
                return { name: exName, w: best.w, r: best.r, muscle: muscle };
            }).filter(p=>p.w > 0);

            // Apply Filters
            const filtered = prs.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchTerm);
                const matchesMuscle = !muscleFilter || p.muscle === muscleFilter;
                return matchesSearch && matchesMuscle;
            }).sort((a,b)=>b.w-a.w);

            container.innerHTML = filtered.length === 0 ? '<p class="text-center py-lg opacity-50">No hay récords con estos filtros.</p>' : filtered.map(p => `
                <div class="pr-card" onclick="showCelebration('${p.name}', '${p.w}', '${p.r}')">
                    <div>
                        <span style="font-weight:700; display:block;">${p.name}</span>
                        ${p.muscle ? `<span class="badge" style="font-size: 0.6rem; opacity: 0.6; text-transform: uppercase; background:rgba(255,255,255,0.05); color:white; border:1px solid rgba(255,255,255,0.1);">${p.muscle}</span>` : ''}
                    </div>
                    <span style="color:#FFD700; font-weight:800; font-size:1.1rem;">${p.w}kg <small style="font-size:0.7rem; color:white; opacity:0.6;">x ${p.r} reps</small></span>
                </div>`).join('');
        }

        function showCelebration(exName, weight, reps) {
            const overlay = document.createElement('div');
            overlay.className = 'celebration-overlay';
            overlay.style.display = 'flex';
            overlay.innerHTML = `
                <div class="celebration-card" onclick="this.parentElement.remove()">
                    <span class="celebration-trophy">🏆</span>
                    <div class="celebration-title">¡NUEVO RÉCORD!</div>
                    <div class="celebration-text">${exName}</div>
                    <div class="celebration-stat">${weight} kg</div>
                    <div class="celebration-text">por ${reps} repeticiones</div>
                    <button class="btn btn-primary" style="background:#FFD700; border:none; color:black; width:100%;">¡A POR MÁS!</button>
                </div>`;
            document.body.appendChild(overlay);
            
            // Simple confetti effect
            for(let i=0; i<50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = Math.random() * 100 + 'vh';
                c.style.background = ['#FFD700', '#FFFFFF', '#FF8C00'][Math.floor(Math.random()*3)];
                c.style.transform = `rotate(${Math.random()*362}deg)`;
                overlay.appendChild(c);
                c.animate([
                    { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${(Math.random()-0.5)*200}px, 500px) rotate(362deg)`, opacity: 0 }
                ], { duration: 1000 + Math.random()*2000, iterations: 1 });
            }
        }

        function renderPhotos() {
            const fs = (Feedbacks.getByClientId(cId)||[]).filter(f => f.photos && (f.photos.front||f.photos.back||f.photos.side||f.photos.extra)).sort((a,b)=>new Date(b.date)-new Date(a.date));
            const feed = document.getElementById('photoFeed');
            if (fs.length === 0) { feed.innerHTML = '<p class="text-center py-xl opacity-50">No hay fotos todavía.</p>'; return; }
            feed.innerHTML = fs.map(f => `
                <div class="evo-section">
                    <div class="flex-between mb-sm" style="border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom:8px;">
                        <span class="badge-s">Semana ${getWeek(f.date)||'-'}</span>
                        <span style="font-family:monospace; opacity:0.8;">${new Date(f.date).toLocaleDateString()}</span>
                        <strong style="color:var(--primary-color);">${f.weight ? Math.round(parseFloat(f.weight) * 100) / 100 + 'k' : '-'}</strong>
                    </div>
                    <div class="grid grid-4 gap-xs">
                        ${f.photos.front?`<img src="${f.photos.front}" style="width:100%; border-radius:8px; aspect-ratio:3/4; object-fit:cover;" onclick="window.open('${f.photos.front}')">`:''}
                        ${f.photos.back?`<img src="${f.photos.back}" style="width:100%; border-radius:8px; aspect-ratio:3/4; object-fit:cover;" onclick="window.open('${f.photos.back}')">`:''}
                        ${f.photos.side?`<img src="${f.photos.side}" style="width:100%; border-radius:8px; aspect-ratio:3/4; object-fit:cover;" onclick="window.open('${f.photos.side}')">`:''}
                        ${f.photos.extra?`<img src="${f.photos.extra}" style="width:100%; border-radius:8px; aspect-ratio:3/4; object-fit:cover;" onclick="window.open('${f.photos.extra}')">`:''}
                    </div>
                </div>`).join('');
        }

    </script>
