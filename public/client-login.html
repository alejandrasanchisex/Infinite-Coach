    <script>
        // Safe localStorage wrapper to prevent QuotaExceededError crashes
        (function() {
            try {
                const originalSetItem = localStorage.setItem;
                localStorage.setItem = function(key, value) {
                    try {
                        originalSetItem.call(localStorage, key, value);
                    } catch (err) {
                        console.warn("Storage write failed for key:", key, err);
                    }
                };
            } catch (e) {}
        })();
        // Force PWA cache bust / reload
        (function() {
            const CURRENT_VERSION = '635';
            window.APP_VERSION = CURRENT_VERSION;
            const savedVersion = localStorage.getItem('app_version');
            if (savedVersion && parseInt(savedVersion) > parseInt(CURRENT_VERSION)) {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(regs) {
                        for (let r of regs) r.unregister();
                    }).finally(function() {
                        window.location.reload(true);
                    });
                } else {
                    window.location.reload(true);
                }
                return;
            } else if (savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
            }
            if (typeof window !== 'undefined' && window.location && navigator.onLine !== false) {
                const checkKey = '_lastVersionCheck';
                const lastCheck = sessionStorage.getItem(checkKey);
                if (!lastCheck || (Date.now() - parseInt(lastCheck) > 10000)) {
                    sessionStorage.setItem(checkKey, String(Date.now()));
                    fetch('/version.json?cb=' + Date.now())
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.version && data.version !== CURRENT_VERSION) {
                                localStorage.setItem('app_version', data.version);
                                if ('caches' in window) {
                                    caches.keys().then(keys => {
                                        keys.forEach(k => caches.delete(k));
                                    });
                                }
                                const params = new URLSearchParams(window.location.search);
                                params.set('v', data.version);
                                window.location.replace(window.location.pathname + '?' + params.toString());
                            }
                        })
                        .catch(() => {});
                }
            }
        })();
    </script>

    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var tid = params.get('t') || localStorage.getItem('activeTrainerId') || 'default';
            if (tid) {
                var lower = tid.toLowerCase().trim();
                if (lower === 'asteam' || lower === 'alejandra') {
                    tid = 't-w0iybl7qb';
                } else if (lower === 'toledo' || lower === 'vtoledo') {
                    tid = 't-8umeizyns';
                }
            }
            
            // Si el cliente está logueado, intentar deducir su entrenador para PWA
            var clientId = localStorage.getItem('clientId') || sessionStorage.getItem('clientId');
            if (clientId) {
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    if (key && key.indexOf('fitnessAppData_') === 0 && key.indexOf('_backup') === -1) {
                        var raw = localStorage.getItem(key);
                        if (raw) {
                            try {
                                var parsed = JSON.parse(raw);
                                if (parsed && parsed.clients) {
                                    for (var j = 0; j < parsed.clients.length; j++) {
                                        if (parsed.clients[j].id === clientId) {
                                            var foundTid = key.replace('fitnessAppData_', '');
                                            if (foundTid && foundTid !== 'default' && foundTid !== 'admin') {
                                                tid = foundTid;
                                                break;
                                            }
                                        }
                                    }
                                }
                            } catch(e) {}
                        }
                    }
                    if (tid && tid !== 'default' && tid !== 'admin') break;
                }
            }
            
            var brandName = 'Infinite Coach';
            var iconUrl = 'img/logo-infinite-coach.png';
            if (tid === 't-w0iybl7qb') {
                brandName = 'ASTeam';
                iconUrl = 'https://bieeydhacavxymoosasx.supabase.co/storage/v1/object/public/Media/1779724548154_Gemini_Generated_Image_vse84nvse84nvse8.png';
            } else if (tid === 't-8umeizyns') {
                brandName = 'Toledo The Bull';
                iconUrl = 'https://bieeydhacavxymoosasx.supabase.co/storage/v1/object/public/Media/1781711106755_toledo_the_bull.png';
            }
            
            document.write('<meta id="appleAppTitle" name="apple-mobile-web-app-title" content="' + brandName + '">');
            document.write('<link id="appleTouchIcon" rel="apple-touch-icon" href="' + iconUrl + '">');
            document.write('<link rel="manifest" href="manifest.json?t=' + tid + '">');
        })();
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary-color: #C9A84C;
            --primary-color-rgb: 201, 168, 76;
            --gold:       var(--primary-color);
            --gold-light: color-mix(in srgb, var(--primary-color) 85%, white);
            --gold-dark:  color-mix(in srgb, var(--primary-color) 85%, black);
            --bg:         var(--bg-dark, #0D0D0F);
            --text:       #F0EDE8;
            --muted:      #6B6865;
            --soft:       #9E9B97;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
        }

        .bg {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
            background:
                radial-gradient(ellipse 90% 70% at 15% 5%,  rgba(var(--primary-color-rgb),.08) 0%, transparent 55%),
                radial-gradient(ellipse 70% 80% at 85% 95%, rgba(var(--primary-color-rgb),.05) 0%, transparent 55%),
                var(--bg);
        }
        .bg-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(var(--primary-color-rgb),.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(var(--primary-color-rgb),.035) 1px, transparent 1px);
            background-size: 55px 55px;
            mask-image: radial-gradient(ellipse 65% 65% at 50% 50%, black 20%, transparent 100%);
        }
        .orb { position: absolute; border-radius: 50%; filter: blur(70px); pointer-events: none; }
        .orb-1 { width:400px;height:400px;background:rgba(var(--primary-color-rgb),.06);top:-15%;left:-10%;
                  animation: drift 20s ease-in-out infinite; }
        .orb-2 { width:280px;height:280px;background:rgba(var(--primary-color-rgb),.04);bottom:0;right:-5%;
                  animation: drift 25s ease-in-out infinite reverse; }
        @keyframes drift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(25px,-35px)} }

        .page {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px 20px;
        }

        .card {
            width: 100%; max-width: 400px;
            background: rgba(20,20,22,.92);
            border: 1px solid rgba(var(--primary-color-rgb),.2);
            border-radius: 24px;
            padding: 44px 36px 36px;
            backdrop-filter: blur(20px);

            box-shadow: 0 40px 100px rgba(0,0,0,.65);
            animation: appear .55s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes appear {
            from { opacity:0; transform:translateY(20px) scale(.97) }
            to   { opacity:1; transform:translateY(0)    scale(1)   }
        }

        .logo-wrap { text-align: center; margin-bottom: 32px; }
        .logo-box {
            width: 76px; height: 76px; border-radius: 20px;
            background: rgba(var(--primary-color-rgb),.1);
            border: 1px solid rgba(var(--primary-color-rgb),.22);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 2.2rem; margin-bottom: 18px; overflow: hidden;
        }
        .logo-box img { width:100%;height:100%;object-fit:contain;border-radius:19px; }
        .brand-name { font-size:1.4rem;font-weight:700;letter-spacing:-.02em;margin-bottom:5px; }
        .brand-tag  { font-size:.72rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold); }

        .sep {
            display:flex;align-items:center;gap:10px;
            margin: 26px 0 24px;
        }
        .sep::before,.sep::after { content:'';flex:1;height:1px;background:rgba(255,255,255,.06); }
        .sep span { font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted); }

        .field-label {
            display:block;
            font-size:.72rem;font-weight:600;
            letter-spacing:.09em;text-transform:uppercase;
            color:var(--soft);margin-bottom:10px;
        }

        #accessCode {
            display: block;
            width: 100%;
            height: 62px;
            background: rgba(255,255,255,.04);
            border: 1.5px solid rgba(255,255,255,.1);
            border-radius: 14px;
            color: var(--text);
            font-family: 'Inter', monospace;
            font-size: 16px;   /* MUST be 16px to prevent iOS zoom */
            font-weight: 700;
            letter-spacing: .22em;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
            -webkit-appearance: none;
            appearance: none;
            caret-color: var(--gold);
            padding: 0 12px;
        }
        #accessCode::placeholder {
            color: rgba(255,255,255,.2);
            letter-spacing: .1em;
            font-weight: 500;
        }
        #accessCode:focus {
            border-color: var(--gold);
            background: rgba(var(--primary-color-rgb),.07);
            box-shadow: 0 0 0 3px rgba(var(--primary-color-rgb),.12);
        }

        .field-hint { margin-top:8px;margin-bottom:24px;font-size:.72rem;color:var(--muted);line-height:1.5; }

        .btn-submit {
            width: 100%; height: 52px;
            background: linear-gradient(110deg, var(--gold-dark) 0%, var(--gold-light) 50%, var(--gold-dark) 100%);
            background-size: 200% 100%;
            border: none; border-radius: 12px;
            color: #0D0D0F;
            font-family: 'Inter', sans-serif;
            font-size: .9rem; font-weight: 700; letter-spacing: .04em;
            cursor: pointer;
            transition: background-position .4s, transform .15s, box-shadow .2s, opacity .2s;
            box-shadow: 0 4px 20px rgba(var(--primary-color-rgb),.28);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .btn-submit:active { transform:translateY(1px); }
        .btn-submit:disabled { opacity:.6; cursor:not-allowed; }

        .spinner {
            display:inline-block;
            width:18px;height:18px;
            border:2.5px solid rgba(0,0,0,.2);
            border-top-color:#0D0D0F;
            border-radius:50%;
            animation:spin .7s linear infinite;
        }
        @keyframes spin{to{transform:rotate(362deg)}}

        .footer { text-align:center;margin-top:26px;font-size:.73rem;color:var(--muted);line-height:1.65; }

        #toast {
            position:fixed;bottom:28px;left:50%;
            transform:translateX(-50%) translateY(16px);
            background:rgba(20,20,22,.97);
            border:1px solid rgba(255,255,255,.1);
            color:var(--text);
            padding:11px 22px;border-radius:100px;
            font-size:.83rem;font-weight:500;
            opacity:0;
            transition:opacity .25s,transform .25s;
            z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.5);
            max-width:88vw;text-align:center;
        }
        #toast.show  { opacity:1;transform:translateX(-50%) translateY(0); }
        #toast.error { border-color:rgba(239,68,68,.4);color:#FC8181; }
        #toast.ok    { border-color:rgba(201,168,76,.4);color:var(--gold-light); }

        @media(max-width:420px){
            .card { padding:36px 22px 30px;border-radius:20px; }
        }
    </style>

<script>

// ── Auto-Redirección (Mantener sesión activa) ─────────────────────
(function() {
    var storedClientId = localStorage.getItem('clientId') || sessionStorage.getItem('clientId');
    var params = new URLSearchParams(window.location.search);
    if (storedClientId && params.get('logout') !== 'true' && params.get('reauth') !== 'true') {
        window.location.replace('dashboard.html?v=626');
    }
})();

// ── Toast ────────────────────────────────────────────────────────
function showMsg(msg, type) {
    var el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.className = 'show ' + (type || 'error');
    clearTimeout(el._t);
    el._t = setTimeout(function(){ el.className = ''; }, 4000);
}

// ── Uppercase as user types ──────────────────────────────────────
document.getElementById('accessCode').addEventListener('input', function() {
    var pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    try { this.setSelectionRange(pos, pos); } catch(e){}
});

// Enter key triggers login
document.getElementById('accessCode').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); doLogin(); }
});

// ── Trainer ID from URL ──────────────────────────────────────────
(function() {
    var params = new URLSearchParams(window.location.search);
    var tParam = params.get('t');
    if (tParam) {
        tParam = tParam.toLowerCase().trim();
        if (tParam === 'asteam' || tParam === 'alejandra') {
            tParam = 't-w0iybl7qb';
        } else if (tParam === 'toledo' || tParam === 'vtoledo') {
            tParam = 't-8umeizyns';
        } else if (tParam === 'brian' || tParam === 'phoenix') {
            tParam = 't-kt1hgr95s';
        }
    }
    
    var storedTid = localStorage.getItem('activeTrainerId') || sessionStorage.getItem('activeTrainerId');
    var tid = tParam;
    
    // Si no hay tParam o es genérico, pero hay un entrenador específico guardado, lo preservamos
    if (!tid || tid === 'default' || tid === 'admin') {
        if (storedTid && storedTid !== 'default' && storedTid !== 'admin') {
            tid = storedTid;
        } else {
            tid = 'default';
        }
    }
    
    // Forzar activeTrainerId en window ANTES de que BrandConfig.get() lo lea
    window.activeTrainerId = tid;
    try { localStorage.setItem('activeTrainerId', tid); } catch(e) {}
    try { sessionStorage.setItem('activeTrainerId', tid); } catch(e) {}
    try {
        if (typeof updateActiveTrainerId === 'function') updateActiveTrainerId(tid);
    } catch(e) {}

    // Apply brand theme instantly on page load
    try {
        if (window.BrandConfig) {
            window.BrandConfig.applyTheme();
            var brand = window.BrandConfig.get();
            if (brand && brand.name) {
                var nameEl = document.getElementById('brandName');
                if (nameEl) nameEl.textContent = brand.name;
            }
            if (brand && brand.logo) {
                var logoEl = document.getElementById('brandLogoContainer');
                if (logoEl) {
                    logoEl.innerHTML = '<img src="' + brand.logo + '" alt="' + (brand.name||'') + '" style="width: 100%; height: 100%; object-fit: contain; border-radius: 19px;">';
                }
            }
        }
    } catch(e) {}
})();

// ── Cloud sync on load (background) ─────────────────────────────
var syncDone = true;
var syncReady = (function() {
    return new Promise(function(resolve) {
        if (window.SupabaseService) {
            window.SupabaseService.init();
        }
        resolve();
    });
})();

// ── Login function ───────────────────────────────────────────────
async function doLogin() {
    var btn     = document.getElementById('submitBtn');
    var content = document.getElementById('btnContent');
    var codeEl  = document.getElementById('accessCode');
    var code    = codeEl.value.trim().toUpperCase();

    if (!code || code.length < 3) {
        showMsg('Introduce tu código de acceso');
        codeEl.focus();
        return;
    }

    // Disable button & show spinner
    btn.disabled = true;
    content.innerHTML = '<span class="spinner"></span>';

    try {
        // Wait for basic sync first
        await syncReady;

        var foundClient = null;
        var foundTrainerId = null;
        var foundTrainerData = null;
        var profilesList = null;

        // 1. Prioridad: Buscar en Supabase en tiempo real en todos los perfiles de entrenadores (un solo fetch para evitar fallos de red intermitentes)
        if (window.SupabaseService) {
            window.SupabaseService.init();
        }
        if (window.SupabaseService && window.SupabaseService.client) {
            try {
                const { data: profiles, error } = await window.SupabaseService.client
                    .from('trainer_profiles')
                    .select('trainer_id, clients:full_data->clients')
                    .contains('full_data', { clients: [{ accessCode: code }] });
                profilesList = profiles;
                
                if (error) {
                    console.error("Supabase query error:", error);
                    showMsg("Error de base de datos: " + (error.message || JSON.stringify(error)));
                    btn.disabled = false;
                    content.textContent = 'Acceder';
                    return;
                }
                if (profiles) {
                    // Ordenar perfiles para priorizar el entrenador activo actual y evitar genéricos
                    profiles.sort(function(a, b) {
                        var aIsActive = (a.trainer_id === window.activeTrainerId);
                        var bIsActive = (b.trainer_id === window.activeTrainerId);
                        if (aIsActive && !bIsActive) return -1;
                        if (!aIsActive && bIsActive) return 1;

                        var aIsGeneric = (a.trainer_id === 'admin' || a.trainer_id === 'default');
                        var bIsGeneric = (b.trainer_id === 'admin' || b.trainer_id === 'default');
                        if (aIsGeneric && !bIsGeneric) return 1;
                        if (!aIsGeneric && bIsGeneric) return -1;

                        return 0;
                    });

                    for (var i = 0; i < profiles.length; i++) {
                        var p = profiles[i];
                        var clientsList = p.clients || [];
                        for (var j = 0; j < clientsList.length; j++) {
                            var c = clientsList[j];
                            if ((c.accessCode || '').trim().toUpperCase() === code) {
                                foundClient = c;
                                foundTrainerId = p.trainer_id;
                                break;
                            }
                        }
                        if (foundClient) break;
                    }

                    if (foundClient) {
                        const { data: trainerProfile, error: fetchError } = await window.SupabaseService.client
                            .from('trainer_profiles')
                            .select('full_data')
                            .eq('trainer_id', foundTrainerId)
                            .single();
                        if (fetchError) {
                            console.error("Error fetching trainer data:", fetchError);
                            showMsg("Error de base de datos al cargar perfil: " + (fetchError.message || JSON.stringify(fetchError)));
                            btn.disabled = false;
                            content.textContent = 'Acceder';
                            return;
                        }
                        foundTrainerData = trainerProfile ? trainerProfile.full_data : null;
                    }
                }
            } catch(e) {
                console.warn("Supabase cross-trainer search failed:", e);
                showMsg("Fallo de conexión o Supabase: " + (e.message || JSON.stringify(e)));
                btn.disabled = false;
                content.textContent = 'Acceder';
                return;
            }
        }

        // 2. Fallback: Buscar localmente en todos los perfiles guardados
        if (!foundClient) {
            for (var i = 0; i < localStorage.length; i++) {
                var key = localStorage.key(i);
                if (key && key.indexOf('fitnessAppData_') === 0) {
                    try {
                        var raw = localStorage.getItem(key);
                        if (raw) {
                            var parsed = JSON.parse(raw);
                            var clientsList = parsed.clients || [];
                            for (var j = 0; j < clientsList.length; j++) {
                                var c = clientsList[j];
                                if ((c.accessCode || '').trim().toUpperCase() === code) {
                                    foundClient = c;
                                    foundTrainerId = key.replace('fitnessAppData_', '');
                                    foundTrainerData = parsed;
                                    break;
                                }
                            }
                        }
                    } catch(err) { console.warn("Local storage scan error:", err); }
                }
                if (foundClient) break;
            }
        }

        // 3. Fallback final: Buscar en el listado del activeTrainerId actual
        if (!foundClient) {
            var currentClients = Clients.getAll();
            for (var i = 0; i < currentClients.length; i++) {
                var c = currentClients[i];
                if ((c.accessCode || '').trim().toUpperCase() === code) {
                    foundClient = c;
                    foundTrainerId = window.activeTrainerId || localStorage.getItem('activeTrainerId') || 'admin';
                    break;
                }
            }
        }

        if (foundClient) {
            // Limpiar bases de datos de sesiones anteriores para evitar contaminación de caché
            try {
                for (var i = localStorage.length - 1; i >= 0; i--) {
                    var key = localStorage.key(i);
                    if (key && key.indexOf('fitnessAppData_') === 0) {
                        localStorage.removeItem(key);
                    }
                }
            } catch(e) {}
            try {
                for (var i = sessionStorage.length - 1; i >= 0; i--) {
                    var key = sessionStorage.key(i);
                    if (key && key.indexOf('fitnessAppData_') === 0) {
                        sessionStorage.removeItem(key);
                    }
                }
            } catch(e) {}

            // Actualizar activeTrainerId al del coach del cliente
            // Siempre guardar en sessionStorage como garantía (localStorage puede estar lleno en iOS WebView)
            try { localStorage.setItem('activeTrainerId', foundTrainerId); } catch(e) {}
            try { sessionStorage.setItem('activeTrainerId', foundTrainerId); } catch(e) {}
            window.activeTrainerId = foundTrainerId;
            if (typeof updateActiveTrainerId === 'function') updateActiveTrainerId(foundTrainerId);

            try { sessionStorage.setItem('clientId', foundClient.id); } catch(e) {}
            try { localStorage.setItem('clientId', foundClient.id); } catch(e) {}

            // Guardar datos del entrenador recuperados localmente para agilizar carga
            // (wrapped in try-catch: iOS WebViews can have very limited quota)
            if (foundTrainerData) {
                if (window.stripDatabaseForClient) {
                    foundTrainerData = window.stripDatabaseForClient(foundTrainerData, foundClient.id);
                }
                try {
                    localStorage.setItem('fitnessAppData_' + foundTrainerId, JSON.stringify(foundTrainerData));
                } catch(quotaErr) {
                    console.warn('[Login] No se pudo guardar en localStorage (cuota llena). Guardando en sessionStorage como fallback.');
                    try { sessionStorage.setItem('fitnessAppData_' + foundTrainerId, JSON.stringify(foundTrainerData)); } catch(e2) {}
                }
            }

            // Intentar aplicar la marca del coach de inmediato para feedback visual al cliente
            try {
                if (window.BrandConfig) {
                    window.BrandConfig.applyTheme();
                    var brand = window.BrandConfig.get();
                    if (brand && brand.name) {
                        var bNameEl = document.getElementById('brandName');
                        if (bNameEl) bNameEl.textContent = brand.name;
                    }
                    if (brand && brand.logo && document.getElementById('brandLogoContainer')) {
                        document.getElementById('brandLogoContainer').innerHTML =
                            '<img src="' + brand.logo + '" alt="' + (brand.name||'') + '">';
                    }
                }
            } catch(e) { console.warn("Error applying found coach branding:", e); }

            content.textContent = '✓';
            btn.style.background = 'linear-gradient(110deg,#22c55e,#4ade80)';
            setTimeout(function(){ 
                window.location.replace('dashboard.html?t=' + encodeURIComponent(foundTrainerId) + '&cid=' + encodeURIComponent(foundClient.id)); 
            }, 400);
        } else {
            showMsg('Código de acceso incorrecto. Por favor, verifícalo.');
            btn.disabled = false;
            content.textContent = 'Acceder';
            codeEl.select();
        }

    } catch(err) {
        console.error('[Login] Error:', err);
        showMsg('Error de inicio de sesión: ' + (err.message || String(err)));
        btn.disabled = false;
        content.textContent = 'Acceder';
    }
}
try {
    document.getElementById('app-version-display').textContent = 'Versión: v' + (window.APP_VERSION || 'desconocida');
} catch(e) {}
</script>
