<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Acceso Cliente</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold:       #C9A84C;
            --gold-light: #E8C97A;
            --bg:         #0D0D0F;
            --text:       #F0EDE8;
            --muted:      #6B6865;
            --soft:       #9E9B97;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
        }

        .bg {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
            background:
                radial-gradient(ellipse 90% 70% at 15% 5%,  rgba(201,168,76,.08) 0%, transparent 55%),
                radial-gradient(ellipse 70% 80% at 85% 95%, rgba(201,168,76,.05) 0%, transparent 55%),
                #0D0D0F;
        }
        .bg-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(201,168,76,.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,.035) 1px, transparent 1px);
            background-size: 55px 55px;
            mask-image: radial-gradient(ellipse 65% 65% at 50% 50%, black 20%, transparent 100%);
        }
        .orb { position: absolute; border-radius: 50%; filter: blur(70px); pointer-events: none; }
        .orb-1 { width:400px;height:400px;background:rgba(201,168,76,.06);top:-15%;left:-10%;
                  animation: drift 20s ease-in-out infinite; }
        .orb-2 { width:280px;height:280px;background:rgba(201,168,76,.04);bottom:0;right:-5%;
                  animation: drift 25s ease-in-out infinite reverse; }
        @keyframes drift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(25px,-35px)} }

        .page {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px 20px;
        }

        .card {
            width: 100%; max-width: 400px;
            background: rgba(20,20,22,.92);
            border: 1px solid rgba(201,168,76,.2);
            border-radius: 24px;
            padding: 44px 36px 36px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 40px 100px rgba(0,0,0,.65);
            animation: appear .55s cubic-bezier(.22,1,.36,1) both;
        }
        @keyframes appear {
            from { opacity:0; transform:translateY(20px) scale(.97) }
            to   { opacity:1; transform:translateY(0)    scale(1)   }
        }

        .logo-wrap { text-align: center; margin-bottom: 32px; }
        .logo-box {
            width: 76px; height: 76px; border-radius: 20px;
            background: rgba(201,168,76,.1);
            border: 1px solid rgba(201,168,76,.22);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 2.2rem; margin-bottom: 18px; overflow: hidden;
        }
        .logo-box img { width:100%;height:100%;object-fit:contain;border-radius:19px; }
        .brand-name { font-size:1.4rem;font-weight:700;letter-spacing:-.02em;margin-bottom:5px; }
        .brand-tag  { font-size:.72rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold); }

        .sep {
            display:flex;align-items:center;gap:10px;
            margin: 26px 0 24px;
        }
        .sep::before,.sep::after { content:'';flex:1;height:1px;background:rgba(255,255,255,.06); }
        .sep span { font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted); }

        .field-label {
            display:block;
            font-size:.72rem;font-weight:600;
            letter-spacing:.09em;text-transform:uppercase;
            color:var(--soft);margin-bottom:10px;
        }

        #accessCode {
            display: block;
            width: 100%;
            height: 62px;
            background: rgba(255,255,255,.04);
            border: 1.5px solid rgba(255,255,255,.1);
            border-radius: 14px;
            color: var(--text);
            font-family: 'Inter', monospace;
            font-size: 16px;   /* MUST be 16px to prevent iOS zoom */
            font-weight: 700;
            letter-spacing: .22em;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
            -webkit-appearance: none;
            appearance: none;
            caret-color: var(--gold);
            padding: 0 12px;
        }
        #accessCode::placeholder {
            color: rgba(255,255,255,.2);
            letter-spacing: .1em;
            font-weight: 500;
        }
        #accessCode:focus {
            border-color: var(--gold);
            background: rgba(201,168,76,.07);
            box-shadow: 0 0 0 3px rgba(201,168,76,.12);
        }

        .field-hint { margin-top:8px;margin-bottom:24px;font-size:.72rem;color:var(--muted);line-height:1.5; }

        .btn-submit {
            width: 100%; height: 52px;
            background: linear-gradient(110deg, #B8922E 0%, #E8C97A 50%, #B8922E 100%);
            background-size: 200% 100%;
            border: none; border-radius: 12px;
            color: #0D0D0F;
            font-family: 'Inter', sans-serif;
            font-size: .9rem; font-weight: 700; letter-spacing: .04em;
            cursor: pointer;
            transition: background-position .4s, transform .15s, box-shadow .2s, opacity .2s;
            box-shadow: 0 4px 20px rgba(201,168,76,.28);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .btn-submit:active { transform:translateY(1px); }
        .btn-submit:disabled { opacity:.6; cursor:not-allowed; }

        .spinner {
            display:inline-block;
            width:18px;height:18px;
            border:2.5px solid rgba(0,0,0,.2);
            border-top-color:#0D0D0F;
            border-radius:50%;
            animation:spin .7s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg)}}

        .footer { text-align:center;margin-top:26px;font-size:.73rem;color:var(--muted);line-height:1.65; }

        #toast {
            position:fixed;bottom:28px;left:50%;
            transform:translateX(-50%) translateY(16px);
            background:rgba(20,20,22,.97);
            border:1px solid rgba(255,255,255,.1);
            color:var(--text);
            padding:11px 22px;border-radius:100px;
            font-size:.83rem;font-weight:500;
            opacity:0;
            transition:opacity .25s,transform .25s;
            z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.5);
            max-width:88vw;text-align:center;
        }
        #toast.show  { opacity:1;transform:translateX(-50%) translateY(0); }
        #toast.error { border-color:rgba(239,68,68,.4);color:#FC8181; }
        #toast.ok    { border-color:rgba(201,168,76,.4);color:var(--gold-light); }

        @media(max-width:420px){
            .card { padding:36px 22px 30px;border-radius:20px; }
        }
    </style>
</head>

<body>
<div class="bg">
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<div class="page">
    <div class="card">
        <div class="logo-wrap">
            <div class="logo-box" id="brandLogoContainer"><span>💪</span></div>
            <div class="brand-name" id="brandName">Infinite Coach</div>
            <div class="brand-tag">Área de clientes</div>
        </div>

        <div class="sep"><span>Acceso seguro</span></div>

        <!-- NO form tag — button uses onclick to avoid any native submit -->
        <div>
            <label class="field-label" for="accessCode">Tu código de acceso</label>
            <input
                type="text"
                id="accessCode"
                maxlength="8"
                placeholder="XXXXXXXX"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="characters"
                spellcheck="false"
                inputmode="text"
                enterkeyhint="go"
            >
            <p class="field-hint">Código de 8 caracteres facilitado por tu entrenador.</p>
            <button class="btn-submit" id="submitBtn" onclick="doLogin()">
                <span id="btnContent">Acceder</span>
            </button>
        </div>

        <p class="footer">¿No tienes código?<br>Contacta con tu entrenador personal.</p>
    </div>
</div>

<div id="toast"></div>

<!-- ── Scripts ──────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-service.js?v=330"></script>
<script src="js/config.js?v=330"></script>
<script src="js/data-models.js?v=330"></script>
<script src="js/utils.js?v=330"></script>
<script>
// ── Cache buster redirect ─────────────────────────────────────────
(function() {
    var params = new URLSearchParams(window.location.search);
    if (params.get('v') !== '332') {
        params.set('v', '332');
        window.location.replace(window.location.pathname + '?' + params.toString());
    }
})();

// ── Auto-Redirección (Mantener sesión activa) ─────────────────────
(function() {
    var storedClientId = localStorage.getItem('clientId') || sessionStorage.getItem('clientId');
    var params = new URLSearchParams(window.location.search);
    if (storedClientId && params.get('logout') !== 'true') {
        window.location.replace('client-dashboard.html?v=332');
    }
})();

// ── Toast ────────────────────────────────────────────────────────
function showMsg(msg, type) {
    var el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.className = 'show ' + (type || 'error');
    clearTimeout(el._t);
    el._t = setTimeout(function(){ el.className = ''; }, 4000);
}

// ── Uppercase as user types ──────────────────────────────────────
document.getElementById('accessCode').addEventListener('input', function() {
    var pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    try { this.setSelectionRange(pos, pos); } catch(e){}
});

// Enter key triggers login
document.getElementById('accessCode').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); doLogin(); }
});

// ── Trainer ID from URL ──────────────────────────────────────────
(function() {
    var params = new URLSearchParams(window.location.search);
    var tid = params.get('t') || localStorage.getItem('activeTrainerId');
    if (tid) {
        var lower = tid.toLowerCase().trim();
        if (lower === 'asteam' || lower === 'alejandra') {
            tid = 'alejandra_asteam_gmail_com';
        }
    }
    if (!tid || tid === 'admin' || tid === 'default') {
        if (window.location.hostname.includes('infinitecoach.es')) {
            tid = 't-w0iybl7qb';
        } else {
            tid = 'admin';
        }
    }
    localStorage.setItem('activeTrainerId', tid);
    window.activeTrainerId = tid;
    if (typeof updateActiveTrainerId === 'function') updateActiveTrainerId(tid);
})();

// ── Cloud sync on load (background) ─────────────────────────────
var syncDone = false;
var syncReady = (function() {
    return new Promise(function(resolve) {
        if (!window.SupabaseService) { syncDone = true; resolve(); return; }
        window.SupabaseService.init();
        window.syncFromCloud().then(function() {
            syncDone = true;
            resolve();
            // Apply brand theme after sync
            try {
                if (BrandConfig.isConfigured()) {
                    BrandConfig.applyTheme();
                    var brand = BrandConfig.get();
                    if (brand && brand.name) document.getElementById('brandName').textContent = brand.name;
                    if (brand && brand.logo) {
                        document.getElementById('brandLogoContainer').innerHTML =
                            '<img src="' + brand.logo + '" alt="' + (brand.name||'') + '">';
                    }
                }
            } catch(e) {}
        }).catch(function(err) {
            console.error('[Login] Sync error:', err);
            syncDone = true;
            resolve();
        });
    });
})();

// ── Login function ───────────────────────────────────────────────
async function doLogin() {
    var btn     = document.getElementById('submitBtn');
    var content = document.getElementById('btnContent');
    var codeEl  = document.getElementById('accessCode');
    var code    = codeEl.value.trim().toUpperCase();

    if (!code || code.length < 3) {
        showMsg('Introduce tu código de acceso');
        codeEl.focus();
        return;
    }

    // Disable button & show spinner
    btn.disabled = true;
    content.innerHTML = '<span class="spinner"></span>';

    try {
        // Wait for basic sync first
        await syncReady;

        var foundClient = null;
        var foundTrainerId = null;
        var foundTrainerData = null;

        // 1. Prioridad: Buscar en Supabase en tiempo real en todos los perfiles de entrenadores
        if (window.SupabaseService && window.SupabaseService.client) {
            try {
                const { data: profiles, error } = await window.SupabaseService.client
                    .from('trainer_profiles')
                    .select('trainer_id, full_data');
                
                if (!error && profiles) {
                    for (var i = 0; i < profiles.length; i++) {
                        var p = profiles[i];
                        var clientsList = (p.full_data && p.full_data.clients) || [];
                        for (var j = 0; j < clientsList.length; j++) {
                            var c = clientsList[j];
                            if ((c.accessCode || '').trim().toUpperCase() === code) {
                                foundClient = c;
                                foundTrainerId = p.trainer_id;
                                foundTrainerData = p.full_data;
                                break;
                            }
                        }
                        if (foundClient) break;
                    }
                }
            } catch(e) {
                console.warn("Supabase cross-trainer search failed:", e);
            }
        }

        // 2. Fallback: Buscar localmente en todos los perfiles guardados
        if (!foundClient) {
            for (var i = 0; i < localStorage.length; i++) {
                var key = localStorage.key(i);
                if (key && key.indexOf('fitnessAppData_') === 0) {
                    try {
                        var raw = localStorage.getItem(key);
                        if (raw) {
                            var parsed = JSON.parse(raw);
                            var clientsList = parsed.clients || [];
                            for (var j = 0; j < clientsList.length; j++) {
                                var c = clientsList[j];
                                if ((c.accessCode || '').trim().toUpperCase() === code) {
                                    foundClient = c;
                                    foundTrainerId = key.replace('fitnessAppData_', '');
                                    foundTrainerData = parsed;
                                    break;
                                }
                            }
                        }
                    } catch(err) { console.warn("Local storage scan error:", err); }
                }
                if (foundClient) break;
            }
        }

        // 3. Fallback final: Buscar en el listado del activeTrainerId actual
        if (!foundClient) {
            var currentClients = Clients.getAll();
            for (var i = 0; i < currentClients.length; i++) {
                var c = currentClients[i];
                if ((c.accessCode || '').trim().toUpperCase() === code) {
                    foundClient = c;
                    foundTrainerId = window.activeTrainerId || localStorage.getItem('activeTrainerId') || 'admin';
                    break;
                }
            }
        }

        if (foundClient) {
            // Actualizar activeTrainerId al del coach del cliente
            localStorage.setItem('activeTrainerId', foundTrainerId);
            window.activeTrainerId = foundTrainerId;
            if (typeof updateActiveTrainerId === 'function') updateActiveTrainerId(foundTrainerId);

            // Guardar datos del entrenador recuperados localmente para agilizar carga
            if (foundTrainerData) {
                localStorage.setItem('fitnessAppData_' + foundTrainerId, JSON.stringify(foundTrainerData));
            }

            sessionStorage.setItem('clientId', foundClient.id);
            localStorage.setItem('clientId', foundClient.id);

            // Intentar aplicar la marca del coach de inmediato para feedback visual al cliente
            try {
                if (window.BrandConfig) {
                    window.BrandConfig.applyTheme();
                    var brand = window.BrandConfig.get();
                    if (brand && brand.name) {
                        var bNameEl = document.getElementById('brandName');
                        if (bNameEl) bNameEl.textContent = brand.name;
                    }
                    if (brand && brand.logo && document.getElementById('brandLogoContainer')) {
                        document.getElementById('brandLogoContainer').innerHTML =
                            '<img src="' + brand.logo + '" alt="' + (brand.name||'') + '">';
                    }
                }
            } catch(e) { console.warn("Error applying found coach branding:", e); }

            content.textContent = '✓';
            btn.style.background = 'linear-gradient(110deg,#22c55e,#4ade80)';
            setTimeout(function(){ 
                window.location.replace('client-dashboard.html?t=' + foundTrainerId + '&v=332'); 
            }, 400);
        } else {
            showMsg('Código de acceso incorrecto. Por favor, verifícalo.');
            btn.disabled = false;
            content.textContent = 'Acceder';
            codeEl.select();
        }

    } catch(err) {
        console.error('[Login] Error:', err);
        showMsg('Error de red o base de datos. Inténtalo de nuevo.');
        btn.disabled = false;
        content.textContent = 'Acceder';
    }
}
</script>
<script src="js/custom-recipes.js?v=129"></script>
<script src="js/pwa-install.js?v=330"></script>
</body>
</html>
