<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        // Safe localStorage wrapper to prevent QuotaExceededError crashes
        (function() {
            try {
                const originalSetItem = localStorage.setItem;
                localStorage.setItem = function(key, value) {
                    try {
                        originalSetItem.call(localStorage, key, value);
                    } catch (err) {
                        console.warn("Storage write failed for key:", key, err);
                    }
                };
            } catch (e) {}
        })();
        // Force PWA cache bust / reload
        (function() {
            const CURRENT_VERSION = '682';
            window.APP_VERSION = CURRENT_VERSION;
            const savedVersion = localStorage.getItem('app_version');
            if (savedVersion && savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
                if ('caches' in window) {
                    caches.keys().then(keys => {
                        keys.forEach(k => caches.delete(k));
                    });
                }
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(regs) {
                        for (let r of regs) r.unregister();
                    }).finally(function() {
                        window.location.reload(true);
                    });
                } else {
                    window.location.reload(true);
                }
                return;
            } else if (savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
            }
            if (typeof window !== 'undefined' && window.location && navigator.onLine !== false) {
                const checkKey = '_lastVersionCheck';
                const lastCheck = sessionStorage.getItem(checkKey);
                if (!lastCheck || (Date.now() - parseInt(lastCheck) > 10000)) {
                    sessionStorage.setItem(checkKey, String(Date.now()));
                    fetch('/version.json?cb=' + Date.now())
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.version && data.version !== CURRENT_VERSION) {
                                localStorage.setItem('app_version', data.version);
                                if ('caches' in window) {
                                    caches.keys().then(keys => {
                                        keys.forEach(k => caches.delete(k));
                                    });
                                }
                                const params = new URLSearchParams(window.location.search);
                                params.set('v', data.version);
                                window.location.replace(window.location.pathname + '?' + params.toString());
                            }
                        })
                        .catch(() => {});
                }
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscripción Activa - Fitness App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/theme.css?v=682">
    <link rel="stylesheet" href="styles/components.css?v=682">
    <style>
        body {
            background-color: #0B0B1A;
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .success-card {
            background: #15152E;
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            max-width: 450px;
            border: 1px solid #10B981;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div style="font-size: 5rem; margin-bottom: 1rem;">✅</div>
        <h1 style="color: #10B981;">¡Pago Confirmado!</h1>
        <p style="opacity: 0.7; line-height: 1.6; margin-bottom: 2rem;">
            Tu suscripción ha sido renovada con éxito. Ya tienes acceso total a todas las herramientas de gestión de clientes.
        </p>
        <button class="btn btn-primary btn-lg" style="width: 100%;" onclick="window.location.href='trainer-dashboard.html'">
            Ir a mi Panel
        </button>
    </div>

    <!-- Supabase SDK & Service -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-service.js?v=682"></script>

    <script src="js/data-models.js?v=682"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const trainerId = params.get('t') || localStorage.getItem('activeTrainerId');
            
            if (trainerId) {
                const PLATFORM_KEY = 'saasFitnessPlatform';
                
                // 1. Fetch fresh config directly from Supabase to guarantee no data loss or overwrite
                let platform = null;
                if (window.SupabaseService) {
                    window.SupabaseService.init();
                    platform = await window.SupabaseService.getGlobalConfig();
                }

                // Fallback to local storage if Supabase is offline
                if (!platform) {
                    platform = JSON.parse(localStorage.getItem(PLATFORM_KEY) || '{"trainers":[]}');
                }

                if (!platform.trainers) platform.trainers = [];
                const idx = platform.trainers.findIndex(t => t.id === trainerId);
                
                if (idx !== -1) {
                    // 2. Synchronize payment and renewal dates (+30 days)
                    const now = new Date();
                    
                    // Format dates as DD/MM/AAAA to match our database pattern
                    const lastPayStr = `${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
                    
                    const expiry = new Date();
                    expiry.setDate(now.getDate() + 30);
                    const expiryStr = `${expiry.getDate()}/${expiry.getMonth() + 1}/${expiry.getFullYear()}`;
                    
                    platform.trainers[idx].status = 'active';
                    platform.trainers[idx].lastPaymentDate = lastPayStr;
                    platform.trainers[idx].expiryDate = expiryStr;
                    
                    // 3. Save to LocalStorage
                    localStorage.setItem(PLATFORM_KEY, JSON.stringify(platform));
                    console.log("Subscription updated locally for:", trainerId);

                    // 4. Save and sync directly with Supabase Cloud
                    if (window.SupabaseService) {
                        const success = await window.SupabaseService.saveGlobalConfig(platform);
                        if (success) {
                            console.log("Subscription synchronized with Supabase Cloud successfully! ✅");
                        }
                    }
                    
                    // Fallback legacy Firebase sync
                    if (window.FirebaseService && window.FirebaseService.isReady) {
                        await window.FirebaseService.saveData('saasPlatform', 'config', platform);
                    }
                }
            }
        });
    </script>
    <script src="js/custom-recipes.js?v=682"></script></body>
</html>
