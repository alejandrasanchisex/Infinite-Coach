<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Fitness App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/mobile.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <div class="logo">
                    <img id="brandLogo" class="logo-img" alt="Logo" style="display: none;">
                    <span id="brandName">Fitness App</span>
                </div>
                <button class="menu-toggle" onclick="toggleMenu()">☰</button>
                <ul class="nav-links" id="navLinks">
                    <li><a href="client-dashboard.html" class="nav-link active">Inicio</a></li>
                    <li><a href="client-profile.html" class="nav-link">Ficha Técnica</a></li>

                    <li><a href="client-login.html" class="nav-link">Salir</a></li>
                </ul>
                <div id="clientProfileAvatar" style="width: 35px; height: 35px; border-radius: 50%; background: var(--primary-color); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 800; color: #000; overflow: hidden; border: 2px solid rgba(255,255,255,0.1); margin-left: 15px; cursor: pointer; flex-shrink: 0;" onclick="window.location.href='client-profile.html'">
                    U
                </div>
                <button class="menu-toggle" onclick="toggleMenu()" style="margin-left: 10px;">☰</button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Bienvenida Premium -->
            <div class="mb-xl flex-between align-center" style="padding: 10px 0;">
                <div class="flex-col">
                    <h1 style="margin: 0; font-size: 1.8rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; line-height: 1.2;">Hola, <span id="clientName">Cliente</span>! 👋</h1>
                    <p class="text-muted" style="margin-top: 5px; font-size: 0.9rem;">Hoy es un gran día para entrenar.</p>
                </div>
                <div id="todayDate" class="text-xs uppercase letter-spacing-1" style="background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.08);">---</div>
            </div>

            <!-- SECCIÓN WOW: TU OBJETIVO DE HOY (Estilo Apple Fitness+) -->
            <div id="todayTargetSection" class="mb-xl" style="display: none;">
                <div class="card" style="background: linear-gradient(135deg, #1e1e1e 0%, #000 100%); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 25px; overflow: hidden; position: relative;">
                    <!-- Decoración visual de fondo -->
                    <div style="position: absolute; top: -20px; right: -20px; width: 120px; height: 120px; background: var(--primary-color); filter: blur(60px); opacity: 0.15; z-index: 1;"></div>
                    
                    <div style="position: relative; z-index: 2;">
                        <h3 class="text-xs uppercase letter-spacing-2 mb-sm" style="color: var(--primary-color); font-weight: 700;">🎯 TU OBJETIVO DE HOY</h3>
                        <div id="sessionSummary">
                            <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; color: #fff;" id="nextSessionName">Sesión de Entrenamiento</h2>
                            <div class="flex align-center gap-md" style="margin-bottom: 20px;">
                                <div style="display: flex; align-items: center; gap: 5px; color: #aaa; font-size: 0.85rem;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                                    <span id="sessionExercises">---</span> ejercicios
                                </div>
                                <div style="display: flex; align-items: center; gap: 5px; color: #aaa; font-size: 0.85rem;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                    45-60 min
                                </div>
                            </div>
                            <button class="btn btn-primary" onclick="window.location.href='client-routine.html'" style="width: 100%; justify-content: center; padding: 16px; border-radius: 16px; font-weight: 800; font-size: 1rem; box-shadow: 0 10px 25px rgba(var(--primary-color-rgb), 0.3);">
                                EMPEZAR AHORA
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Accesos Rápidos (Estilo corregido) -->
            <div class="mb-xl">
                <h3 class="mb-md text-xs uppercase letter-spacing-1" style="color: var(--primary-color); opacity: 0.8;">Mis Herramientas</h3>
                <div class="grid grid-2 gap-md">
                    <!-- Rutina -->
                    <button class="btn main-tool-card tool-routine" onclick="window.location.href='client-routine.html'">
                        <span class="tool-emoji">💪</span>
                        <span class="tool-title">Mi Rutina</span>
                    </button>

                    <!-- Dieta -->
                    <button class="btn main-tool-card tool-diet" onclick="window.location.href='client-diet.html'">
                        <span class="tool-emoji">🥗</span>
                        <span class="tool-title">Mi Dieta</span>
                    </button>

                    <!-- Hábitos Diarios -->
                    <button class="btn main-tool-card tool-habits" onclick="window.location.href='client-habits.html'">
                        <span class="tool-emoji">📈</span>
                        <span class="tool-title">Hábitos</span>
                    </button>

                    <!-- Seguimiento -->
                    <button class="btn main-tool-card tool-evolution" onclick="window.location.href='client-evolution.html'">
                        <span class="tool-emoji">📅</span>
                        <span class="tool-title">Evolución</span>
                    </button>

                    <!-- Revisión -->
                    <button class="btn main-tool-card" onclick="window.location.href='client-feedback.html'">
                        <span class="tool-emoji">📝</span>
                        <span class="tool-title">Revisión</span>
                    </button>

                    <!-- Contacto -->
                    <button class="btn main-tool-card" onclick="contactTrainer()">
                        <span class="tool-emoji">💬</span>
                        <span class="tool-title">Contacto</span>
                    </button>

                    <!-- Quota Pay (Hidden if not needed) -->
                    <button class="btn main-tool-card" id="payQuotaBtn" style="display: none; border: 1px solid var(--primary-color);" onclick="openPaymentModal()">
                        <span class="tool-emoji">💳</span>
                        <span class="tool-title">Pagar Cuota</span>
                    </button>
                </div>
            </div>

            <style>
                .main-tool-card {
                    background: rgba(255,255,255,0.03);
                    border: 1px solid rgba(255,255,255,0.08);
                    border-radius: 20px;
                    height: 125px;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    gap: 12px;
                    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                }
                .main-tool-card:active { transform: scale(0.95); background: rgba(255,255,255,0.08); }
                .tool-emoji { font-size: 2.5rem; }
                .tool-title { font-size: 0.95rem; font-weight: 700; color: #eee; }
                
                .tool-routine { background: linear-gradient(135deg, rgba(var(--secondary-color-rgb), 0.2) 0%, rgba(0,0,0,0.1) 100%); }
                .tool-habits { border-bottom: 3px solid #4CAF50; }
                .tool-diet { background: linear-gradient(135deg, rgba(var(--primary-color-rgb), 0.1) 0%, rgba(0,0,10,0.5) 100%); }
            </style>
        </div>
    </main>

    <!-- Nuevos Scripts de Google & Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-service.js"></script>

    <!-- Supabase SDK & Service -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-service.js?v=312"></script>

    <script src="js/config.js?v=312"></script>
    <script src="js/data-models.js?v=312"></script>
    <script src="js/utils.js?v=312"></script>
    <script src="js/custom-exercises.js?v=312"></script>
    <script>
        // CLIENT INITIALIZATION
        document.addEventListener('DOMContentLoaded', async () => {
            // Support for Trainer ID in URL (?t=TRAINER_ID)
            const urlParams = new URLSearchParams(window.location.search);
            const clientIdFromUrl = urlParams.get('id');
            const trainerIdFromUrl = urlParams.get('t');
            
            if (clientIdFromUrl) sessionStorage.setItem('clientId', clientIdFromUrl);
            if (trainerIdFromUrl) localStorage.setItem('activeTrainerId', trainerIdFromUrl);

            const clientId = sessionStorage.getItem('clientId');
            if (!clientId) window.location.href = 'client-login.html';

            // Sync with Cloud (Supabase es ahora el primario)
            if (window.SupabaseService) {
                window.SupabaseService.init();
                await window.syncFromCloud();
            } else if (window.FirebaseService) {
                await window.FirebaseService.init();
                await window.syncFromCloud();
            }

            BrandConfig.applyTheme();
            const brand = BrandConfig.get();
            const client = Clients.getById(clientId);

            document.getElementById('brandName').textContent = brand.name;
            if (brand.logo) { document.getElementById('brandLogo').src = brand.logo; document.getElementById('brandLogo').style.display = 'block'; }
            
            if (client) {
                const nameEl = document.getElementById('clientName');
                if (nameEl) nameEl.textContent = client.name.split(' ')[0]; // Solo primer nombre para más cercanía

                const dateEl = document.getElementById('todayDate');
                if (dateEl) {
                    const options = { weekday: 'long', day: 'numeric', month: 'short' };
                    dateEl.textContent = new Date().toLocaleDateString('es-ES', options);
                }

                const avatar = document.getElementById('clientProfileAvatar');
                if (avatar) {
                    if (client.profilePhoto) {
                        avatar.innerHTML = `<img src="${client.profilePhoto}" style="width:100%;height:100%;object-fit:cover;">`;
                        avatar.style.background = 'transparent';
                    } else {
                        avatar.textContent = (client.name || 'U').charAt(0).toUpperCase();
                        avatar.style.background = 'var(--primary-color)';
                    }
                }

                // CARGA DE OBJETIVO DE HOY
                const sessions = Routines.getAll().filter(r => r.clientId === clientId);
                if (sessions.length > 0) {
                    const routine = sessions[0];
                    const exercises = routine.exercises || [];
                    
                    // Lógica Básica: Mostrar la primera sesión o la siguiente según el último entrenamiento (demo)
                    document.getElementById('todayTargetSection').style.display = 'block';
                    document.getElementById('nextSessionName').textContent = routine.name || 'Entrenamiento de Hoy';
                    document.getElementById('sessionExercises').textContent = exercises.length;
                    
                    // Si hay grupos musculares en el nombre, estilizarlos
                    const name = routine.name.toLowerCase();
                    if(name.includes('pecho')) document.getElementById('todayTargetSection').querySelector('.card').style.borderLeft = '4px solid #ff4757';
                    if(name.includes('pierna')) document.getElementById('todayTargetSection').querySelector('.card').style.borderLeft = '4px solid #2ed573';
                }

                // PWA Notification logic
                if (window.Notification && Notification.permission === 'default') {
                    setTimeout(() => NotificationManager.requestPermission(), 3000);
                } else if (window.NotificationManager) {
                    NotificationManager.checkReminders(client, brand);
                }

                // Check if quota payment is needed
                if (client.status === 'unpaid' || client.daysRemaining <= 3) {
                    document.getElementById('payQuotaBtn').style.display = 'flex';
                }
            }
        });

        function openPaymentModal() {
            const brand = BrandConfig.get();
            const methods = brand.paymentMethods || [];
            
            if (methods.length === 0) {
                const pay = brand.paymentSettings || {};
                if (pay.method) methods.push({ type: pay.method, id: pay.id, note: pay.instructions });
            }

            if (methods.length === 0) {
                alert("El entrenador no ha configurado métodos de pago aún. Contacta con él.");
                return;
            }

            if (methods.length === 1) {
                processMethod(methods[0]);
            } else {
                // Selección múltiple
                let msg = "💳 SELECCIONA UN MÉTODO DE PAGO:\n\n";
                methods.forEach((m, i) => {
                    msg += `${i + 1}. ${m.type} (${m.id || ''})\n`;
                });
                msg += "\nEscribe el número de la opción deseada:";
                
                const choice = prompt(msg);
                const index = parseInt(choice) - 1;
                if (methods[index]) {
                    processMethod(methods[index]);
                }
            }
        }

        function processMethod(m) {
            const brand = BrandConfig.get();
            const type = m.type.toLowerCase();
            
            if (['stripe', 'paypal', 'revolut', 'link'].includes(type) || (m.id && m.id.startsWith('http'))) {
                let url = m.id;
                if (url && !url.startsWith('http')) url = 'https://' + url;
                if (url) {
                    window.open(url, '_blank');
                    return;
                }
            }

            // Fallback: Instrucciones (Bizum / Transferencia / Efectivo)
            let msg = `💳 *MÉTODO DE PAGO: ${m.type.toUpperCase()}*\n\n`;
            if (m.id) msg += `📍 *ID/Cuenta:* ${m.id}\n`;
            if (m.note) msg += `📝 *Instrucciones:* ${m.note}\n\n`;
            msg += `_Copia los datos arriba indicados para completar el pago._`;
            
            // Usando modal nativo o custom
            alert(msg.replace(/\*/g, '').replace(/_/g, ''));
        }

        function contactTrainer() {
            const brand = BrandConfig.get();
            const client = Clients.getById(clientId);
            const msg = `Hola ${brand.name}, soy ${client.name}. ¿Podemos hablar?`;
            window.open(generateWhatsAppLink(brand.whatsapp, msg), '_blank');
        }

        function toggleMenu() { document.getElementById('navLinks').classList.toggle('active'); }
    </script>
    <script src="js/custom-recipes.js?v=129"></script></body>
</html>
