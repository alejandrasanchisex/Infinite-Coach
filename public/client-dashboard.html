<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Infinite Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/theme.css?v=330">
    <link rel="stylesheet" href="styles/components.css?v=330">
    <link rel="stylesheet" href="styles/mobile.css?v=330">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body class="theme-client">
    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <div class="logo" style="display: flex; align-items: center; gap: 10px; cursor: pointer;" onclick="window.location.href='client-dashboard.html'">
                    <img id="brandLogo" class="logo-img" alt="Logo" style="display: none;">
                    <span id="brandName">Infinite Coach</span>
                </div>
                <ul class="nav-links" id="navLinks">
                    <li><a href="client-dashboard.html?v=330" class="nav-link active">Inicio</a></li>
                    <li><a href="client-profile.html?v=330" class="nav-link">Ficha Técnica</a></li>

                    <li><a href="client-login.html?v=330" class="nav-link">Salir</a></li>
                </ul>
                <button class="menu-toggle" onclick="toggleMenu()" style="margin-left: auto;">☰</button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Bienvenida Premium -->
            <div class="mb-xl" style="padding: 10px 0;">
                <h1 style="margin: 0; font-size: 1.8rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; line-height: 1.2;">¡Hola! 👋</h1>
                <p class="text-muted" style="margin-top: 5px; font-size: 0.9rem;">Hoy es un gran día para entrenar.</p>
            </div>

            <!-- SECCIÓN WOW: TU OBJETIVO DE HOY (Estilo Apple Fitness+) -->
            <div id="todayTargetSection" class="mb-xl" style="display: none;">
                <div class="card" style="background: linear-gradient(135deg, #1e1e1e 0%, #000 100%); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 25px; overflow: hidden; position: relative;">
                    <!-- Decoración visual de fondo -->
                    <div style="position: absolute; top: -20px; right: -20px; width: 120px; height: 120px; background: var(--primary-color); filter: blur(60px); opacity: 0.15; z-index: 1;"></div>
                    
                    <div style="position: relative; z-index: 2;">
                        <h3 class="text-xs uppercase letter-spacing-2 mb-sm" style="color: var(--primary-color); font-weight: 700;">🎯 TU OBJETIVO DE HOY</h3>
                        <div id="sessionSummary">
                            <h2 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; color: #fff;" id="nextSessionName">Sesión de Entrenamiento</h2>
                            <div class="flex align-center gap-md" style="margin-bottom: 20px;">
                                <div style="display: flex; align-items: center; gap: 5px; color: #aaa; font-size: 0.85rem;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                                    <span id="sessionExercises">---</span> ejercicios
                                </div>
                                <div style="display: flex; align-items: center; gap: 5px; color: #aaa; font-size: 0.85rem;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                    45-60 min
                                </div>
                            </div>
                            <button class="btn btn-primary" onclick="window.location.href='client-routine.html'" style="width: 100%; justify-content: center; padding: 16px; border-radius: 16px; font-weight: 800; font-size: 1rem; box-shadow: 0 10px 25px rgba(var(--primary-color-rgb), 0.3);">
                                EMPEZAR AHORA
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Accesos Rápidos (Estilo corregido) -->
            <div class="mb-xl">
                <h3 class="mb-md text-xs uppercase letter-spacing-1" style="color: var(--primary-color); opacity: 0.8;">Mis Herramientas</h3>
                <div class="grid grid-2 gap-md">
                    <!-- Rutina -->
                    <button class="btn main-tool-card tool-routine" onclick="window.location.href='client-routine.html'">
                        <span class="tool-emoji">💪</span>
                        <span class="tool-title">Mi Rutina</span>
                    </button>

                    <!-- Dieta -->
                    <button class="btn main-tool-card tool-diet" onclick="window.location.href='client-diet.html'">
                        <span class="tool-emoji">🥗</span>
                        <span class="tool-title">Mi Dieta</span>
                    </button>

                    <!-- Hábitos Diarios -->
                    <button class="btn main-tool-card tool-habits" onclick="window.location.href='client-habits.html'">
                        <span class="tool-emoji">📈</span>
                        <span class="tool-title">Hábitos</span>
                    </button>

                    <!-- Seguimiento -->
                    <button class="btn main-tool-card tool-evolution" onclick="window.location.href='client-evolution.html'">
                        <span class="tool-emoji">📅</span>
                        <span class="tool-title">Evolución</span>
                    </button>

                    <!-- Revisión -->
                    <button class="btn main-tool-card" onclick="window.location.href='client-feedback.html'">
                        <span class="tool-emoji">📝</span>
                        <span class="tool-title">Revisión</span>
                    </button>

                    <!-- Contacto -->
                    <button class="btn main-tool-card" onclick="contactTrainer()">
                        <span class="tool-emoji">💬</span>
                        <span class="tool-title">Contacto</span>
                    </button>

                    <!-- Quota Pay (Hidden if not needed) -->
                    <button class="btn main-tool-card" id="payQuotaBtn" style="display: none; border: 1px solid var(--primary-color);" onclick="openPaymentModal()">
                        <span class="tool-emoji">💳</span>
                        <span class="tool-title">Pagar Cuota</span>
                    </button>
                </div>
            </div>

            <style>
                .main-tool-card {
                    background: rgba(255,255,255,0.03);
                    border: 1px solid rgba(255,255,255,0.08);
                    border-radius: 20px;
                    height: 125px;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    gap: 12px;
                    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                }
                .main-tool-card:active { transform: scale(0.95); background: rgba(255,255,255,0.08); }
                .tool-emoji { font-size: 2.5rem; }
                .tool-title { font-size: 0.95rem; font-weight: 700; color: #eee; }
                
                .tool-routine { background: linear-gradient(135deg, rgba(var(--secondary-color-rgb), 0.2) 0%, rgba(0,0,0,0.1) 100%); }
                .tool-habits { border-bottom: 3px solid #4CAF50; }
                .tool-diet { background: linear-gradient(135deg, rgba(var(--primary-color-rgb), 0.1) 0%, rgba(0,0,10,0.5) 100%); }
            </style>
        </div>
    </main>

    <!-- Nuevos Scripts de Google & Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/firebase-service.js"></script>

    <!-- Supabase SDK & Service -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-service.js?v=330"></script>

    <script src="js/config.js?v=330"></script>
    <script src="js/data-models.js?v=330"></script>
    <script src="js/utils.js?v=330"></script>
    <script src="js/custom-exercises.js?v=330"></script>
    <script>
        // CLIENT INITIALIZATION
        // Cache-busting redirect to force loading the latest version on mobile in-app browsers
        const urlParams = new URLSearchParams(window.location.search);
        const versionParam = urlParams.get('v');
        if (versionParam !== '332') {
            urlParams.set('v', '332');
            window.location.replace(window.location.pathname + '?' + urlParams.toString());
        }

        const clientIdFromUrl = urlParams.get('id');
        let trainerIdFromUrl = urlParams.get('t');
        if (trainerIdFromUrl) {
            const lower = trainerIdFromUrl.toLowerCase().trim();
            if (lower === 'asteam' || lower === 'alejandra') {
                trainerIdFromUrl = 'alejandra_asteam_gmail_com';
            }
        }
        
        if (clientIdFromUrl) {
            sessionStorage.setItem('clientId', clientIdFromUrl);
            localStorage.setItem('clientId', clientIdFromUrl);
        }
        if (trainerIdFromUrl) {
            localStorage.setItem('activeTrainerId', trainerIdFromUrl);
            window.activeTrainerId = trainerIdFromUrl;
        } else {
            const activeId = localStorage.getItem('activeTrainerId') || window.activeTrainerId;
            if (!activeId || activeId === 'default' || activeId === 'admin') {
                if (window.location.hostname.includes('infinitecoach.es')) {
                    localStorage.setItem('activeTrainerId', 't-w0iybl7qb');
                    window.activeTrainerId = 't-w0iybl7qb';
                }
            }
        }

        const clientId = sessionStorage.getItem('clientId') || localStorage.getItem('clientId');
        if (!clientId) {
            window.location.replace('client-login.html');
        } else {
            sessionStorage.setItem('clientId', clientId);
            localStorage.setItem('clientId', clientId);
        }

        async function initDashboard() {
            // --- 1. RENDER INMEDIATO DE DATOS LOCALES (UX ULTRA-RÁPIDA) ---
            function renderLocalData() {
                // 1.1 Cargar tema y branding
                try {
                    BrandConfig.applyTheme();
                    const brand = BrandConfig.get() || { name: 'Infinite Coach' };
                    const brandNameEl = document.getElementById('brandName');
                    if (brandNameEl) {
                        brandNameEl.textContent = brand.name || 'Infinite Coach';
                    }
                    const brandLogoEl = document.getElementById('brandLogo');
                    if (brandLogoEl && brand.logo) { 
                        brandLogoEl.src = brand.logo; 
                        brandLogoEl.style.display = 'block'; 
                    }
                } catch(e) { console.warn('Error in brand theme render:', e); }
                // 1.3 Cargar datos del cliente, rutina y cuota
                try {
                    const client = Clients.getById(clientId);
                    if (client) {

                        // Carga de objetivo de hoy (rutina)
                        try {
                            const sessions = Routines.getAll().filter(r => r.clientId === clientId);
                            const targetSec = document.getElementById('todayTargetSection');
                            if (targetSec) {
                                if (sessions.length > 0) {
                                    const routine = sessions[0];
                                    const exercises = routine.exercises || [];
                                    targetSec.style.display = 'block';
                                    const nextSessName = document.getElementById('nextSessionName');
                                    if (nextSessName) nextSessName.textContent = routine.name || 'Entrenamiento de Hoy';
                                    const sessEx = document.getElementById('sessionExercises');
                                    if (sessEx) sessEx.textContent = exercises.length;
                                    
                                    const name = (routine.name || '').toLowerCase();
                                    const cardEl = targetSec.querySelector('.card');
                                    if (cardEl) {
                                        if (name.includes('pecho')) cardEl.style.borderLeft = '4px solid #ff4757';
                                        else if (name.includes('pierna')) cardEl.style.borderLeft = '4px solid #2ed573';
                                        else cardEl.style.borderLeft = 'none';
                                    }
                                } else {
                                    targetSec.style.display = 'none';
                                }
                            }
                        } catch(errRoutine) { console.warn('Error inside routine render:', errRoutine); }

                        // Check if quota payment is needed
                        try {
                            const payQuotaBtn = document.getElementById('payQuotaBtn');
                            if (payQuotaBtn) {
                                if (client.status === 'unpaid' || client.daysRemaining <= 3) {
                                    payQuotaBtn.style.display = 'flex';
                                } else {
                                    payQuotaBtn.style.display = 'none';
                                }
                            }
                        } catch(errQuota) { console.warn('Error inside quota button render:', errQuota); }
                    }
                } catch(e) { console.warn('Error in client data render:', e); }
            }

            // Renderizar localmente al instante
            renderLocalData();

            // --- 2. SINCRONIZACIÓN EN SEGUNDO PLANO (SIN BLOQUEAR LA PANTALLA) ---
            try {
                if (window.SupabaseService) {
                    window.SupabaseService.init();
                    await window.syncFromCloud();
                } else if (window.FirebaseService) {
                    await window.FirebaseService.init();
                    await window.syncFromCloud();
                }
            } catch(e) { console.warn('Cloud sync error:', e); }

            // --- 3. RE-RENDERIZAR CON DATOS ACTUALIZADOS DE LA NUBE ---
            renderLocalData();

            // --- 4. ACCIONES ADICIONALES (STRIPE / NOTIFICACIONES) ---
            const client = Clients.getById(clientId);
            if (!client) {
                localStorage.removeItem('clientId');
                sessionStorage.removeItem('clientId');
                window.location.replace('client-login.html');
                return;
            }

            try {
                // Sincronizar automáticamente el estado de pago cuando regrese de un pago exitoso en Stripe
                const paymentStatusParam = urlParams.get('payment');
                if (paymentStatusParam === 'success') {
                    client.paymentStatus = 'paid';
                    Clients.update(clientId, { paymentStatus: 'paid' });
                    
                    if (typeof showToast === 'function') {
                        showToast('🎉 ¡Pago completado con éxito! Tu cuota está al día.', 'success');
                    }
                    
                    const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                    window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
                    renderLocalData(); // Re-renderizar estado de pago
                }
            } catch(e) { console.warn('Payment success check error:', e); }

            try {
                // PWA Notification logic
                if (window.Notification && Notification.permission === 'default') {
                    setTimeout(() => NotificationManager.requestPermission(), 3000);
                } else if (window.NotificationManager) {
                    NotificationManager.checkReminders(client, BrandConfig.get());
                }
            } catch(e) { console.warn('PWA notification error:', e); }
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            initDashboard();
        } else {
            document.addEventListener('DOMContentLoaded', initDashboard);
        }

        function openPaymentModal() {
            const brand = BrandConfig.get();
            const methods = brand.paymentMethods || [];
            
            if (methods.length === 0) {
                const pay = brand.paymentSettings || {};
                if (pay.method) methods.push({ type: pay.method, id: pay.id, note: pay.instructions });
            }

            if (methods.length === 0) {
                alert("El entrenador no ha configurado métodos de pago aún. Contacta con él.");
                return;
            }

            if (methods.length === 1) {
                processMethod(methods[0]);
            } else {
                // Selección múltiple
                let msg = "💳 SELECCIONA UN MÉTODO DE PAGO:\n\n";
                methods.forEach((m, i) => {
                    msg += `${i + 1}. ${m.type} (${m.id || ''})\n`;
                });
                msg += "\nEscribe el número de la opción deseada:";
                
                const choice = prompt(msg);
                const index = parseInt(choice) - 1;
                if (methods[index]) {
                    processMethod(methods[index]);
                }
            }
        }

        function processMethod(m) {
            const brand = BrandConfig.get();
            const type = m.type.toLowerCase();
            
            if (['stripe', 'paypal', 'revolut', 'link'].includes(type) || (m.id && m.id.startsWith('http'))) {
                let url = m.id;
                if (url && !url.startsWith('http')) url = 'https://' + url;
                if (url) {
                    window.open(url, '_blank');
                    return;
                }
            }

            // Fallback: Instrucciones (Bizum / Transferencia / Efectivo)
            let msg = `💳 *MÉTODO DE PAGO: ${m.type.toUpperCase()}*\n\n`;
            if (m.id) msg += `📍 *ID/Cuenta:* ${m.id}\n`;
            if (m.note) msg += `📝 *Instrucciones:* ${m.note}\n\n`;
            msg += `_Copia los datos arriba indicados para completar el pago._`;
            
            // Usando modal nativo o custom
            alert(msg.replace(/\*/g, '').replace(/_/g, ''));
        }

        function contactTrainer() {
            const brand = BrandConfig.get();
            const storedClientId = sessionStorage.getItem('clientId') || localStorage.getItem('clientId');
            const client = storedClientId ? Clients.getById(storedClientId) : null;
            const clientName = client ? client.name : 'un cliente';
            const msg = `Hola ${brand.name}, soy ${clientName}. ¿Podemos hablar?`;
            window.open(generateWhatsAppLink(brand.whatsapp, msg), '_blank');
        }

        
    </script>
    <script src="js/custom-recipes.js?v=129"></script>
    <script src="js/pwa-install.js?v=330"></script>
</body>
</html>
