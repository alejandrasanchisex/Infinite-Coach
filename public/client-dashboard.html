    <script>
        // Force PWA cache bust / reload
        (function() {
            const CURRENT_VERSION = '363';
            const savedVersion = localStorage.getItem('app_version');
            if (savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        for (let registration of registrations) {
                            registration.unregister();
                        }
                    }).catch(function(err) {
                        console.warn('SW unregister failed:', err);
                    }).finally(function() {
                        window.location.reload(true);
                    });
                } else {
                    window.location.reload(true);
                }
            }
        })();
    </script>

    <script>
        // CLIENT INITIALIZATION
        const urlParams = new URLSearchParams(window.location.search);

        const clientIdFromUrl = urlParams.get('id');
        let trainerIdFromUrl = urlParams.get('t');
        if (trainerIdFromUrl) {
            const lower = trainerIdFromUrl.toLowerCase().trim();
            if (lower === 'asteam' || lower === 'alejandra') {
                trainerIdFromUrl = 't-w0iybl7qb';
            }
        }
        
        if (clientIdFromUrl) {
            sessionStorage.setItem('clientId', clientIdFromUrl);
            localStorage.setItem('clientId', clientIdFromUrl);
        }
        if (trainerIdFromUrl) {
            localStorage.setItem('activeTrainerId', trainerIdFromUrl);
            window.activeTrainerId = trainerIdFromUrl;
        } else {
            const activeId = localStorage.getItem('activeTrainerId') || window.activeTrainerId;
            if (!activeId || activeId === 'default' || activeId === 'admin') {
                localStorage.setItem('activeTrainerId', 'default');
                window.activeTrainerId = 'default';
            }
        }

        const clientId = sessionStorage.getItem('clientId') || localStorage.getItem('clientId');
        if (!clientId) {
            window.location.replace('client-login.html');
        } else {
            sessionStorage.setItem('clientId', clientId);
            localStorage.setItem('clientId', clientId);
        }

        async function initDashboard() {
            // --- 1. RENDER INMEDIATO DE DATOS LOCALES (UX ULTRA-RÁPIDA) ---
            function renderLocalData() {
                // 1.1 Cargar tema y branding
                try {
                    BrandConfig.applyTheme();
                    const brand = BrandConfig.get() || { name: 'Infinite Coach' };
                    const brandNameEl = document.getElementById('brandName');
                    if (brandNameEl) {
                        brandNameEl.textContent = brand.name || 'Infinite Coach';
                    }
                    const brandLogoEl = document.getElementById('brandLogo');
                    if (brandLogoEl && brand.logo) { 
                        brandLogoEl.src = brand.logo; 
                        brandLogoEl.style.display = 'block'; 
                    }
                } catch(e) { console.warn('Error in brand theme render:', e); }
                // 1.3 Cargar datos del cliente, rutina y cuota
                try {
                    const client = Clients.getById(clientId);
                    if (client) {

                        // Carga de objetivo de hoy (rutina)
                        try {
                            let routineToShow = null;
                            let exercisesCount = 0;
                            
                            const blocks = typeof TrainingBlocks !== 'undefined' ? TrainingBlocks.getByClientId(clientId) : [];
                            const publishedBlocks = blocks.filter(b => b.published == true || b.published == 'true' || b.published == 1);
                            
                            if (publishedBlocks.length > 0) {
                                publishedBlocks.sort((a, b) => new Date(b.startDate || 0) - new Date(a.startDate || 0));
                                const pBlock = publishedBlocks[0];
                                if (pBlock.weeks && pBlock.weeks.length > 0) {
                                    const userLogs = typeof TrainingLogs !== 'undefined' ? TrainingLogs.getByClientId(clientId) : [];
                                    
                                    function checkWeekComp(w, wIdx) {
                                        if (!w) return false;
                                        const days = w.days ? w.days.map((_, i) => i + 1) : [...new Set((w.exercises || []).map(e => e.day))];
                                        const logicId = w.id || `block_${pBlock.id}_week_${wIdx}`;
                                        const activeDays = days.filter(d => {
                                            const ex = w.days ? w.days[d-1]?.exercises : (w.exercises || []).filter(e => e.day === d);
                                            return ex && ex.length > 0;
                                        });
                                        if (activeDays.length === 0) return true;
                                        return activeDays.every(d => {
                                            return userLogs.some(l => (l.routineId === w.id || l.routineId === logicId) && l.dayNumber === d && l.completed);
                                        });
                                    }

                                    let activeWeekIdx = pBlock.weeks.findIndex((w, idx) => {
                                        return !checkWeekComp(w, idx) && w.days && w.days.some(d => d.exercises && d.exercises.length > 0);
                                    });
                                    if (activeWeekIdx === -1) activeWeekIdx = 0;
                                    
                                    const activeWeek = pBlock.weeks[activeWeekIdx];
                                    if (activeWeek) {
                                        const days = activeWeek.days ? activeWeek.days.map((_, i) => i + 1) : [...new Set((activeWeek.exercises || []).map(e => e.day))].sort((a,b)=>a-b);
                                        const logicId = activeWeek.id || `block_${pBlock.id}_week_${activeWeekIdx}`;
                                        let activeDay = null;
                                        
                                        for (const d of days) {
                                            const isCompleted = userLogs.some(l => (l.routineId === activeWeek.id || l.routineId === logicId) && l.dayNumber === d && l.completed);
                                            const dayEx = activeWeek.days ? (activeWeek.days[d-1]?.exercises || []) : (activeWeek.exercises || []).filter(e=>e.day===d);
                                            if (dayEx.length > 0 && !isCompleted) {
                                                activeDay = d;
                                                break;
                                            }
                                        }
                                        if (!activeDay && days.length > 0) activeDay = days[0];
                                        
                                        if (activeDay) {
                                            const dayEx = activeWeek.days ? (activeWeek.days[activeDay-1]?.exercises || []) : (activeWeek.exercises || []).filter(e=>e.day===activeDay);
                                            routineToShow = {
                                                name: `${pBlock.name} - ${activeWeek.name || `Semana ${activeWeekIdx + 1}`} - Día ${activeDay}`,
                                                description: activeWeek.description || ''
                                            };
                                            exercisesCount = dayEx.length;
                                        }
                                    }
                                }
                            }
                            
                            if (!routineToShow) {
                                const sessions = Routines.getAll().filter(r => r.clientId === clientId);
                                if (sessions.length > 0) {
                                    const routine = sessions[0];
                                    routineToShow = {
                                        name: routine.name || 'Entrenamiento de Hoy',
                                        description: routine.description || ''
                                    };
                                    exercisesCount = (routine.exercises || []).length;
                                }
                            }
                            
                            const targetSec = document.getElementById('todayTargetSection');
                            if (targetSec) {
                                if (routineToShow) {
                                    targetSec.style.display = 'block';
                                    const nextSessName = document.getElementById('nextSessionName');
                                    if (nextSessName) nextSessName.textContent = routineToShow.name;
                                    const sessEx = document.getElementById('sessionExercises');
                                    if (sessEx) sessEx.textContent = exercisesCount;
                                    
                                    const name = (routineToShow.name || '').toLowerCase();
                                    const cardEl = targetSec.querySelector('.card');
                                    if (cardEl) {
                                        if (name.includes('pecho')) cardEl.style.borderLeft = '4px solid #ff4757';
                                        else if (name.includes('pierna')) cardEl.style.borderLeft = '4px solid #2ed573';
                                        else cardEl.style.borderLeft = 'none';
                                    }
                                } else {
                                    targetSec.style.display = 'none';
                                }
                            }
                        } catch(errRoutine) { console.warn('Error inside routine render:', errRoutine); }

                        // Check if quota payment is needed
                        try {
                            const payQuotaBtn = document.getElementById('payQuotaBtn');
                            if (payQuotaBtn) {
                                if (client.status === 'unpaid' || client.daysRemaining <= 3 || client.paymentStatus !== 'paid') {
                                    payQuotaBtn.style.display = 'flex';
                                } else {
                                    payQuotaBtn.style.display = 'none';
                                }
                            }
                        } catch(errQuota) { console.warn('Error inside quota button render:', errQuota); }

                        // Verificar bloqueos de acceso (Opción 3)
                        try {
                            const blockerOverlay = document.getElementById('accessBlockerOverlay');
                            const blockerTitle = document.getElementById('blockerTitle');
                            const blockerMessage = document.getElementById('blockerMessage');
                            const blockerPayBtn = document.getElementById('blockerPayBtn');

                            if (blockerOverlay) {
                                const isInactive = client.status === 'inactive';
                                const isUnpaid = client.paymentStatus !== 'paid' || client.status === 'unpaid';

                                if (isInactive || isUnpaid) {
                                    blockerOverlay.style.display = 'flex';
                                    
                                    if (isInactive) {
                                        // Bloqueo manual por el entrenador
                                        if (blockerTitle) blockerTitle.textContent = "Acceso Suspendido";
                                        if (blockerMessage) blockerMessage.textContent = "Tu cuenta se encuentra inactiva por decisión del entrenador. Contacta directamente con Alejandra para reactivar tu acceso.";
                                        if (blockerPayBtn) blockerPayBtn.style.display = 'none';
                                        
                                        const iconGlow = blockerOverlay.querySelector('.blocker-icon-glow');
                                        if (iconGlow) {
                                            iconGlow.textContent = "🔒";
                                            iconGlow.style.borderColor = "rgba(255, 179, 64, 0.3)";
                                            iconGlow.style.boxShadow = "0 0 20px rgba(255, 179, 64, 0.2)";
                                        }
                                        const cardEl = blockerOverlay.querySelector('.blocker-card');
                                        if (cardEl) {
                                            cardEl.style.boxShadow = "0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 179, 64, 0.15)";
                                        }
                                    } else {
                                        // Bloqueo automático por impago
                                        if (blockerTitle) blockerTitle.textContent = "Renovar Suscripción";
                                        if (blockerMessage) blockerMessage.textContent = "Tu acceso está temporalmente inactivo debido a que tu suscripción ha expirado. Realiza el pago para continuar entrenando y viendo tu dieta.";
                                        if (blockerPayBtn) blockerPayBtn.style.display = 'flex';
                                        
                                        const iconGlow = blockerOverlay.querySelector('.blocker-icon-glow');
                                        if (iconGlow) {
                                            iconGlow.textContent = "💳";
                                            iconGlow.style.borderColor = "rgba(255, 71, 87, 0.3)";
                                            iconGlow.style.boxShadow = "0 0 20px rgba(255, 71, 87, 0.2)";
                                        }
                                        const cardEl = blockerOverlay.querySelector('.blocker-card');
                                        if (cardEl) {
                                            cardEl.style.boxShadow = "0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 71, 87, 0.15)";
                                        }
                                    }
                                } else {
                                    blockerOverlay.style.display = 'none';
                                }
                            }
                        } catch(errBlocker) { console.warn('Error rendering access blocker overlay:', errBlocker); }
                        
                        // Check if last feedback has a new response
                        try {
                            const feedbackBtn = document.getElementById('feedbackBtn');
                            if (feedbackBtn) {
                                const existingBadge = feedbackBtn.querySelector('.notification-badge');
                                if (existingBadge) existingBadge.remove();

                                const clientFeedbacks = Feedbacks.getByClientId(clientId);
                                const lastFb = clientFeedbacks.length > 0 ? clientFeedbacks.sort((a,b) => new Date(b.date) - new Date(a.date))[0] : null;
                                const hasNewResponse = lastFb && lastFb.trainerResponse && lastFb.trainerResponse.trim() !== '' && !localStorage.getItem('read_response_' + lastFb.id);

                                if (hasNewResponse) {
                                    const badge = document.createElement('span');
                                    badge.className = 'notification-badge';
                                    badge.style.cssText = 'background: #FF4757; color: white; font-size: 0.65rem; font-weight: 800; border-radius: 10px; padding: 2px 8px; position: absolute; top: 10px; right: 10px; box-shadow: 0 0 10px rgba(255, 71, 87, 0.4); animation: pulse 2s infinite;';
                                    badge.textContent = 'NUEVO';
                                    feedbackBtn.style.position = 'relative';
                                    feedbackBtn.appendChild(badge);
                                }
                            }
                        } catch(errFeedback) { console.warn('Error in feedback badge render:', errFeedback); }
                    }
                } catch(e) { console.warn('Error in client data render:', e); }
            }

            // Renderizar localmente al instante
            renderLocalData();

            // --- 2. SINCRONIZACIÓN EN SEGUNDO PLANO (SIN BLOQUEAR LA PANTALLA) ---
            try {
                if (window.SupabaseService) {
                    window.SupabaseService.init();
                    await window.syncFromCloud();
                } else if (window.FirebaseService) {
                    await window.FirebaseService.init();
                    await window.syncFromCloud();
                }
            } catch(e) { console.warn('Cloud sync error:', e); }

            // --- 3. RE-RENDERIZAR CON DATOS ACTUALIZADOS DE LA NUBE ---
            renderLocalData();

            // --- 4. ACCIONES ADICIONALES (STRIPE / NOTIFICACIONES) ---
            const client = Clients.getById(clientId);
            if (!client) {
                localStorage.removeItem('clientId');
                sessionStorage.removeItem('clientId');
                window.location.replace('client-login.html');
                return;
            }

            try {
                // Sincronizar automáticamente el estado de pago cuando regrese de un pago exitoso en Stripe
                const paymentStatusParam = urlParams.get('payment');
                if (paymentStatusParam === 'success') {
                    client.paymentStatus = 'paid';
                    Clients.update(clientId, { paymentStatus: 'paid' });
                    
                    if (typeof showToast === 'function') {
                        showToast('🎉 ¡Pago completado con éxito! Tu cuota está al día.', 'success');
                    }
                    
                    const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
                    window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
                    renderLocalData(); // Re-renderizar estado de pago
                }
            } catch(e) { console.warn('Payment success check error:', e); }

            try {
                // PWA Notification logic
                if (window.Notification && Notification.permission === 'default') {
                    setTimeout(() => NotificationManager.requestPermission(), 3000);
                } else if (window.NotificationManager) {
                    NotificationManager.checkReminders(client, BrandConfig.get());
                }
            } catch(e) { console.warn('PWA notification error:', e); }
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            initDashboard();
        } else {
            document.addEventListener('DOMContentLoaded', initDashboard);
        }

        function openPaymentModal() {
            const brand = BrandConfig.get();
            const methods = brand.paymentMethods || [];
            
            if (methods.length === 0) {
                const pay = brand.paymentSettings || {};
                if (pay.method) methods.push({ type: pay.method, id: pay.id, note: pay.instructions });
            }

            if (methods.length === 0) {
                alert("El entrenador no ha configurado métodos de pago aún. Contacta con él.");
                return;
            }

            if (methods.length === 1) {
                processMethod(methods[0]);
            } else {
                // Selección múltiple
                let msg = "💳 SELECCIONA UN MÉTODO DE PAGO:\n\n";
                methods.forEach((m, i) => {
                    msg += `${i + 1}. ${m.type} (${m.id || ''})\n`;
                });
                msg += "\nEscribe el número de la opción deseada:";
                
                const choice = prompt(msg);
                const index = parseInt(choice) - 1;
                if (methods[index]) {
                    processMethod(methods[index]);
                }
            }
        }

        function processMethod(m) {
            const brand = BrandConfig.get();
            const type = m.type.toLowerCase();
            
            if (['stripe', 'paypal', 'revolut', 'link'].includes(type) || (m.id && m.id.startsWith('http'))) {
                let url = m.id;
                if (url && !url.startsWith('http')) url = 'https://' + url;
                if (url) {
                    window.open(url, '_blank');
                    return;
                }
            }

            // Fallback: Instrucciones (Bizum / Transferencia / Efectivo)
            let msg = `💳 *MÉTODO DE PAGO: ${m.type.toUpperCase()}*\n\n`;
            if (m.id) msg += `📍 *ID/Cuenta:* ${m.id}\n`;
            if (m.note) msg += `📝 *Instrucciones:* ${m.note}\n\n`;
            msg += `_Copia los datos arriba indicados para completar el pago._`;
            
            // Usando modal nativo o custom
            alert(msg.replace(/\*/g, '').replace(/_/g, ''));
        }

        function contactTrainer() {
            const brand = BrandConfig.get();
            const storedClientId = sessionStorage.getItem('clientId') || localStorage.getItem('clientId');
            const client = storedClientId ? Clients.getById(storedClientId) : null;
            const clientName = client ? client.name : 'un cliente';
            const msg = `Hola ${brand.name}, soy ${clientName}. ¿Podemos hablar?`;
            window.location.href = generateWhatsAppLink(brand.whatsapp, msg);
        }
