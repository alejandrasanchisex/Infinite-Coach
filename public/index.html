<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        // Force PWA cache bust / reload
        (function() {
            const CURRENT_VERSION = '503';
            const savedVersion = localStorage.getItem('app_version');
            if (savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        for (let registration of registrations) {
                            registration.unregister();
                        }
                    }).catch(function(err) {
                        console.warn('SW unregister failed:', err);
                    }).finally(function() {
                        window.location.reload(true);
                    });
                } else {
                    window.location.reload(true);
                }
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando... - Infinite Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0B0B1A;
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .loader-container {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00D9FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            100% { transform: rotate(362deg); }
        }
        p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }
    </style>
    <script>
        // Redirigir de inmediato al destino correcto
        try {
            if (window.location.hostname.includes('licencias.ingeniaia.es')) {
                window.location.replace('admin-login.html');
            } else if (localStorage.getItem('_trainerAuthed') === '1') {
                const activeTrainerId = localStorage.getItem('activeTrainerId') || 'default';
                window.location.replace('trainer-dashboard.html?t=' + activeTrainerId);
            } else if (localStorage.getItem('clientId')) {
                window.location.replace('client-dashboard.html?v=503');
            } else if (window.location.hostname.includes('infinitecoach.es')) {
                window.location.replace('client-login.html?v=503');
            } else {
                window.location.replace('trainer-login.html');
            }
        } catch (e) {
            window.location.replace('trainer-login.html');
        }
    </script>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <p>Cargando aplicación...</p>
    </div>
</body>
</html>
