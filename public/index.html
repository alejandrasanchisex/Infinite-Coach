<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        // Safe localStorage wrapper to prevent QuotaExceededError crashes
        (function() {
            try {
                const originalSetItem = localStorage.setItem;
                localStorage.setItem = function(key, value) {
                    try {
                        originalSetItem.call(localStorage, key, value);
                    } catch (err) {
                        console.warn("Storage write failed for key:", key, err);
                    }
                };
            } catch (e) {}
        })();
        // Force PWA cache bust / reload and handle redirects safely
        (function() {
            const CURRENT_VERSION = '656';
            window.APP_VERSION = CURRENT_VERSION;
            const savedVersion = localStorage.getItem('app_version');
            
            if (savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
                localStorage.setItem('app_version', CURRENT_VERSION);
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(regs) {
                        for (let r of regs) r.unregister();
                    }).finally(function() {
                        window.location.reload(true);
                    });
                } else {
                    window.location.reload(true);
                }
                return;
            }

            function doRedirect() {
                try {
                    const params = new URLSearchParams(window.location.search);
                    params.set('v', CURRENT_VERSION);
                    
                    if (window.location.hostname.includes('licencias.ingeniaia.es')) {
                        window.location.replace('admin-login.html');
                    } else if (((typeof localStorage !== 'undefined' && localStorage.getItem('_trainerAuthed') === '1') || (typeof sessionStorage !== 'undefined' && sessionStorage.getItem('_trainerAuthed') === '1'))) {
                        const activeTrainerId = localStorage.getItem('activeTrainerId') || 'default';
                        window.location.replace('trainer-dashboard.html?t=' + activeTrainerId);
                    } else if (localStorage.getItem('clientId')) {
                        window.location.replace('dashboard.html?' + params.toString());
                    } else if (window.location.hostname.includes('infinitecoach.es')) {
                        window.location.replace('acceso.html?' + params.toString());
                    } else {
                        window.location.replace('trainer-login.html');
                    }
                } catch (e) {
                    window.location.replace('trainer-login.html');
                }
            }

            if (typeof window !== 'undefined' && window.location && navigator.onLine !== false) {
                const checkKey = '_lastVersionCheck';
                const lastCheck = sessionStorage.getItem(checkKey);
                if (!lastCheck || (Date.now() - parseInt(lastCheck) > 10000)) {
                    sessionStorage.setItem(checkKey, String(Date.now()));
                    fetch('/version.json?cb=' + Date.now())
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.version && data.version !== CURRENT_VERSION) {
                                localStorage.setItem('app_version', data.version);
                                if ('caches' in window) {
                                    caches.keys().then(keys => {
                                        keys.forEach(k => caches.delete(k));
                                    });
                                }
                                const params = new URLSearchParams(window.location.search);
                                params.set('v', data.version);
                                window.location.replace(window.location.pathname + '?' + params.toString());
                            } else {
                                doRedirect();
                            }
                        })
                        .catch(() => {
                            doRedirect();
                        });
                } else {
                    doRedirect();
                }
            } else {
                doRedirect();
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando... - Infinite Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0B0B1A;
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .loader-container {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00D9FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            100% { transform: rotate(362deg); }
        }
        p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <p>Cargando aplicación...</p>
    </div>
</body>
</html>
