<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Safe localStorage wrapper to prevent QuotaExceededError crashes
        (function() {
            try {
                const originalSetItem = localStorage.setItem;
                localStorage.setItem = function(key, value) {
                    try {
                        originalSetItem.call(localStorage, key, value);
                    } catch (err) {
                        console.warn("Storage write failed for key:", key, err);
                    }
                };
            } catch (e) {}
        })();
        // Force PWA cache bust / reload
        (function() {
            const CURRENT_VERSION = '598';
            window.APP_VERSION = CURRENT_VERSION;
            const savedVersion = localStorage.getItem('app_version');
            if (savedVersion !== CURRENT_VERSION) {
                // Clear cache only, preserve critical session and config keys
                const preserved = ['app_version', 'saasFitnessPlatform', 'activeTrainerId', 'clientId', '_trainerAuthed', '_trainerEmail', '_rememberedTrainerEmail', '_rememberedTrainerKey', '_isSubTrainer', '_subTrainerId', '_subTrainerName', '_subTrainerEmail'];
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && !preserved.includes(key)) keysToRemove.push(key);
                }
                keysToRemove.forEach(k => { try { localStorage.removeItem(k); } catch(e) {} });
                localStorage.setItem('app_version', CURRENT_VERSION);
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(regs) {
                        for (let r of regs) r.unregister();
                    }).finally(function() {
                        window.location.reload(true);
                    });
                } else {
                    window.location.reload(true);
                }
                return;
            }
            if (typeof window !== 'undefined' && window.location && navigator.onLine !== false) {
                const checkKey = '_lastVersionCheck';
                const lastCheck = sessionStorage.getItem(checkKey);
                if (!lastCheck || (Date.now() - parseInt(lastCheck) > 10000)) {
                    sessionStorage.setItem(checkKey, String(Date.now()));
                    fetch('/version.json?cb=' + Date.now())
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.version && data.version !== CURRENT_VERSION) {
                                localStorage.setItem('app_version', data.version);
                                if ('caches' in window) {
                                    caches.keys().then(keys => {
                                        keys.forEach(k => caches.delete(k));
                                    });
                                }
                                const params = new URLSearchParams(window.location.search);
                                params.set('v', data.version);
                                window.location.replace(window.location.pathname + '?' + params.toString());
                            }
                        })
                        .catch(() => {});
                }
            }
        })();
    </script>
    <title>Biblioteca - Infinite Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles/theme.css?v=598">
    <link rel="stylesheet" href="styles/components.css?v=598">
    <link rel="stylesheet" href="styles/mobile.css?v=598">
    <style>
        .library-search-section {
            margin-bottom: 2rem;
        }
        
        .search-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }
        
        .search-wrapper:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(var(--primary-color-rgb), 0.15);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .search-wrapper input {
            background: none;
            border: none;
            color: #fff;
            outline: none;
            font-size: 1rem;
            width: 100%;
            font-family: inherit;
        }
        
        .search-wrapper i {
            color: #64748b;
            font-size: 1.1rem;
        }

        .filter-chips {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .filter-chip {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .filter-chip:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .filter-chip.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #000;
            box-shadow: 0 4px 12px rgba(var(--primary-color-rgb), 0.25);
        }
        
        .folders-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        
        .folder-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .folder-card:hover {
            border-color: rgba(var(--primary-color-rgb), 0.3);
            background: rgba(255, 255, 255, 0.03);
        }

        .folder-header {
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .folder-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .folder-icon-wrapper {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(var(--primary-color-rgb), 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 1.25rem;
        }

        .folder-details h3 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .folder-details span {
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 500;
        }

        .folder-chevron {
            color: #64748b;
            font-size: 1.1rem;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .folder-card.expanded .folder-chevron {
            transform: rotate(180deg);
            color: var(--primary-color);
        }

        .folder-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid transparent;
        }

        .folder-card.expanded .folder-content {
            border-top-color: rgba(255, 255, 255, 0.05);
        }

        .items-list {
            padding: 1rem 1.5rem 1.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            transition: all 0.2s ease;
        }

        .item-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
            transform: translateX(2px);
        }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .item-type-icon {
            font-size: 1.2rem;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .item-type-icon.pdf {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .item-type-icon.video {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }

        .item-text h4 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 650;
            color: #f1f5f9;
        }

        .item-text p {
            margin: 2px 0 0 0;
            font-size: 0.8rem;
            color: #64748b;
            line-height: 1.4;
        }

        .btn-action {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 750;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            transition: all 0.2s;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-action:hover {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(var(--primary-color-rgb), 0.2);
        }

        /* Modal styling */
        .video-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100000;
            padding: 20px;
        }

        .video-modal-container {
            width: 100%;
            max-width: 800px;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            position: relative;
        }

        .video-ratio-wrapper {
            position: relative;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
        }

        .video-ratio-wrapper iframe, 
        .video-ratio-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .modal-video-info {
            padding: 1.5rem;
        }

        .modal-video-info h3 {
            margin: 0 0 8px 0;
            font-size: 1.2rem;
            color: #fff;
        }

        .modal-video-info p {
            margin: 0;
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.5;
        }

        .close-video-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: background 0.2s;
        }

        .close-video-modal:hover {
            background: rgba(255,255,255,0.1);
        }

        @media (max-width: 576px) {
            .item-row {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .btn-action {
                justify-content: center;
                width: 100%;
            }
        }
    </style>
</head>
<body class="theme-client">
    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <div class="logo" style="display: flex; align-items: center; gap: 10px; cursor: pointer;" onclick="window.location.href='dashboard.html'">
                    <img id="brandLogo" class="logo-img" alt="Logo" style="display: none;">
                    <span id="brandName">Infinite Coach</span>
                </div>
                <ul class="nav-links" id="navLinks">
                    <li><a href="dashboard.html?v=598" class="nav-link">Inicio</a></li>
                    <li><a href="profile.html?v=598" class="nav-link">Ficha Técnica</a></li>
                    <li><a href="acceso.html?v=598" class="nav-link">Salir</a></li>
                </ul>
                <button class="menu-toggle" onclick="toggleMenu()" style="margin-left: auto;">☰</button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <header class="mb-xl">
                <h1 class="text-3xl font-bold tracking-tight">Biblioteca de Recursos</h1>
                <p class="text-muted mt-xs">Consulta las guías, PDFs y vídeos de apoyo compartidos por tu entrenador.</p>
            </header>

            <!-- Search and filters -->
            <div class="library-search-section">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="libSearch" placeholder="Buscar guías, ebooks o vídeos..." oninput="updateLibraryGrid()">
                </div>
                <div class="filter-chips">
                    <div class="filter-chip active" id="filter-all" onclick="setFilter('all')">Todos</div>
                    <div class="filter-chip" id="filter-pdf" onclick="setFilter('pdf')">📄 Documentos PDF</div>
                    <div class="filter-chip" id="filter-video" onclick="setFilter('video')">🎥 Videos</div>
                </div>
            </div>

            <!-- Folders List -->
            <div class="folders-container" id="foldersContainer">
                <div style="text-align: center; padding: 4rem; opacity: 0.5;">Cargando biblioteca...</div>
            </div>
        </div>
    </main>

    <!-- Video Embed Modal -->
    <div class="video-modal-overlay" id="videoModal" onclick="handleOverlayClick(event)">
        <div class="video-modal-container">
            <button class="close-video-modal" onclick="closeVideoPlayer()">&times;</button>
            <div class="video-ratio-wrapper" id="playerWrapper">
                <!-- Video player or iframe goes here -->
            </div>
            <div class="modal-video-info">
                <h3 id="modalVideoTitle">Título del Video</h3>
                <p id="modalVideoDesc">Descripción detallada del video técnico o guía de apoyo.</p>
            </div>
        </div>
    </div>

    <!-- Core App JS Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-service.js?v=598"></script>
    <script src="js/config.js?v=598"></script>
    <script src="js/data-models.js?v=598"></script>
    <script src="js/utils.js?v=598"></script>
    
    <script>
        let currentTypeFilter = 'all';
        let itemsCache = [];

        // Hamburger Menu toggle
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            if (navLinks) navLinks.classList.toggle('active');
        }

        function setFilter(type) {
            currentTypeFilter = type;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            document.getElementById('filter-' + type).classList.add('active');
            updateLibraryGrid();
        }

        function toggleFolder(cardElement) {
            const isExpanded = cardElement.classList.contains('expanded');
            
            // Close other folders (optional, for accordion behavior, comment out if you want multiple open)
            document.querySelectorAll('.folder-card').forEach(card => {
                if (card !== cardElement) {
                    card.classList.remove('expanded');
                    const content = card.querySelector('.folder-content');
                    if (content) content.style.maxHeight = null;
                }
            });

            const content = cardElement.querySelector('.folder-content');
            if (!isExpanded) {
                cardElement.classList.add('expanded');
                // Calculate actual content height
                content.style.maxHeight = content.scrollHeight + "px";
            } else {
                cardElement.classList.remove('expanded');
                content.style.maxHeight = null;
            }
        }

        // Extract YouTube ID helper
        function getYouTubeId(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function openVideoPlayer(title, desc, url) {
            const ytId = getYouTubeId(url);
            const wrapper = document.getElementById('playerWrapper');
            
            if (ytId) {
                wrapper.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                // Check if it looks like a direct video file
                const isDirectVideo = url.endsWith('.mp4') || url.endsWith('.webm') || url.endsWith('.ogg') || url.includes('/storage/v1/object/public/');
                if (isDirectVideo) {
                    wrapper.innerHTML = `<video src="${url}" controls autoplay style="width:100%; height:100%;"></video>`;
                } else {
                    // Fallback to iframe embed or external window opening
                    window.open(url, '_blank');
                    return;
                }
            }

            document.getElementById('modalVideoTitle').textContent = title;
            document.getElementById('modalVideoDesc').textContent = desc || 'Sin descripción disponible.';
            document.getElementById('videoModal').style.display = 'flex';
        }

        function closeVideoPlayer() {
            document.getElementById('videoModal').style.display = 'none';
            document.getElementById('playerWrapper').innerHTML = ''; // Stop video playback
        }

        function handleOverlayClick(e) {
            if (e.target.classList.contains('video-modal-overlay')) {
                closeVideoPlayer();
            }
        }

        async function initPage() {
            const clientId = sessionStorage.getItem('clientId') || localStorage.getItem('clientId');
            if (!clientId) {
                window.location.replace('acceso.html');
                return;
            }

            // Sync from Supabase first
            try {
                if (window.SupabaseService) {
                    window.SupabaseService.init();
                    await window.syncFromCloud();
                }
            } catch(e) { console.warn('Cloud sync error in Library:', e); }

            // Apply Theme branding
            let brand = null;
            try {
                BrandConfig.applyTheme();
                brand = BrandConfig.get();
            } catch(e) { console.warn('Error applying branding theme:', e); }

            if (brand && brand.clientSettings && brand.clientSettings.showLibrary === false) {
                window.location.replace('dashboard.html');
                return;
            }

            // Load data
            if (window.Library) {
                itemsCache = Library.getAll();
            } else {
                itemsCache = [];
            }
            updateLibraryGrid();
        }

        function updateLibraryGrid() {
            const container = document.getElementById('foldersContainer');
            const searchVal = document.getElementById('libSearch').value.toLowerCase().trim();
            
            // Filter cache
            const filteredItems = itemsCache.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(searchVal) || 
                                      (item.description && item.description.toLowerCase().includes(searchVal));
                const matchesType = currentTypeFilter === 'all' || item.type === currentTypeFilter;
                return matchesSearch && matchesType;
            });

            // Group by folder
            const groups = {};
            filteredItems.forEach(item => {
                const folderName = (item.folder || 'General').trim();
                if (!groups[folderName]) groups[folderName] = [];
                groups[folderName].push(item);
            });

            const sortedFolderNames = Object.keys(groups).sort();
            
            if (sortedFolderNames.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 4rem; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.08); border-radius: 20px;">
                        <i class="fas fa-folder-open" style="font-size: 2.5rem; color: #475569; margin-bottom: 12px;"></i>
                        <p style="color: #64748b; font-size: 0.95rem; margin: 0;">No se encontraron recursos en la biblioteca.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            sortedFolderNames.forEach((folder, idx) => {
                const folderItems = groups[folder];
                // Check if search active to expand folders by default
                const isSearchActive = searchVal.length > 0;
                const cardClass = isSearchActive ? 'folder-card expanded' : 'folder-card';
                const contentStyle = isSearchActive ? '' : 'style="max-height: null;"';

                html += `
                    <div class="${cardClass}">
                        <div class="folder-header" onclick="toggleFolder(this.parentNode)">
                            <div class="folder-info">
                                <div class="folder-icon-wrapper">
                                    <i class="fas fa-folder"></i>
                                </div>
                                <div class="folder-details">
                                    <h3>${folder}</h3>
                                    <span>${folderItems.length} ${folderItems.length === 1 ? 'recurso' : 'recursos'}</span>
                                </div>
                            </div>
                            <i class="fas fa-chevron-down folder-chevron"></i>
                        </div>
                        <div class="folder-content" ${contentStyle}>
                            <div class="items-list">
                                ${folderItems.map(item => {
                                    const isPdf = item.type === 'pdf';
                                    const iconClass = isPdf ? 'fa-file-pdf' : 'fa-play-circle';
                                    const typeIconClass = isPdf ? 'pdf' : 'video';
                                    
                                    let actionButton = '';
                                    if (isPdf) {
                                        actionButton = `<a href="${item.url}" target="_blank" class="btn-action"><i class="fas fa-download"></i> Abrir PDF</a>`;
                                    } else {
                                        actionButton = `<button class="btn-action" onclick="openVideoPlayer('${item.title.replace(/'/g, "\\'")}', '${(item.description || '').replace(/'/g, "\\'")}', '${item.url}')"><i class="fas fa-play"></i> Ver Video</button>`;
                                    }

                                    return `
                                        <div class="item-row">
                                            <div class="item-meta">
                                                <div class="item-type-icon ${typeIconClass}">
                                                    <i class="fas ${iconClass}"></i>
                                                </div>
                                                <div class="item-text">
                                                    <h4>${item.title}</h4>
                                                    <p>${item.description || 'Sin descripción.'}</p>
                                                </div>
                                            </div>
                                            <div>
                                                ${actionButton}
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // If search is active, set the height to scrollHeight so that they appear open
            if (searchVal.length > 0) {
                document.querySelectorAll('.folder-card.expanded .folder-content').forEach(content => {
                    content.style.maxHeight = content.scrollHeight + "px";
                });
            }
        }

        // Initialize on DOM load
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
