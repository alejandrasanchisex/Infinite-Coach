    <script>
        // Safe localStorage wrapper to prevent QuotaExceededError crashes
        (function() {
            try {
                const originalSetItem = localStorage.setItem;
                localStorage.setItem = function(key, value) {
                    try {
                        originalSetItem.call(localStorage, key, value);
                    } catch (err) {
                        console.warn("Storage write failed for key:", key, err);
                    }
                };
            } catch (e) {}
        })();
        // Force PWA cache bust / reload
        (function() {
            const CURRENT_VERSION = '670';
            window.APP_VERSION = CURRENT_VERSION;
            const savedVersion = localStorage.getItem('app_version');
            if (savedVersion && savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
                if ('caches' in window) {
                    caches.keys().then(keys => {
                        keys.forEach(k => caches.delete(k));
                    });
                }
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(regs) {
                        for (let r of regs) r.unregister();
                    }).finally(function() {
                        window.location.reload(true);
                    });
                } else {
                    window.location.reload(true);
                }
                return;
            } else if (savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
            }
            if (typeof window !== 'undefined' && window.location && navigator.onLine !== false) {
                const checkKey = '_lastVersionCheck';
                const lastCheck = sessionStorage.getItem(checkKey);
                if (!lastCheck || (Date.now() - parseInt(lastCheck) > 10000)) {
                    sessionStorage.setItem(checkKey, String(Date.now()));
                    fetch('/version.json?cb=' + Date.now())
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.version && data.version !== CURRENT_VERSION) {
                                localStorage.setItem('app_version', data.version);
                                if ('caches' in window) {
                                    caches.keys().then(keys => {
                                        keys.forEach(k => caches.delete(k));
                                    });
                                }
                                const params = new URLSearchParams(window.location.search);
                                params.set('v', data.version);
                                window.location.replace(window.location.pathname + '?' + params.toString());
                            }
                        })
                        .catch(() => {});
                }
            }
        })();
    </script>

                    new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout de red (Supabase)")), ms))

                        console.warn("No se pudo conectar a Supabase para la config global:", errDb);
                    }

                // 2. Fallback: Firebase (Legacy)
                if (!platformData && window.FirebaseService) {
                    await window.FirebaseService.init();
                    platformData = await window.FirebaseService.getData('saasPlatform', 'config');
                    if (platformData) console.log("Auth: Datos cargados desde Firebase Backup");

                // 3. Fallback: LocalStorage
                if (!platformData) {
                    platformData = JSON.parse(localStorage.getItem(PLATFORM_KEY) || '{"trainers":[]}');

                // 4. Blindaje de contingencia local para licencias profesionales
                if (!platformData) platformData = { trainers: [] };

                );

                    localStorage.removeItem('_subTrainerId');
                    localStorage.removeItem('_subTrainerName');
                    localStorage.removeItem('_subTrainerEmail');
                    
                    // Guardar o eliminar credenciales recordadas

                            localStorage.removeItem('_rememberedTrainerEmail');
                            localStorage.removeItem('_rememberedTrainerKey');

                                window.SupabaseService.init();
                                const trainerData = await withTimeout(window.SupabaseService.getTrainerData(trainer.id), 2500);
                                if (trainerData) {
                                    // Limpiar de forma segura bases de datos de otras sesiones anteriores para evitar contaminación
                                    try {
                                        for (var i = localStorage.length - 1; i >= 0; i--) {
                                            var storageKey = localStorage.key(i);
                                            if (storageKey && storageKey.indexOf('fitnessAppData_') === 0 && storageKey !== 'fitnessAppData_' + trainer.id) {
                                                localStorage.removeItem(storageKey);
                                            }
                                        }
                                    } catch(e) {}

                                        for (var i = sessionStorage.length - 1; i >= 0; i--) {
                                            var storageKey = sessionStorage.key(i);
                                            if (storageKey && storageKey.indexOf('fitnessAppData_') === 0 && storageKey !== 'fitnessAppData_' + trainer.id) {
                                                sessionStorage.removeItem(storageKey);
                                            }
                                        }
                                    } catch(e) {}

                                    localStorage.setItem('fitnessAppData_' + trainer.id, JSON.stringify(trainerData));
                                    console.log("Auth: Datos del entrenador descargados y guardados en localStorage ✅");
                                }

                        const isSaaSDomain = window.location.hostname.includes('licencias.ingeniaia.es');
                        const adminEmail = (platformData.settings && platformData.settings.adminEmail) || 'ingenia@ingeniaia.es';
                        
                        if (isSaaSDomain && (email === adminEmail.toLowerCase() || email === 'ingenia@ingeniaia.es')) {
                            sessionStorage.setItem('_isMasterAdmin', 'true');
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'trainer-dashboard.html?t=' + trainer.id;
                        }
                    }, 500);
                } else {
                    // 5. Buscar en los teamMembers de todos los perfiles de entrenador
                    let foundSubTrainer = null;
                    let parentTrainerId = null;
                    let parentTrainerEmail = null;

                    try {
                        let allProfiles = [];
                        if (window.SupabaseService) {
                            window.SupabaseService.init();
                            const { data, error } = await withTimeout(
                                window.SupabaseService.client
                                    .from('trainer_profiles')
                                    .select('trainer_id, teamMembers:full_data->teamMembers'),
                                4500
                            );
                            if (!error && data) {
                                allProfiles = data;
                            }
                        }

                        // Fallback: buscar en localStorage perfiles guardados localmente
                        if (allProfiles.length === 0) {
                            for (let i = 0; i < localStorage.length; i++) {
                                const k = localStorage.key(i);
                                if (k && k.startsWith('fitnessAppData_') && k !== 'fitnessAppData_demo') {
                                    try {
                                        const fd = JSON.parse(localStorage.getItem(k));
                                        const tId = k.replace('fitnessAppData_', '');
                                        allProfiles.push({ trainer_id: tId, teamMembers: fd.teamMembers });
                                    } catch(e) {}
                                }
                            }
                        }

                        // Buscar en todos los perfiles cargados
                        const rawKey = document.getElementById('licenseKey').value.trim();
                        for (const profile of allProfiles) {
                            const teamMembers = profile.teamMembers || [];
                            const member = teamMembers.find(m => 
                                m.email.toLowerCase() === email && 
                                m.password === rawKey
                            );
                            if (member) {
                                foundSubTrainer = member;
                                parentTrainerId = profile.trainer_id;
                                const parentLic = platformData.trainers.find(t => t.id === profile.trainer_id);
                                parentTrainerEmail = parentLic ? parentLic.email : '';
                                break;
                            }
                        }
                    } catch (subTrainerErr) {
                        console.warn("Error buscando sub-entrenador:", subTrainerErr);
                    }

                    if (foundSubTrainer) {
                        statusMsg.style.color = '#10B981';
                        statusMsg.textContent = '¡Acceso de Colaborador concedido! Redirigiendo...';
                        
                        // Guardar localmente para la sesión
                        sessionStorage.setItem('_trainerAuthed', '1');
                        localStorage.setItem('_trainerAuthed', '1');
                        localStorage.setItem('activeTrainerId', parentTrainerId);
                        localStorage.setItem('_trainerEmail', parentTrainerEmail || '');
                        
                        // Guardar variables de sub-entrenador
                        localStorage.setItem('_isSubTrainer', 'true');
                        localStorage.setItem('_subTrainerId', foundSubTrainer.id);
                        localStorage.setItem('_subTrainerName', foundSubTrainer.name);
                        localStorage.setItem('_subTrainerEmail', foundSubTrainer.email);

                        localStorage.setItem(PLATFORM_KEY, JSON.stringify(platformData));

                        // Guardar o eliminar credenciales recordadas
                        try {
                            const rawKey = document.getElementById('licenseKey').value.trim();
                            if (document.getElementById('rememberMe').checked) {
                                localStorage.setItem('_rememberedTrainerEmail', email);
                                localStorage.setItem('_rememberedTrainerKey', rawKey);
                            } else {
                                localStorage.removeItem('_rememberedTrainerEmail');
                                localStorage.removeItem('_rememberedTrainerKey');
                            }
                        } catch(e) { console.warn('Error saving remembered credentials:', e); }

                        // Descargar datos del entrenador de inmediato para que la carga del dashboard sea instantánea
                        statusMsg.textContent = 'Descargando datos de la nube...';
                        if (window.SupabaseService) {
                            try {
                                window.SupabaseService.init();
                                const trainerData = await window.SupabaseService.getTrainerData(parentTrainerId);
                                if (trainerData) {
                                    localStorage.setItem('fitnessAppData_' + parentTrainerId, JSON.stringify(trainerData));
                                    console.log("Auth: Datos del entrenador colaborador descargados y guardados en localStorage ✅");
                                }
                            } catch (errDownload) {
                                console.warn("No se pudieron descargar los datos del parent durante el login:", errDownload);
                            }
                        }

                        setTimeout(() => {
                            window.location.href = 'trainer-dashboard.html?t=' + parentTrainerId;
                        }, 500);
                    } else {
                        throw new Error('Credenciales incorrectas o licencia no válida.');
                    }
                }

            } catch (err) {
                statusMsg.style.color = '#EF4444';
                statusMsg.textContent = err.message;
                submitBtn.disabled = false;
            }
        });
    </script>
