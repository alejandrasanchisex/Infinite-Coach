  <script>
        // Safe localStorage wrapper to prevent QuotaExceededError crashes
        (function() {
            try {
                const originalSetItem = localStorage.setItem;
                localStorage.setItem = function(key, value) {
                    try {
                        originalSetItem.call(localStorage, key, value);
                    } catch (err) {
                        console.warn("Storage write failed for key:", key, err);
                    }
                };
            } catch (e) {}
        })();

  // Force PWA cache bust / reload
        (function() {
            const CURRENT_VERSION = '697';
            window.APP_VERSION = CURRENT_VERSION;
            const savedVersion = localStorage.getItem('app_version');
            if (savedVersion && savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
                if ('caches' in window) {
                    caches.keys().then(keys => {
                        keys.forEach(k => caches.delete(k));
                    });
                }
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(regs) {
                        for (let r of regs) r.unregister();
                    }).finally(function() {
                        window.location.reload(true);
                    });
                } else {
                    window.location.reload(true);
                }
                return;
            } else if (savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
            }
            if (typeof window !== 'undefined' && window.location && navigator.onLine !== false) {
                const checkKey = '_lastVersionCheck';
                const lastCheck = sessionStorage.getItem(checkKey);
                if (!lastCheck || (Date.now() - parseInt(lastCheck) > 10000)) {
                    sessionStorage.setItem(checkKey, String(Date.now()));
                    fetch('/version.json?cb=' + Date.now())
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.version && data.version !== CURRENT_VERSION) {
                                localStorage.setItem('app_version', data.version);
                                if ('caches' in window) {
                                    caches.keys().then(keys => {
                                        keys.forEach(k => caches.delete(k));
                                    });
                                }
                                const params = new URLSearchParams(window.location.search);
                                params.set('v', data.version);
                                window.location.replace(window.location.pathname + '?' + params.toString());
                            }
                        })
                        .catch(() => {});
                }
            }
        })();
    </script>

      (function() {
          var params = new URLSearchParams(window.location.search);
          var tid = params.get('t') || localStorage.getItem('activeTrainerId') || 'default';
          if (tid) {
              var lower = tid.toLowerCase().trim();
              if (lower === 'asteam' || lower === 'alejandra') {
                  tid = 't-w0iybl7qb';
              } else if (lower === 'toledo' || lower === 'vtoledo') {
                  tid = 't-8umeizyns';
              }
          }
          
          // Si el cliente está logueado, intentar deducir su entrenador para PWA
          var clientId = localStorage.getItem('clientId') || sessionStorage.getItem('clientId');
          if (clientId) {
              for (var i = 0; i < localStorage.length; i++) {
                  var key = localStorage.key(i);
                  if (key && key.indexOf('fitnessAppData_') === 0 && key.indexOf('_backup') === -1) {
                      var raw = localStorage.getItem(key);
                      if (raw) {
                          try {
                              var parsed = JSON.parse(raw);
                              if (parsed && parsed.clients) {
                                  for (var j = 0; j < parsed.clients.length; j++) {
                                      if (parsed.clients[j].id === clientId) {
                                          var foundTid = key.replace('fitnessAppData_', '');
                                          if (foundTid && foundTid !== 'default' && foundTid !== 'admin') {
                                              tid = foundTid;
                                              break;
                                          }
                                      }
                                  }
                              }
                          } catch(e) {}
                      }
                  }
                  if (tid && tid !== 'default' && tid !== 'admin') break;
              }
          }
          
          var brandName = 'Infinite Coach';
          var iconUrl = 'img/logo-infinite-coach.png';
          if (tid === 't-w0iybl7qb') {
              brandName = 'ASTeam';
              iconUrl = 'https://bieeydhacavxymoosasx.supabase.co/storage/v1/object/public/Media/1779724548154_Gemini_Generated_Image_vse84nvse84nvse8.png';
          } else if (tid === 't-8umeizyns') {
              brandName = 'Toledo The Bull';
              iconUrl = 'https://bieeydhacavxymoosasx.supabase.co/storage/v1/object/public/Media/1781711106755_toledo_the_bull.png';
          }
          
          document.write('<meta name="apple-mobile-web-app-title" content="' + brandName + '">');
          document.write('<link rel="apple-touch-icon" href="' + iconUrl + '">');
          document.write('<link rel="manifest" href="manifest.json?t=' + tid + '">');
      })();
  </script>

  <script>
    // --- RESOLUCIÓN DE TRAINER ID (FALLBACK SEGURO) ---
    (function() {
        var tParam = new URLSearchParams(window.location.search).get('t');
        if (tParam) {
            tParam = tParam.toLowerCase().trim();
            if (tParam === 'asteam' || tParam === 'alejandra') {
                tParam = 't-w0iybl7qb';
            } else if (tParam === 'toledo' || tParam === 'vtoledo') {
                tParam = 't-8umeizyns';
            }
        }
        var storedTid = localStorage.getItem('activeTrainerId');
        var tid = tParam;
        if (!tid || tid === 'default' || tid === 'admin') {
            if (storedTid && storedTid !== 'default' && storedTid !== 'admin') {
                tid = storedTid;
            } else {
                tid = 'default';
            }
        }
        localStorage.setItem('activeTrainerId', tid);
        window.activeTrainerId = tid;
    })();

    // --- GESTIÓN DE ERRORES ---
    window.onerror = function(msg, url, line) {
        console.error(`Error: ${msg} (Línea ${line})`);
    };

    function updateStatus(msg) {
        const el = document.getElementById('routineName');
        if (el) el.textContent = msg;
    }

    // --- CARGA DE DATOS ---
    let brand = BrandConfig.get() || { name: "Infinite Coach" };
    let clientId = null;
    let client = null;
    let routine = null; // This will hold the "Active Week" if block-based
    let isBlockBased = false;
    let publishedBlock = null;
    let publishedBlocks = [];
    let selectedBlockId = null;
    let currentWeekIdx = 0;
    let currentDayNumber = null;

    function checkWeekCompletion(w, wIdx, userLogs) {
        if (!w) return false;
        const days = w.days ? w.days.map((_, i) => i + 1) : [...new Set((w.exercises || []).map(e => e.day))];
        const logicId = w.id || `block_${publishedBlock?.id}_week_${wIdx}`;
        
        const activeDays = days.filter(d => {
            const ex = w.days ? w.days[d-1]?.exercises : (w.exercises || []).filter(e => e.day === d);
            return ex && ex.length > 0;
        });
        
        if (activeDays.length === 0) return true; // Empty week acts as completed
        
        return activeDays.every(d => {
            return userLogs.some(l => (l.routineId === w.id || l.routineId === logicId) && l.dayNumber === d && l.completed && (!isBlockBased || !publishedBlock || l.blockId === publishedBlock.id));
        });
    }

    // --- INITIALIZATION ---
    async function initializeApp() {
      try {
        // Cleanup local storage for Amalia Delgado's incorrect Week 2 Day 5 log
        try {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith("fitnessAppData_")) {
                    const localRaw = localStorage.getItem(key);
                    if (localRaw) {
                        let localData = JSON.parse(localRaw);
                        if (localData.trainingLogs) {
                            const originalLen = localData.trainingLogs.length;
                            localData.trainingLogs = localData.trainingLogs.filter(l => {
                                if (l.clientId === '0db0ea7a-c413-44cb-b99e-dfd9790383eb' && l.dayNumber === 5) {
                                    const logDate = new Date(l.date || l.createdAt);
                                    if (logDate >= new Date('2026-05-25T00:00:00.000Z')) {
                                        return false; // delete!
                                    }
                                }
                                return true;
                            });
                            if (localData.trainingLogs.length !== originalLen) {
                                localData.lastModified = new Date().toISOString();
                                localStorage.setItem(key, JSON.stringify(localData));
                                console.log(`Comprehensive local cleanup successful for key ${key}`);
                            }
                        }
                    }
                }
            }
        } catch(e) {
            console.error("Local cleanup error:", e);
        }

        // Renderizar localmente al instante
        await renderRoutinePage();

        // Sync with Cloud (Supabase es ahora el primario) en segundo plano
        const runSync = async () => {
            try {
                if (window.SupabaseService) {
                    window.SupabaseService.init();
                    const freshData = await window.syncFromCloud();
                    if (freshData) {
                        await renderRoutinePage();
                    }
                } else if (window.FirebaseService) {
                    await window.FirebaseService.init();
                    const freshData = await window.syncFromCloud();
                    if (freshData) {
                        await renderRoutinePage();
                    }
                }
            } catch(e) { console.warn(e); }
        };
        runSync();
      } catch (e) {
        updateStatus("Fallo al inicializar: " + e.message);
        console.error("Critical Init Error:", e);
      }
    }

    async function renderRoutinePage() {
        try {
            brand = BrandConfig.get() || brand;
            BrandConfig.applyTheme();
            if (document.getElementById('brandName')) document.getElementById('brandName').textContent = brand.name;
            if (brand.logo && document.getElementById('brandLogo')) document.getElementById('brandLogo').src = brand.logo;

            clientId = new URLSearchParams(window.location.search).get('id') || sessionStorage.getItem('clientId') || localStorage.getItem('clientId');
            if (!clientId) {
                window.location.replace('acceso.html');
                return;
            }
            sessionStorage.setItem('clientId', clientId);
            localStorage.setItem('clientId', clientId);

            client = Clients.getById(clientId);
            if (!client) {
                // Sincronización rápida en caliente si el cliente no está en el almacenamiento local
                try {
                    console.log("Client not found locally. Running hot sync before failing...");
                    if (window.SupabaseService) {
                        window.SupabaseService.init();
                        const freshData = await window.syncFromCloud();
                        if (freshData) {
                            client = Clients.getById(clientId);
                        }
                    }
                } catch(syncErr) {
                    console.warn("Hot sync failed:", syncErr);
                }
            }
            if (!client) {
                const activeId = localStorage.getItem('activeTrainerId') || 'default';
                window.location.replace('acceso.html?reauth=true&t=' + activeId);
                return;
            }

            // Redireccionar al Dashboard si está inactivo o tiene pagos pendientes (Opción 3)
            const isInactive = client.status === 'inactive';
            const isUnpaid = client.paymentStatus !== 'paid' || client.status === 'unpaid';
            if (isInactive || isUnpaid) {
                window.location.replace('dashboard.html');
                return;
            }

            if (brand && brand.clientSettings && brand.clientSettings.showRoutine === false) {
                window.location.replace('dashboard.html');
                return;
            }

            // Attach input/change listener for autosave early
            const container = document.getElementById('dayContent');
            if (container && !container.dataset.hasListener) {
                container.addEventListener('input', () => {
                    autosaveSessionDraft();
                });
                container.addEventListener('change', () => {
                    autosaveSessionDraft();
                });
                container.dataset.hasListener = "true";
            }

            // Load Avatar
            const avatar = document.getElementById('clientProfileAvatar');
            if (avatar) {
                if (client.profilePhoto) {
                    avatar.innerHTML = `<img src="${client.profilePhoto}" style="width:100%;height:100%;object-fit:cover;">`;
                    avatar.style.background = 'transparent';
                } else {
                    avatar.textContent = client.name.charAt(0).toUpperCase();
                    avatar.style.background = 'var(--primary-color)';
                }
            }

            // Setup WhatsApp FAB (must be after client is defined)
            const fab = document.getElementById('whatsappFab');
            if (fab && brand && client) {
                const message = `Hola ${brand.name}, soy ${client.name}. Tengo una consulta.`;
                const link = generateWhatsAppLink(brand.whatsapp, message);
                fab.href = link;
                fab.removeAttribute('target');
                fab.onclick = function(e) {
                    e.preventDefault();
                    window.location.href = link;
                };
            }

            // Load Cardio Button Visibility (Move here to avoid early returns)
            const cardioBtn = document.getElementById('cardioBtnContainer');
            if (cardioBtn && (client.cardioPublished !== false) && (client.cardio || client.cardioUrl)) {
                cardioBtn.style.display = 'block';
            }

            const blocks = TrainingBlocks.getByClientId(clientId) || [];
            publishedBlocks = blocks.filter(b => b.published == true || b.published == 'true' || b.published == 1);
            

            
            const selectorContainer = document.getElementById('blockSelectorContainer');
            const selectEl = document.getElementById('blockSelect');

            if (publishedBlocks.length > 1) {
                if (selectorContainer && selectEl) {
                    selectorContainer.style.display = 'block';
                    publishedBlocks.sort((a, b) => new Date(b.startDate || 0) - new Date(a.startDate || 0));
                    
                    if (!selectedBlockId || !publishedBlocks.some(b => b.id === selectedBlockId)) {
                        selectedBlockId = publishedBlocks[0].id;
                    }
                    
                    selectEl.innerHTML = publishedBlocks.map(b => {
                        const isSelected = b.id === selectedBlockId ? 'selected' : '';
                        return `<option value="${b.id}" ${isSelected}>${b.name || 'Programa'}</option>`;
                    }).join('');
                }
            } else {
                if (selectorContainer) selectorContainer.style.display = 'none';
                if (publishedBlocks.length === 1) {
                    selectedBlockId = publishedBlocks[0].id;
                } else {
                    selectedBlockId = null;
                }
            }

            if (selectedBlockId) {
                publishedBlock = publishedBlocks.find(b => b.id === selectedBlockId);
                
                if (publishedBlock && publishedBlock.weeks && publishedBlock.weeks.length > 0) {
                    isBlockBased = true;
                    const userLogsInit = TrainingLogs.getByClientId(clientId);
                    window.localUserLogs = userLogsInit; // Cache logs globally to avoid heavy refetching
                    
                    // Auto-select week with current date relevance, or first one that is NOT completely finished
                    currentWeekIdx = publishedBlock.weeks.findIndex((w, idx) => {
                        const isCompleted = checkWeekCompletion(w, idx, userLogsInit);
                        const hasExercises = w.days && w.days.some(d => d.exercises && d.exercises.length > 0);
                        return !isCompleted && hasExercises;
                    });
                    if (currentWeekIdx === -1) currentWeekIdx = 0; // If all are finished, go to week 1

                    renderWeekTabs();
                    switchWeek(currentWeekIdx);
                    return; // loadRoutine is called by switchWeek
                }
            } else {
                isBlockBased = false;
                publishedBlock = null;
                const wTabs = document.getElementById('weekTabs');
                if (wTabs) wTabs.style.display = 'none';
            }

            if (!routine && client) {
                routine = client.individualRoutine || (client.assignedRoutine ? Routines.getById(client.assignedRoutine) : null);
            }

            loadRoutine();
      } catch (e) {
        updateStatus("Fallo al inicializar: " + e.message);
        console.error("Critical Init Error:", e);
      }
    }

    function renderWeekTabs() {
        const container = document.getElementById('weekTabs');
        if (!container || !publishedBlock || publishedBlock.weeks.length <= 1) return;
        
        container.style.display = 'flex';
        const userLogsInit = window.localUserLogs || TrainingLogs.getByClientId(client.id);

        let nextWeekToHighlight = -1;
        for(let j = 0; j < publishedBlock.weeks.length; j++){
           let w = publishedBlock.weeks[j];
           let complete = checkWeekCompletion(w, j, userLogsInit);
           if(!complete && w.days && w.days.some(d => d.exercises && d.exercises.length > 0)){
               nextWeekToHighlight = j;
               break;
           }
        }

        container.innerHTML = publishedBlock.weeks.map((w, idx) => {
            const isCompleted = checkWeekCompletion(w, idx, userLogsInit);
            let highlightStyle = '';
            // Highlight specific uncompleted week that should be done next
            if (idx === nextWeekToHighlight) {
                highlightStyle = 'border-bottom: 2px solid #ff9d00; color: #ff9d00; background: rgba(255,157,0,0.05); text-shadow: 0 0 8px rgba(255,157,0,0.5);';
            }

            return `
            <button class="tab ${idx === currentWeekIdx ? 'active' : ''}" 
                    style="flex: 0 0 auto; min-width: 100px; padding: 10px 15px; position: relative; ${highlightStyle}"
                    onclick="switchWeek(${idx})">
                ${w.name || `Semana ${idx + 1}`}
                ${isCompleted ? '<span style="color:var(--primary-color); margin-left:6px; font-weight:bold;">✓</span>' : ''}
            </button>
            `;
        }).join('');
    }

    window.switchWeek = function(idx) {
        currentWeekIdx = idx;
        routine = publishedBlock.weeks[idx];
        
        // Update week tab UI
        const buttons = document.querySelectorAll('#weekTabs .tab');
        buttons.forEach((btn, i) => btn.classList.toggle('active', i === idx));
        
        loadRoutine();
    }

    window.switchBlock = function(blockId) {
        selectedBlockId = blockId;
        renderRoutinePage();
    }

    function loadRoutine(selectedDay = null) {
      const orderBtn = document.getElementById('orderWorkoutBtn');
      if (orderBtn) {
        orderBtn.style.display = routine ? 'inline-flex' : 'none';
      }

      if (!routine) return updateStatus("No hay rutina activa asignada");

      try {
        let routineTitle = routine.name || "Entrenamiento";
        if (isBlockBased && publishedBlock) {
            routineTitle = `${publishedBlock.name} - ${routine.name || `Semana ${currentWeekIdx + 1}`}`;
        }
        updateStatus(routineTitle);

        const days = routine.days ? 
          routine.days.map((_, i) => i + 1) : 
          [...new Set((routine.exercises || []).map(e => e.day))].sort((a,b) => a - b);

        const tabsContainer = document.getElementById('dayTabs');
        if (tabsContainer) {
            let nextDayToHighlight = null;
            const currentLogicId = routine.id || (isBlockBased ? `block_${publishedBlock.id}_week_${currentWeekIdx}` : 'standalone');
            const logsToUse = window.localUserLogs || TrainingLogs.getByClientId(client.id);

            tabsContainer.innerHTML = days.map((day, index) => {
               const fallbackBlockWeekId = isBlockBased && publishedBlock ? `block_${publishedBlock.id}_week_${currentWeekIdx}` : null;
               const isCompleted = logsToUse.some(l => (l.routineId === routine.id || l.routineId === currentLogicId || (fallbackBlockWeekId && l.routineId === fallbackBlockWeekId)) && l.dayNumber === day && l.completed && (!isBlockBased || !publishedBlock || l.blockId === publishedBlock.id) && (!isBlockBased || (l.weekIndex !== undefined && l.weekIndex !== null ? l.weekIndex === currentWeekIdx : (l.routineId === routine.id || currentWeekIdx === 0))));
               const dayEx = routine.days ? (routine.days[day-1]?.exercises || []) : (routine.exercises || []).filter(e=>e.day===day);
               const hasEx = dayEx.length > 0;

               if (hasEx && !isCompleted && nextDayToHighlight === null) {
                   nextDayToHighlight = day;
               }

               let highlightStyle = '';
                if (day === nextDayToHighlight) {
                   highlightStyle = 'color: #ff9d00; border-bottom: 2px solid #ff9d00; background: rgba(255,157,0,0.05); text-shadow: 0 0 8px rgba(255,157,0,0.5);';
               }

               let html = `<button class="tab" id="day-tab-${day}" style="${highlightStyle}" onclick="showDay(${day})">`;
               html += `Día ${day}`;
               if (isCompleted) html += ` <span style="color:var(--primary-color); margin-left:4px; font-weight:bold;">✓</span>`;
               html += `</button>`;
               return html;
            }).join('');
            
            if (selectedDay !== null && days.includes(selectedDay)) {
                showDay(selectedDay);
            } else if (nextDayToHighlight) {
                showDay(nextDayToHighlight);
            } else if (days.length > 0) {
                showDay(days[0]);
            }
        }
      } catch (err) {
          updateStatus("Error de visualización: " + err.message);
      }
    }

    function showDay(dayNumber) {
      // Fetch all user logs to check for completion
      const userLogs = TrainingLogs.getByClientId(client.id);

      // Support both structure
      const dayExercises = routine.days ?
        (routine.days[dayNumber - 1]?.exercises || []) :
        (routine.exercises || []).filter(e => e.day === dayNumber);

      const dayObj = routine.days ? routine.days[dayNumber - 1] : null;
      const customDayName = dayObj && dayObj.name ? dayObj.name.trim() : '';
      const isDefaultName = customDayName.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") === `dia ${dayNumber}`;

      const container = document.getElementById('dayContent');

      if (dayExercises.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"></div>

      // Pre-fetch video data if setting allows

      let videoMap = new Map();

      if (showVideosConfig) {
        try {
          // Fallback 1: Media Library
          const allMedia = Media.getAll() || [];
          allMedia.forEach(m => {
            if (m.category === 'exercise') {
              videoMap.set(m.title.toLowerCase().trim(), m.url);
            }
          });

          // Fallback 2: Global Muscle Groups Library (Configured exercises)
          // getData is usually defined in data-models.js
          if (typeof getData === 'function') {
            const data = getData();
            const muscles = data.muscleGroupsConfig || { exercises: {} };

              for (const group in muscles.exercises) {

                        ` : ''}

        ${sessionCompleted && completedLog && completedLog.comment ? `
        <div class="card mt-lg" style="background: rgba(255,255,255,0.02); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px;">

    let autosaveTimeout = null;

    function autosaveSessionDraft() {
        if (!client || !routine || currentDayNumber === null) return;
        const currentRoutineId = routine.id || (isBlockBased ? `block_${publishedBlock.id}_week_${currentWeekIdx}` : 'standalone');
        
        const dayExercises = routine.days ?
          (routine.days[currentDayNumber - 1]?.exercises || []) :
          (routine.exercises || []).filter(e => e.day === currentDayNumber);
          
        const commentVal = document.getElementById('sessionComment') ? document.getElementById('sessionComment').value.trim() : '';

        const draftLog = {
          clientId: client.id,
          routineId: currentRoutineId,
          dayNumber: currentDayNumber,
          weekIndex: isBlockBased ? currentWeekIdx : null,
          comment: commentVal,
          exercises: dayExercises.map((ex, exIdx) => {
            const numSets = Array.isArray(ex.sets) ? ex.sets.length : (parseInt(ex.sets) || 1);
            const setsData = [];
            for (let s = 0; s < numSets; s++) {
              const weightEl = document.getElementById(`weight_${exIdx}_${s}`);
              const repsEl = document.getElementById(`reps_${exIdx}_${s}`);
              const rirEl = document.getElementById(`rir_${exIdx}_${s}`);
              
              setsData.push({
                weight: weightEl ? weightEl.value : '',
                reps: repsEl ? repsEl.value : '',
                rir: rirEl ? rirEl.value : ''
              });
            }
            return {
              name: ex.name,
              sets: setsData
            };
          })
        };

        const draftKey = `draft_training_log_${client.id}_${currentRoutineId}_${currentDayNumber}`;
        localStorage.setItem(draftKey, JSON.stringify(draftLog));

        // Debounced autosave directly to TrainingLogs (local storage and Supabase sync)
        if (autosaveTimeout) clearTimeout(autosaveTimeout);
        autosaveTimeout = setTimeout(async () => {
            console.log("⏱️ Auto-guardando borrador de entrenamiento en base de datos local y Supabase...");
            TrainingLogs.saveDraft(draftLog);
        }, 1000);
    }

    async function saveTrainingSession(dayNumber) {
      if (autosaveTimeout) clearTimeout(autosaveTimeout); // Cancel pending autosave to avoid race conditions
      
      const btn = document.getElementById('completeWorkoutBtn');
      if (btn) {
          btn.disabled = true;
          btn.innerHTML = `<span class="spinner" style="display:inline-block; width:12px; height:12px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:spin 1s infinite linear; margin-right:6px; vertical-align:middle;"></span> Guardando...`;
      }

      const dayExercises = routine.days ?
        (routine.days[dayNumber - 1]?.exercises || []) :
        (routine.exercises || []).filter(e => e.day === dayNumber);

      const currentRoutineId = routine.id || (isBlockBased ? `block_${publishedBlock.id}_week_${currentWeekIdx}` : 'standalone');
      const commentVal = document.getElementById('sessionComment') ? document.getElementById('sessionComment').value.trim() : '';

      const sessionLog = {
        clientId: client.id,
        routineId: currentRoutineId,
        dayNumber: dayNumber,
        weekIndex: isBlockBased ? currentWeekIdx : null,
        comment: commentVal,
        exercises: dayExercises.map((ex, exIdx) => {
          const numSets = Array.isArray(ex.sets) ? ex.sets.length : (parseInt(ex.sets) || 1);
          const setsData = [];
          for (let s = 0; s < numSets; s++) {
            setsData.push({
              weight: document.getElementById(`weight_${exIdx}_${s}`).value || 0,
              reps: document.getElementById(`reps_${exIdx}_${s}`).value || 0,
              rir: document.getElementById(`rir_${exIdx}_${s}`) ? (document.getElementById(`rir_${exIdx}_${s}`).value || 0) : 0
            });
          }
          return {
            name: ex.name,
            sets: setsData
          };
        })
      };

      TrainingLogs.create(sessionLog);

      // Clear autosave draft
      const draftKey = `draft_training_log_${client.id}_${currentRoutineId}_${dayNumber}`;
      localStorage.removeItem(draftKey);
      
      // PR Detection
      sessionLog.exercises.forEach(ex => {
          const bestSet = (ex.sets || []).reduce((best, s) => {
              const w = parseFloat(s.weight) || 0;
              const r = parseInt(s.reps) || 0;
              if (w > best.weight) return { weight: w, reps: r };
              if (w > 0 && w === best.weight && r > best.reps) return { weight: w, reps: r };
              return best;
          }, { weight: 0, reps: 0 });

          if (bestSet.weight > 0) {
              window.checkAndNotifyPR(ex.name, bestSet.weight, bestSet.reps);
          }
      });

      // ── SINCRONIZACIÓN EN SEGUNDO PLANO (SIN BLOQUEAR LA UI) ──────
      // (Gestionado automáticamente por el motor de base de datos a través de la cola secuencial en saveData)

      showToast('¡Entrenamiento completado y guardado!', 'success');

      // Actualizar la interfaz local de inmediato
      window.localUserLogs = TrainingLogs.getByClientId(client.id);
      renderWeekTabs();
      loadRoutine(dayNumber); // Permanecer en el mismo día para mostrar el check verde y el badge
    }

    function contactTrainer() {
      const message = `Hola ${brand.name}, soy ${client.name}. Tengo una consulta sobre mi rutina de entrenamiento.`;
      const link = generateWhatsAppLink(brand.whatsapp, message);
      window.location.href = link;
    }

    function openCardioModal() {
        if (!client) return;
        
        let content = `
            <div style="padding: 10px;">
                <div id="cardioContentBody" class="card bg-secondary p-md rounded-md mb-md" style="font-size: 0.95rem; line-height: 1.6; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2);">
                    ${client.cardio || '<p class="text-secondary text-center">No hay notas específicas de cardio todavía.</p>'}
                </div>
        `;
        
        if (client.cardioUrlVisible && client.cardioUrl) {
            content += `
                <a href="${client.cardioUrl}" target="_blank" class="btn btn-primary btn-full" style="text-decoration: none; margin-top: 10px;">
                    🔗 RECURSO / LINK ADICIONAL
                </a>
            `;
        }
        
        content += `</div>`;
        
        // As defined in components.js or utils.js if showModal exists globally
        if (typeof showModal === 'function') {
            showModal('🏃 Actividad Cardio', content, [
                { text: 'Entendido', class: 'btn-primary', onclick: 'window.closeModal()' }
            ]);
        } else {
            // Fallback to simple alert if showModal is not available
            alert('REVISA TU CARDIO: \n\n' + client.cardio.replace(/<[^>]+>/g, ''));
        }
    }

    window.openOrderModal = function() {
      // Find total number of training days
      const numDays = routine.days ? 
        routine.days.length : 
        [...new Set((routine.exercises || []).map(e => e.day))].length;

      if (!numDays || numDays === 0) {
        alert("Asigna días a tu rutina para poder organizarlos.");
        return;
      }

      // Helper to get day name
      function getDayDisplayName(dNum) {
        if (routine.days && routine.days[dNum - 1]) {
          const dObj = routine.days[dNum - 1];
          const customName = dObj.name ? dObj.name.trim() : '';
          const isDefault = customName.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") === `dia ${dNum}`;
          return isDefault ? `Día ${dNum}` : customName;
        }
        return `Día ${dNum}`;
      }

      // Define structures for different numbers of days
      let structures = [];

      if (numDays === 1) {
        structures = [
          { name: "Estructura Semanal 1", pattern: [1, "descanso", "descanso", "descanso", "descanso", "descanso", "descanso"] },
          { name: "Estructura Semanal 2", pattern: ["descanso", "descanso", "descanso", 1, "descanso", "descanso", "descanso"] },
          { name: "Estructura Semanal 3", pattern: ["descanso", "descanso", "descanso", "descanso", "descanso", 1, "descanso"] }
        ];
      } else if (numDays === 2) {
        structures = [
          { name: "Estructura Semanal 1", pattern: [1, "descanso", "descanso", 2, "descanso", "descanso", "descanso"] },
          { name: "Estructura Semanal 2", pattern: ["descanso", 1, "descanso", "descanso", 2, "descanso", "descanso"] },
          { name: "Estructura Semanal 3", pattern: ["descanso", "descanso", 1, "descanso", "descanso", 2, "descanso"] }
        ];
      } else if (numDays === 3) {
        structures = [
          { name: "Estructura Semanal 1", pattern: [1, "descanso", 2, "descanso", 3, "descanso", "descanso"] },
          { name: "Estructura Semanal 2", pattern: ["descanso", 1, "descanso", 2, "descanso", 3, "descanso"] },
          { name: "Estructura Semanal 3", pattern: [1, "descanso", "descanso", 2, "descanso", 3, "descanso"] }
        ];
      } else if (numDays === 4) {
        structures = [
          { name: "Estructura Semanal 1", pattern: [1, 2, "descanso", 3, 4, "descanso", "descanso"] },
          { name: "Estructura Semanal 2", pattern: ["descanso", 1, 2, "descanso", 3, 4, "descanso"] },
          { name: "Estructura Semanal 3", pattern: ["descanso", "descanso", 1, 2, "descanso", 3, 4] }
        ];
      } else if (numDays === 5) {
        structures = [
          { name: "Estructura Semanal 1", pattern: [1, 2, "descanso", 3, 4, 5, "descanso"] },
          { name: "Estructura Semanal 2", pattern: [1, 2, 3, "descanso", 4, 5, "descanso"] },
          { name: "Estructura Semanal 3", pattern: ["descanso", 1, 2, 3, "descanso", 4, 5] }
        ];
      } else if (numDays === 6) {
        structures = [
          { name: "Estructura Semanal 1", pattern: [1, 2, 3, "descanso", 4, 5, 6] },
          { name: "Estructura Semanal 2", pattern: [1, 2, 3, 4, 5, 6, "descanso"] },
          { name: "Estructura Semanal 3", pattern: ["descanso", 1, 2, 3, 4, 5, 6] }
        ];
      } else {
        // 7 days
        structures = [
          { name: "Estructura Semanal 1", pattern: [1, 2, 3, 4, 5, 6, 7] }
        ];
      }

      // Build HTML content for structures
      let html = `
        <div style="font-family: 'Inter', sans-serif; padding: 4px;">
          <p style="color: var(--text-secondary); margin-bottom: 20px; font-size: 0.9rem; line-height: 1.5;">
            Aquí tienes combinaciones sugeridas para distribuir tus <strong>${numDays} días</strong> de entrenamiento y descanso a lo largo de la semana:
          </p>
          <div style="display: flex; flex-direction: column; gap: 20px;">
      `;

      structures.forEach(struct => {
        html += `
          <div>
            <h4 style="color: var(--primary-color); font-size: 0.85rem; margin-bottom: 8px; font-weight: 700; border-left: 3px solid var(--primary-color); padding-left: 8px; text-transform: uppercase; letter-spacing: 0.5px;">
              ${struct.name}
            </h4>
            <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; overflow: hidden; background: rgba(26, 26, 46, 0.4);">
        `;

        const weekDays = ["L", "M", "X", "J", "V", "S", "D"];

        // Header Row (L, M, X...)
        weekDays.forEach(day => {
          html += `
            <div style="text-align: center; font-weight: bold; background: rgba(255,255,255,0.05); padding: 6px 2px; font-size: 0.7rem; border-bottom: 1px solid rgba(255,255,255,0.08); color: var(--text-secondary);">
              ${day}
            </div>
          `;
        });

        // Data Row
        struct.pattern.forEach(cell => {
          if (cell === "descanso") {
            html += `
              <div style="text-align: center; padding: 6px 2px; display: flex; align-items: center; justify-content: center; min-height: 50px;">
                <span style="font-size: 0.65rem; color: #ffeb3b; font-weight: 500; line-height: 1.2; text-transform: lowercase;">
                  descanso
                </span>
              </div>
            `;
          } else {
            const displayName = getDayDisplayName(cell);
            html += `
              <div style="text-align: center; padding: 6px 2px; background: rgba(0, 217, 255, 0.08); color: var(--primary-color); display: flex; align-items: center; justify-content: center; min-height: 50px; border: 1px solid rgba(0, 217, 255, 0.15); border-radius: 6px; margin: 1px;" title="${displayName}">
                <span style="font-size: 0.65rem; font-weight: 700; line-height: 1.2; word-break: break-word; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; text-transform: uppercase;">
                  ${displayName}
                </span>
              </div>
            `;
          }
        });

        html += `
            </div>
          </div>
        `;
      });

      html += `
          </div>
        </div>
      `;

      showModal("Distribución Semanal Recomendada", html, [{ text: "Entendido", class: "btn-primary", onclick: "window.closeModal()" }], "modal-lg");
    }

    

    // Trigger App Initialization
    initializeApp();
  </script>
