  <script>
      // Force PWA cache bust / reload
      (function() {
          const CURRENT_VERSION = '554';
          const savedVersion = localStorage.getItem('app_version');
          if (savedVersion !== CURRENT_VERSION) {
              localStorage.setItem('app_version', CURRENT_VERSION);
              if ('serviceWorker' in navigator) {
                  navigator.serviceWorker.getRegistrations().then(function(registrations) {
                      for (let registration of registrations) {
                          registration.unregister();
                      }
                  }).catch(function(err) {
                      console.warn('SW unregister failed:', err);
                  }).finally(function() {
                      window.location.reload(true);
                  });
              } else {
                  window.location.reload(true);
              }
          }
      })();
  </script>

  <script>
      (function() {
          var params = new URLSearchParams(window.location.search);
          var tid = params.get('t') || localStorage.getItem('activeTrainerId') || 'default';
          if (tid) {
              var lower = tid.toLowerCase().trim();
              if (lower === 'asteam' || lower === 'alejandra') {
                  tid = 't-w0iybl7qb';
              } else if (lower === 'toledo' || lower === 'vtoledo') {
                  tid = 't-8umeizyns';
              }
          }
          
          // Si el cliente está logueado, intentar deducir su entrenador para PWA
          var clientId = localStorage.getItem('clientId') || sessionStorage.getItem('clientId');
          if (clientId) {
              for (var i = 0; i < localStorage.length; i++) {
                  var key = localStorage.key(i);
                  if (key && key.indexOf('fitnessAppData_') === 0 && key.indexOf('_backup') === -1) {
                      var raw = localStorage.getItem(key);
                      if (raw) {
                          try {
                              var parsed = JSON.parse(raw);
                              if (parsed && parsed.clients) {
                                  for (var j = 0; j < parsed.clients.length; j++) {
                                      if (parsed.clients[j].id === clientId) {
                                          var foundTid = key.replace('fitnessAppData_', '');
                                          if (foundTid && foundTid !== 'default' && foundTid !== 'admin') {
                                              tid = foundTid;
                                              break;
                                          }
                                      }
                                  }
                              }
                          } catch(e) {}
                      }
                  }
                  if (tid && tid !== 'default' && tid !== 'admin') break;
              }
          }
          
          var brandName = 'Infinite Coach';
          var iconUrl = 'img/logo-infinite-coach.png';
          if (tid === 't-w0iybl7qb') {
              brandName = 'ASTeam';
              iconUrl = 'https://bieeydhacavxymoosasx.supabase.co/storage/v1/object/public/Media/1779724548154_Gemini_Generated_Image_vse84nvse84nvse8.png';
          } else if (tid === 't-8umeizyns') {
              brandName = 'Toledo The Bull';
              iconUrl = 'https://bieeydhacavxymoosasx.supabase.co/storage/v1/object/public/Media/1781711106755_toledo_the_bull.png';
          }
          
          document.write('<meta name="apple-mobile-web-app-title" content="' + brandName + '">');
          document.write('<link rel="apple-touch-icon" href="' + iconUrl + '">');
          document.write('<link rel="manifest" href="manifest.json?t=' + tid + '">');
      })();
  </script>

  <script>
    // --- RESOLUCIÓN DE TRAINER ID (FALLBACK SEGURO) ---
    (function() {
        var tParam = new URLSearchParams(window.location.search).get('t');
        if (tParam) {
            tParam = tParam.toLowerCase().trim();
            if (tParam === 'asteam' || tParam === 'alejandra') {
                tParam = 't-w0iybl7qb';
            } else if (tParam === 'toledo' || tParam === 'vtoledo') {
                tParam = 't-8umeizyns';
            }
        }
        var storedTid = localStorage.getItem('activeTrainerId');
        var tid = tParam;
        if (!tid || tid === 'default' || tid === 'admin') {
            if (storedTid && storedTid !== 'default' && storedTid !== 'admin') {
                tid = storedTid;
            } else {
                tid = 'default';
            }
        }
        localStorage.setItem('activeTrainerId', tid);
        window.activeTrainerId = tid;
    })();

    let clientId = new URLSearchParams(window.location.search).get('id') || sessionStorage.getItem('clientId') || localStorage.getItem('clientId');
    if (!clientId) {
      window.location.replace('client-login.html');
    } else {
      sessionStorage.setItem('clientId', clientId);
      localStorage.setItem('clientId', clientId);
    }

    let client = null;
    let diet = null;
    let showCalories = true;
    let showMacros = true;
    let brand = null;

    function renderDietPage() {
      // Apply brand theme
      BrandConfig.applyTheme();
      brand = BrandConfig.get();
      document.getElementById('brandName').textContent = brand.name;
      if (brand.logo) {
        document.getElementById('brandLogo').src = brand.logo;
        document.getElementById('brandLogo').style.display = 'block';
      }

      showCalories = brand.clientSettings?.showCalories !== false;
      showMacros = brand.clientSettings?.showMacros !== false;

      client = Clients.getById(clientId);
      if (!client) {
          const activeId = localStorage.getItem('activeTrainerId') || 'default';
          window.location.replace('client-login.html?reauth=true&t=' + activeId);
          return;
      }

      // Redireccionar al Dashboard si está inactivo o tiene pagos pendientes (Opción 3)
      const isInactive = client.status === 'inactive';
      const isUnpaid = client.paymentStatus !== 'paid' || client.status === 'unpaid';
      if (isInactive || isUnpaid) {
          window.location.replace('client-dashboard.html');
          return;
      }

      if (brand && brand.clientSettings && brand.clientSettings.showDiet === false) {
          window.location.replace('client-dashboard.html');
          return;
      }

      if (client) {
          const avatar = document.getElementById('clientProfileAvatar');
          if (avatar) {
              if (client.profilePhoto) {
                  avatar.innerHTML = `<img src="${client.profilePhoto}" style="width:100%;height:100%;object-fit:cover;">`;
                  avatar.style.background = 'transparent';
              } else {
                  avatar.textContent = client.name.charAt(0).toUpperCase();
                  avatar.style.background = 'var(--primary-color)';
              }
          }
      }

      let clientDiets = [];
      if (client) {
          const isPublished = client.dietPublished === true || client.dietPublished === undefined;
          if (isPublished) {
              let dietsToMap = [];
              if (client.assignedDiets && Array.isArray(client.assignedDiets)) {
                  dietsToMap = client.assignedDiets;
              } else if (client.assignedDiet) {
                  dietsToMap = [client.assignedDiet];
              }

              clientDiets = dietsToMap.map(id => Diets.getById(id)).filter(Boolean).filter(d => {
                  if (client.publishedDiets && Array.isArray(client.publishedDiets)) {
                      return client.publishedDiets.includes(d.id);
                  }
                  return true;
              });
          }
      }

      // Handle multiple diets selector
      const selectorContainer = document.getElementById('dietSelectorContainer');
      const dietSelect = document.getElementById('dietSelect');
      const dietNameEl = document.getElementById('dietName');

      if (clientDiets.length > 1) {
          if (selectorContainer && dietSelect) {
              selectorContainer.style.display = 'block';
              if (dietNameEl) dietNameEl.style.display = 'none';
              
              let selectedDietId = localStorage.getItem('client_selected_diet_id_' + client.id);
              if (!selectedDietId || !clientDiets.some(d => d.id === selectedDietId)) {
                  selectedDietId = clientDiets[0].id;
              }

              dietSelect.innerHTML = clientDiets.map(d => `
                  <option value="${d.id}" ${d.id === selectedDietId ? 'selected' : ''}>🥗 ${d.name.replace(/^(Copia\s*-\s*)+/gi, '').replace(/\s*\(Copia\)$/gi, '')}</option>
              `).join('');

              diet = Diets.getById(selectedDietId);
          }
      } else {
          if (selectorContainer) selectorContainer.style.display = 'none';
          if (dietNameEl) dietNameEl.style.display = 'block';
          
          diet = clientDiets.length > 0 ? clientDiets[0] : null;
      }
      
      const isSuppPublished = client && client.supplementationPublished !== false;
      if (!isSuppPublished) {
          document.getElementById('suppBtn')?.style.setProperty('display', 'none');
      }

      // Setup WhatsApp FAB
      setupWhatsAppFab();

      if (diet) {
          loadDiet();
      } else {
          document.getElementById('shopBtn')?.parentElement?.style.setProperty('display', 'none');
          console.log('No active diet to show');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      // 1. Renderizar localmente al instante
      renderDietPage();

      // 2. Sincronizar en segundo plano
      const runSync = async () => {
        try {
          if (window.SupabaseService) {
              window.SupabaseService.init();
              const freshData = await window.syncFromCloud();
              if (freshData) {
                  renderDietPage();
              }
          } else if (window.FirebaseService) {
              await window.FirebaseService.init();
              const freshData = await window.syncFromCloud();
              if (freshData) {
                  renderDietPage();
              }
          }
        } catch(e) { console.warn(e); }
      };
      runSync();
    });

    window.switchClientDiet = function (dietId) {
        if (!client) return;
        localStorage.setItem('client_selected_diet_id_' + client.id, dietId);
        diet = Diets.getById(dietId);
        if (diet) {
            loadDiet();
        }
    };

    function setupWhatsAppFab() {
      const fab = document.getElementById('whatsappFab');
      if (fab && brand && client) {
          const message = `Hola ${brand.name}, soy ${client.name}. Tengo una consulta.`;
          const link = generateWhatsAppLink(brand.whatsapp, message);
          fab.href = link;
          fab.removeAttribute('target');
          fab.onclick = function(e) {
              e.preventDefault();
              window.location.href = link;
          };
      }
    }

    function loadDiet() {
      if (!diet) return;

      const cleanedName = diet.name.replace(/^(Copia\s*-\s*)+/gi, '').replace(/\s*\(Copia\)$/gi, '');
      const dietNameEl = document.getElementById('dietName');
      if (dietNameEl) {
          dietNameEl.textContent = cleanedName;
      }
      renderDiet();
    }

    function renderDiet() {
      let mealsToShow = [];
      if (diet && diet.meals && diet.meals.length > 0) {
        mealsToShow = diet.meals;
      } else if (diet && diet.weeklyPlan && diet.weeklyPlan.length > 0) {
        const dayPlan = diet.weeklyPlan.find(d => d.meals && d.meals.length > 0) || diet.weeklyPlan[0];
        if (dayPlan) mealsToShow = dayPlan.meals;
      }

      const container = document.getElementById('dayContent');
      if (!mealsToShow || mealsToShow.length === 0) {
        container.innerHTML = `<div class="empty-state">No hay comidas planificadas</div>`;
        return;
      }

      let html = '';
      
      mealsToShow.forEach((meal, mIdx) => {
          const options = {};
          (meal.foods || []).forEach(f => {
              const opt = Number(f.option || 1);
              if (!options[opt]) options[opt] = { foods: [], stats: { cals: 0, p: 0, c: 0, f: 0 } };
              options[opt].foods.push(f);
              options[opt].stats.cals += parseInt(f.calories || 0);
              options[opt].stats.p += parseFloat(f.protein || 0);
              options[opt].stats.c += parseFloat(f.carbs || 0);
              options[opt].stats.f += parseFloat(f.fat || 0);
          });

          let optKeys = Object.keys(options).map(Number).sort((a, b) => a - b);
          if (optKeys.length === 0) optKeys = [1];

          const slidesHtml = optKeys.map(k => {
              const opt = options[k] || { foods: [], stats: { cals: parseInt(meal.calories || 0), p: 0, c: 0, f: 0 } };
              const photoUrl = (meal.optionPhotos && meal.optionPhotos[k]) || '';
              
              const foodsHtml = opt.foods.map(f => {
                  let qty = f.quantity || '0';
                  // Smart unit detection if only numbers are provided
                  if (/^\d+(\.\d+)?$/.test(qty)) {
                      const n = parseFloat(qty);
                      let type = 'g';
                      if (typeof Foods !== 'undefined') {
                          const dbFood = Foods.getAll().find(dbf => dbf && dbf.name && dbf.name.toLowerCase() === f.name.toLowerCase()) ||
                                         Foods.getAll().find(dbf => dbf && dbf.name && (dbf.name.toLowerCase().includes(f.name.toLowerCase()) || f.name.toLowerCase().includes(dbf.name.toLowerCase())));
                          if (dbFood) type = dbFood.type || 'g';
                      }
                      qty = type === 'unit' ? `${n} uds` : `${n}g`;
                  }
                  
                  return `
                    <div class="food-item">
                      <span class="food-qty">${qty}</span>
                      <span class="food-name">${f.name}</span>
                    </div>
                  `;
              }).join('');

              const label = optKeys.length > 1 ? `Opción ${k}` : 'Opción única';

              return `
                <div class="option-card-full">
                    ${photoUrl ? `
                    <div class="meal-image-container">
                        <img src="${photoUrl}" alt="${meal.name}">
                    </div>` : ''}
                    <div class="meal-info">
                        <div class="option-label">${label}</div>
                        <div class="meal-name-row">${meal.name}${meal.optionIngredients && meal.optionIngredients[k] ? `: <span style="font-weight: normal; color: rgba(255,255,255,0.7);">${meal.optionIngredients[k]}</span>` : ''}</div>
                        <div class="food-list">
                            ${foodsHtml}
                            ${(!foodsHtml && !meal.optionIngredients?.[k] && meal.ingredients) ? `<div class="text-xs text-muted italic">${meal.ingredients}</div>` : ''}
                            ${(!foodsHtml && !meal.optionIngredients?.[k] && !meal.ingredients) ? `<div class="text-xs text-muted italic">Sin detalles</div>` : ''}
                        </div>
                        <div class="mt-xs">
                             ${showCalories ? `<span class="macro-pill">${opt.stats.cals} kcal</span>` : ''}
                             ${showMacros ? `<span class="macro-pill" style="margin-left:5px;">P:${Math.round(opt.stats.p)} C:${Math.round(opt.stats.c)} G:${Math.round(opt.stats.f)}</span>` : ''}
                        </div>
                    </div>
                </div>
              `;
          }).join('');

          html += `
            <div class="meal-card">
                <div class="options-slider-meal">
                    ${slidesHtml}
                </div>
                ${optKeys.length > 1 ? `<div class="swipe-indicator">>>></div>` : ''}
            </div>
          `;
      });

      container.innerHTML = html;
    }

            <h3 style="margin-bottom: 25px; font-size: 0.9rem; text-transform: uppercase; color: var(--primary-color); text-align: center; letter-spacing: 2px;">Totales del Día</h3>

                ${showCalories ? `

                    <div style="font-size: 4rem; font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 0 25px var(--primary-color);">${dailyStats.calories}</div>
                    <div style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--primary-color); margin-top: 15px; font-weight: 700;">Calorías Totales</div>
                </div>` : ''}
                ${showMacros ? `
                <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05);">

                    <div style="color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; font-weight: 600; margin-top: 5px;">Proteína</div>
                </div>
                <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05);">

                    <div style="color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; font-weight: 600; margin-top: 5px;">Grasas</div>
                </div>` : ''}

            <p class="text-muted" style="font-size: 0.9rem;">Usa la barra superior para ver el detalle de cada comida.</p>
        </div>
      `;
    }

    function getMealIcon(type) {
        const icons = {
            'breakfast': '🍳', 'lunch': '🍱', 'dinner': '🌙', 'snack': '🍎',
            'pre-workout': '💪', 'post-workout': '🥤'
        };
        return icons[type?.toLowerCase()] || '🍽️';
    }

    function contactTrainer() {
      const message = `Hola ${brand.name}, soy ${client.name}. Tengo una consulta sobre mi plan nutricional.`;
      const link = generateWhatsAppLink(brand.whatsapp, message);
      window.location.href = link;
    }

    function updateDots(slider) {
        const index = Math.round(slider.scrollLeft / slider.offsetWidth);
        const dots = slider.parentElement.querySelectorAll('.dot');
        dots.forEach((dot, i) => {
            dot.classList.toggle('active', i === index);
        });
    }

    // Shopping List Logic
    function showShoppingList() {
        if (!diet) return;
        const modal = document.getElementById('shopModal');
        const body = document.getElementById('shopListBody');
        
        // Collect all unique foods from ALL options of all meals
        const items = {};
        
        let meals = [];
        if (diet.meals && diet.meals.length > 0) {
            meals = diet.meals;
        } else if (diet.weeklyPlan && diet.weeklyPlan.length > 0) {
            diet.weeklyPlan.forEach(day => {
                if (day.meals && Array.isArray(day.meals)) {
                    meals = meals.concat(day.meals);
                }
            });
        }
        
        meals.forEach(meal => {
            if (meal.foods && Array.isArray(meal.foods) && meal.foods.length > 0) {
                // Include ALL options, not just option 1
                meal.foods.forEach(f => {
                    try {
                        if (!f) return;
                        const name = (f.name || f.title || '').trim();
                        if (!name) return;
                        const qtyStr = f.quantity || '';
                        const opt = Number(f.option || 1);
                        if (!items[name]) items[name] = { name, qties: [], options: new Set() };
                        // Only add quantity once per option to avoid double-counting same food in multiple options
                        if (!items[name].options.has(opt)) {
                            items[name].qties.push(qtyStr);
                            items[name].options.add(opt);
                        }
                    } catch (e) {
                        console.warn("Error processing food item in shopping list:", e, f);
                    }
                });
            }
        });

        const listHtml = Object.values(items).map(item => {
            return `
                <div class="shopping-item" onclick="this.classList.toggle('checked')">
                    <div class="check-box">✓</div>
                    <div style="flex:1;">
                        <div style="font-weight:700; color: var(--text-primary);">${item.name}</div>
                    </div>
                </div>
            `;
        }).join('');

        body.innerHTML = listHtml || '<p class="text-center opacity-50 py-lg">No hay alimentos registrados en la dieta.</p>';
        modal.style.display = 'flex';
    }

    function showSupplementation() {
        const modal = document.getElementById('suppModal');
        const body = document.getElementById('suppListBody');
        
        let content = client.supplementation || '<p class="text-center opacity-50 py-lg">Tu entrenador no ha registrado pautas de suplementación por el momento.</p>';
        
        // Add Shopping Link if visible
        if (client.supplementationUrl && client.supplementationUrlVisible !== false) {
            content += `
                <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
                    <a href="${client.supplementationUrl}" target="_blank" class="btn btn-primary w-100" style="background: var(--primary-color); color: #000; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 800; border-radius: 12px; padding: 15px;">
                        <span>🛒</span> COMPRAR SUPLEMENTOS
                    </a>
                </div>
            `;
        }

        body.innerHTML = content;
        modal.style.display = 'flex';
    }
