<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Force PWA cache bust / reload
        (function() {
            const CURRENT_VERSION = '528';
            const savedVersion = localStorage.getItem('app_version');
            if (savedVersion !== CURRENT_VERSION) {
                localStorage.setItem('app_version', CURRENT_VERSION);
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        for (let registration of registrations) {
                            registration.unregister();
                        }
                    }).catch(function(err) {
                        console.warn('SW unregister failed:', err);
                    }).finally(function() {
                        window.location.reload(true);
                    });
                } else {
                    window.location.reload(true);
                }
            }
        })();
    </script>

    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var tid = params.get('t') || localStorage.getItem('activeTrainerId') || 'default';
            if (tid) {
                var lower = tid.toLowerCase().trim();
                if (lower === 'asteam' || lower === 'alejandra') {
                    tid = 't-w0iybl7qb';
                } else if (lower === 'toledo' || lower === 'vtoledo') {
                    tid = 't-8umeizyns';
                }
            }
            
            // Si el cliente está logueado, intentar deducir su entrenador para PWA
            var clientId = localStorage.getItem('clientId') || sessionStorage.getItem('clientId');
            if (clientId) {
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    if (key && key.indexOf('fitnessAppData_') === 0 && key.indexOf('_backup') === -1) {
                        var raw = localStorage.getItem(key);
                        if (raw) {
                            try {
                                var parsed = JSON.parse(raw);
                                if (parsed && parsed.clients) {
                                    for (var j = 0; j < parsed.clients.length; j++) {
                                        if (parsed.clients[j].id === clientId) {
                                            var foundTid = key.replace('fitnessAppData_', '');
                                            if (foundTid && foundTid !== 'default' && foundTid !== 'admin') {
                                                tid = foundTid;
                                                break;
                                            }
                                        }
                                    }
                                }
                            } catch(e) {}
                        }
                    }
                    if (tid && tid !== 'default' && tid !== 'admin') break;
                }
            }
            
            var brandName = 'Infinite Coach';
            var iconUrl = 'img/logo-infinite-coach.png';
            if (tid === 't-w0iybl7qb') {
                brandName = 'ASTeam';
                iconUrl = 'https://bieeydhacavxymoosasx.supabase.co/storage/v1/object/public/Media/1779724548154_Gemini_Generated_Image_vse84nvse84nvse8.png';
            } else if (tid === 't-8umeizyns') {
                brandName = 'Toledo The Bull';
                iconUrl = 'https://bieeydhacavxymoosasx.supabase.co/storage/v1/object/public/Media/1781711106755_toledo_the_bull.png';
            }
            
            document.write('<meta name="apple-mobile-web-app-title" content="' + brandName + '">');
            document.write('<link rel="apple-touch-icon" href="' + iconUrl + '">');
            document.write('<link rel="manifest" href="manifest.json?t=' + tid + '">');
        })();
    </script>
    <style>
        .habit-card {
            background: rgba(255, 255, 255, 0.03);

        }
        .filter-btn.active, .period-btn.active { 
            background: rgba(255,255,255,0.1); color: #fff; font-weight: 700; 
        }

        .progress-bar-mini {
            width: 70px; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden;
        }

        /* Day Selector Carousel Styles */
        .day-select-carousel {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 0 15px 0;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox */
        }
        .day-select-carousel::-webkit-scrollbar {
            display: none; /* Safari and Chrome */
        }
        .day-select-item {
            flex: 1;
            min-width: 45px;
            text-align: center;
            padding: 10px 6px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        .day-select-item:active {
            transform: scale(0.92);
        }
        .day-select-item.active {
            background: rgba(var(--primary-color-rgb), 0.15);
            border-color: var(--primary-color);
        }
        .day-select-item .day-name {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .day-select-item.active .day-name {
            color: var(--primary-color);
            opacity: 0.9;
        }
        .day-select-item .day-num {
            font-size: 1.15rem;
            font-weight: 700;
            margin-top: 3px;
            color: var(--text-secondary);
        }
        .day-select-item.active .day-num {
            color: var(--primary-color);
        }
    </style>
</head>

    <script>
        const params = new URLSearchParams(window.location.search);
        const urlClientId = params.get('c') || params.get('client');
        const urlTrainerId = params.get('t') || params.get('trainer');
        if (urlClientId) {
            localStorage.setItem('clientId', urlClientId);
            sessionStorage.setItem('clientId', urlClientId);
        }
        if (urlTrainerId) {
            const lower = urlTrainerId.toLowerCase().trim();
            if (lower === 'asteam' || lower === 'alejandra') {
                urlTrainerId = 't-w0iybl7qb';
            } else if (lower === 'toledo' || lower === 'vtoledo') {
                urlTrainerId = 't-8umeizyns';
            }
        }
        const storedTid = localStorage.getItem('activeTrainerId');
        let finalTid = urlTrainerId;
        if (!finalTid || finalTid === 'default' || finalTid === 'admin') {
            if (storedTid && storedTid !== 'default' && storedTid !== 'admin') {
                finalTid = storedTid;
            } else {
                finalTid = 'default';
            }
        }
        localStorage.setItem('activeTrainerId', finalTid);
        window.activeTrainerId = finalTid;

        const clientId = sessionStorage.getItem('clientId') || localStorage.getItem('clientId');
        if (!clientId) { 
            window.location.replace('client-login.html' + window.location.search); 
        } else {
            sessionStorage.setItem('clientId', clientId);
            localStorage.setItem('clientId', clientId);
        }

        // State filters
        let currentHabitFilter = 'all';
        let currentPeriod = 7;

        function getFormattedDate(d) {
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        let selectedDate = getFormattedDate(new Date());

        function renderDaySelector() {
            const container = document.getElementById('daySelectorCarousel');
            if (!container) return;

            const dates = [];
            for (let i = 7; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                dates.push(d);
            }

            container.innerHTML = dates.map(d => {
                const dateStr = getFormattedDate(d);
                const isActive = dateStr === selectedDate;
                let dayName = d.toLocaleDateString('es-ES', { weekday: 'short' }).replace('.', '');
                const dayNum = d.getDate();
                
                const isToday = getFormattedDate(new Date()) === dateStr;
                if (isToday) {
                    dayName = "Hoy";
                }

                return `
                    <div class="day-select-item ${isActive ? 'active' : ''}" onclick="selectDate('${dateStr}')">
                        <div class="day-name">${dayName}</div>
                        <div class="day-num">${dayNum}</div>
                    </div>
                `;
            }).join('');
        }

        window.selectDate = function(dateStr) {
            selectedDate = dateStr;
            renderDaySelector();
            updateDateLabel(dateStr);
            loadHabits(dateStr);
        };

        function updateDateLabel(dateStr) {
            const todayDateLabelEl = document.getElementById('todayDateLabel');
            if (todayDateLabelEl) {
                const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
                const parts = dateStr.split('-');
                const d = new Date(parts[0], parts[1] - 1, parts[2]);
                if (window.safeLocaleDateString) {
                    todayDateLabelEl.textContent = window.safeLocaleDateString(d, dateOptions);
                } else {
                    todayDateLabelEl.textContent = d.toLocaleDateString('es-ES', dateOptions);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!clientId) return;
            // Sincronizar con la nube (Supabase es ahora el primario)
            if (window.SupabaseService) {
                window.SupabaseService.init();
                await window.syncFromCloud();
            } else if (window.FirebaseService) {
                await window.FirebaseService.init();
                await window.syncFromCloud();
            }

            const client = Clients.getById(clientId);
            if (!client) {
                const activeId = localStorage.getItem('activeTrainerId') || 'default';
                window.location.replace('client-login.html?reauth=true&t=' + activeId);
                return;
            }

            // Theme
            BrandConfig.applyTheme();
            const brand = BrandConfig.get();
            if (brand) {
                const bNameEl = document.getElementById('brandName');
                if (bNameEl) bNameEl.textContent = brand.name || 'Infinite Coach';
                const bLogoEl = document.getElementById('brandLogo');
                if (bLogoEl && brand.logo) {
                    bLogoEl.src = brand.logo;
                    bLogoEl.style.display = 'block';
                }
            }

            // Redireccionar al Dashboard si está inactivo o tiene pagos pendientes (Opción 3)
            const isInactive = client.status === 'inactive';
            const isUnpaid = client.paymentStatus !== 'paid' || client.status === 'unpaid';
            if (isInactive || isUnpaid) {
                window.location.replace('client-dashboard.html');
                return;
            }

            if (brand && brand.clientSettings && brand.clientSettings.showHabits === false) {
                window.location.replace('client-dashboard.html');
                return;
            }

            if (brand && brand.clientSettings && brand.clientSettings.showWeightHabit === false) {
                const cardWeight = document.getElementById('card-weight');
                if (cardWeight) cardWeight.style.display = 'none';
                const filterWeight = document.getElementById('f-weight');
                if (filterWeight) filterWeight.style.display = 'none';
            }

            // Date Display
            try {
                updateDateLabel(selectedDate);
                renderDaySelector();
            } catch(e) { console.warn('Error setting habits date label:', e); }

            loadHabits(selectedDate);
        });

        function loadHabits(dateStr = selectedDate) {
            const h = Habits.getByDate(clientId, dateStr) || { water: 0, steps: 0, sleep: 0, weight: 0 };
            document.getElementById('val-water').innerHTML = `${h.water.toFixed(1)} <span class="habit-unit">L</span>`;
            document.getElementById('val-steps').textContent = h.steps.toLocaleString();
            document.getElementById('val-sleep').innerHTML = `${h.sleep.toFixed(1)} <span class="habit-unit">h</span>`;
            document.getElementById('val-weight').innerHTML = `${h.weight ? Math.round(parseFloat(h.weight) * 100) / 100 : 0} <span class="habit-unit">kg</span>`;
        }

        window.setHabitFilter = function(filter) {
            currentHabitFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('f-' + filter).classList.add('active');
            loadHistory();
        }

        window.setPeriodFilter = function(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('p-' + period).classList.add('active');
            document.getElementById('periodLabel').textContent = `Últimos ${period} días`;
            loadHistory();
        }

        window.switchTab = function(tab) {
            if (tab === 'today') {
                document.getElementById('section-today').style.display = 'block';
                document.getElementById('section-history').style.display = 'none';
                document.getElementById('tab-today').className = 'btn btn-sm active-tab';
                document.getElementById('tab-today').style.background = 'rgba(var(--primary-color-rgb), 0.2)';
                document.getElementById('tab-today').style.color = 'var(--primary-color)';
                document.getElementById('tab-history').style.background = 'transparent';
                document.getElementById('tab-history').style.color = 'var(--text-muted)';
            } else {
                document.getElementById('section-today').style.display = 'none';
                document.getElementById('section-history').style.display = 'block';
                document.getElementById('tab-history').style.background = 'rgba(var(--primary-color-rgb), 0.2)';
                document.getElementById('tab-history').style.color = 'var(--primary-color)';
                document.getElementById('tab-today').style.background = 'transparent';
                document.getElementById('tab-today').style.color = 'var(--text-muted)';
                loadHistory();
            }
        }

        function loadHistory() {
            const client = Clients.getById(clientId);
            if (client) {
                const avatar = document.getElementById('clientProfileAvatar');
                if (avatar) {
                    if (client.profilePhoto) {
                        avatar.innerHTML = `<img src="${client.profilePhoto}" style="width:100%;height:100%;object-fit:cover;">`;
                        avatar.style.background = 'transparent';
                    } else {
                        avatar.textContent = client.name.charAt(0).toUpperCase();
                        avatar.style.background = 'var(--primary-color)';
                    }
                }
            }
            const allHistory = Habits.getByClientId(clientId);
            const history = allHistory.slice(-currentPeriod).reverse();
            const container = document.getElementById('historyList');
            
            if (history.length === 0) {
                container.innerHTML = '<div class="text-center py-xl text-muted">No hay registros para este periodo.</div>';
                document.getElementById('overallStatusText').textContent = 'Se necesitan registros diarios.';
                return;
            }

            // Averages
            let sumWater = 0, sumSteps = 0, sumSleep = 0, sumWeight = 0;
            let weightDaysCount = 0;
            history.forEach(day => {
                sumWater += (day.water || 0);
                sumSteps += (day.steps || 0);
                sumSleep += (day.sleep || 0);
                if (day.weight) {
                    sumWeight += day.weight;
                    weightDaysCount++;
                }
            });

            const avgWater = sumWater / history.length;
            const avgSteps = sumSteps / history.length;
            const avgSleep = sumSleep / history.length;
            const avgWeight = weightDaysCount > 0 ? (sumWeight / weightDaysCount) : 0;

            const badge = document.getElementById('overallStatusBadge');
            const text = document.getElementById('overallStatusText');
            const mini = document.getElementById('miniStatsRow');

            let isFavorable = false;
            
            if (currentHabitFilter === 'all') {
                isFavorable = avgWater >= 1.5 && avgSteps >= 6000 && avgSleep >= 6.5;
                text.innerHTML = isFavorable ? '✨ Tus promedios generales son excelentes.' : '💪 Puedes mejorar la constancia en tus hábitos.';
                const showWeight = !(brand.clientSettings && brand.clientSettings.showWeightHabit === false);
                mini.innerHTML = `<span>💧 ${avgWater.toFixed(1)}L</span> <span>👟 ${Math.round(avgSteps)}</span> <span>😴 ${avgSleep.toFixed(1)}h</span>${(showWeight && avgWeight > 0) ? ` <span>⚖️ ${Math.round(avgWeight * 100) / 100}kg</span>` : ''}`;
            } else if (currentHabitFilter === 'water') {
                isFavorable = avgWater >= 2;
                text.innerHTML = `Promedio diario: <span style="color:#00d9ff">${avgWater.toFixed(1)}L</span>`;
                mini.innerHTML = isFavorable ? '🎯 ¡Nivel de hidratación ideal!' : '🥛 Deberías beber un poco más.';
            } else if (currentHabitFilter === 'steps') {
                isFavorable = avgSteps >= 8000;
                text.innerHTML = `Promedio diario: <span style="color:#4CAF50">${Math.round(avgSteps)}</span> pasos`;
                mini.innerHTML = isFavorable ? '🏃‍♂️ ¡Mantienes un gran ritmo!' : '🚶‍♂️ Intenta caminar un poco más.';
            } else if (currentHabitFilter === 'sleep') {
                isFavorable = avgSleep >= 7.5;
                text.innerHTML = `Promedio diario: <span style="color:#9C27B0">${avgSleep.toFixed(1)}h</span>`;
                mini.innerHTML = isFavorable ? '🛌 ¡Tu descanso es de calidad!' : '😴 Intenta regularizar tus horas de sueño.';
            } else if (currentHabitFilter === 'weight') {
                isFavorable = true;
                text.innerHTML = avgWeight > 0 ? `Peso promedio: <span style="color:#FF9800">${Math.round(avgWeight * 100) / 100} kg</span>` : 'Sin registros de peso en este periodo.';
                mini.innerHTML = avgWeight > 0 ? '⚖️ Monitorear tu peso a diario te ayuda a ver tendencias.' : '⚖️ Registra tu peso diario para ver el promedio.';
            }

            badge.className = `badge ${isFavorable ? 'badge-success' : 'badge-error'}`;
            badge.textContent = isFavorable ? 'Favorable' : 'A mejorar';
            badge.style.background = isFavorable ? '#4CAF50' : '#FF9800';

            container.innerHTML = history.map(day => {
                let dayName = '';
                try {
                    if (window.safeLocaleDateString) {
                        dayName = window.safeLocaleDateString(new Date(day.date), { weekday: 'short', day: 'numeric' });
                    } else {
                        dayName = new Date(day.date).toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric' });
                    }
                } catch(e) {
                    dayName = day.date;
                }
                let detail = '';
                if (currentHabitFilter === 'all') {
                    const showWeight = !(brand.clientSettings && brand.clientSettings.showWeightHabit === false);
                    detail = `<div class="flex gap-sm"><span>💧${(day.water || 0).toFixed(1)}</span> <span>👟${day.steps || 0}</span> <span>😴${(day.sleep || 0).toFixed(1)}h</span>${(showWeight && day.weight) ? ` <span>⚖️${Math.round(day.weight * 100) / 100}kg</span>` : ''}</div>`;
                } else {
                    let val = 0, target = 1, color = '#fff';
                    if (currentHabitFilter === 'water') { val = day.water || 0; target = 3; color = '#00d9ff'; }
                    else if (currentHabitFilter === 'steps') { val = day.steps || 0; target = 12000; color = '#4CAF50'; }
                    else if (currentHabitFilter === 'sleep') { val = day.sleep || 0; target = 10; color = '#9C27B0'; }
                    else if (currentHabitFilter === 'weight') { val = day.weight || 0; target = 150; color = '#FF9800'; }
                    
                    if (currentHabitFilter === 'weight') {
                        detail = `
                            <div class="flex align-center gap-md">
                                <span style="font-weight:700; color:${color}; min-width:35px; text-align:right;">${val > 0 ? (Math.round(val * 100) / 100) + ' kg' : '---'}</span>
                            </div>
                        `;
                    } else {
                        const pct = Math.min(100, (val / target) * 100);
                        detail = `
                            <div class="flex align-center gap-md">
                                <div class="progress-bar-mini"><div style="width:${pct}%; background:${color};"></div></div>
                                <span style="font-weight:700; color:${color}; min-width:35px; text-align:right;">${currentHabitFilter === 'steps' ? val : (currentHabitFilter === 'weight' ? Math.round(val * 100) / 100 : val.toFixed(1))}</span>
                            </div>
                        `;
                    }
                }

                return `
                    <div class="flex-between py-md" style="border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center;">
                        <div style="flex: 1;">
                            <div style="font-weight: 600; font-size: 0.95rem; text-transform: capitalize; color:#fff;">${dayName}</div>
                            <div class="text-xs text-muted" style="opacity: 0.5;">${day.date}</div>
                        </div>
                        <div style="flex: 2; display: flex; justify-content: flex-end;">
                            ${detail}
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.openHabitModal = function(type) {
            const h = Habits.getByDate(clientId, selectedDate) || { water: 0, steps: 0, sleep: 0, weight: 0 };
            let title = '', icon = '', unit = '', current = 0, step = 1;

            if (type === 'water') { title = 'Agua'; icon = '💧'; unit = 'Litros'; current = h.water; step = 0.5; }
            else if (type === 'steps') { title = 'Pasos'; icon = '👟'; unit = 'Pasos'; current = h.steps; step = 500; }
            else if (type === 'sleep') { title = 'Sueño'; icon = '😴'; unit = 'Horas'; current = h.sleep; step = 0.5; }
            else if (type === 'weight') {
                title = 'Peso';
                icon = '⚖️';
                unit = 'kg';
                const client = typeof Clients !== 'undefined' ? Clients.getById(clientId) : null;
                const lastRegisteredWeight = (() => {
                    const allHistory = Habits.getByClientId(clientId).filter(day => day.weight > 0);
                    if (allHistory.length > 0) {
                        return allHistory[allHistory.length - 1].weight;
                    }
                    return null;
                })();
                current = h.weight || lastRegisteredWeight || (client && client.technicalData && client.technicalData.weight) || 70;
                step = 0.1;
            }

            let extraUI = '';
            if (type === 'steps') {
                extraUI = `
                    <div style="display: flex; gap: 8px; justify-content: center; margin-top: 15px;">
                        <button class="btn btn-outline" style="font-size:0.75rem; padding: 6px 12px; height: auto;" onclick="window.adjustHabitValue(1000)">+1K</button>
                        <button class="btn btn-outline" style="font-size:0.75rem; padding: 6px 12px; height: auto;" onclick="window.adjustHabitValue(5000)">+5K</button>
                        <button class="btn btn-outline" style="font-size:0.75rem; padding: 6px 12px; height: auto;" onclick="window.adjustHabitValue(10000)">+10K</button>
                    </div>
                `;
            } else if (type === 'weight') {
                extraUI = `
                    <div style="display: flex; gap: 8px; justify-content: center; margin-top: 15px; flex-wrap: wrap;">
                        <button class="btn btn-outline" style="font-size:0.75rem; padding: 6px 12px; height: auto;" onclick="window.adjustHabitValue(-1)">-1 kg</button>
                        <button class="btn btn-outline" style="font-size:0.75rem; padding: 6px 12px; height: auto;" onclick="window.adjustHabitValue(-0.5)">-0.5 kg</button>
                        <button class="btn btn-outline" style="font-size:0.75rem; padding: 6px 12px; height: auto;" onclick="window.adjustHabitValue(0.5)">+0.5 kg</button>
                        <button class="btn btn-outline" style="font-size:0.75rem; padding: 6px 12px; height: auto;" onclick="window.adjustHabitValue(1)">+1 kg</button>
                    </div>
                `;
            }

            const formattedDay = new Date(selectedDate.split('-')[0], selectedDate.split('-')[1] - 1, selectedDate.split('-')[2]).toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });

            const content = `
                <div style="text-align: center; padding: 10px;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">${icon}</div>
                    <h3 style="margin-bottom: 20px;">Registrar ${title} (${formattedDay})</h3>
                    <div style="background: rgba(var(--primary-color-rgb), 0.05); padding: 25px; border-radius: 15px; border: 1px solid rgba(var(--primary-color-rgb), 0.1); margin-bottom: 20px;">
                        <label class="text-xs text-muted uppercase block mb-md">Cantidad actual</label>
                        <div style="display: flex; align-items: center; justify-content: center; gap: 20px;">
                            <button class="btn btn-outline" style="width: 50px; height: 50px; font-size: 1.5rem; border-radius: 50%; padding:0;" onclick="window.adjustHabitValue(-${step})">-</button>
                            <input type="number" id="habitInput" class="form-input text-center" style="font-size: 2rem; width: 140px; background: transparent; border: none; font-weight: 800; color: var(--primary-color);" value="${current}" step="${step}">
                            <button class="btn btn-outline" style="width: 50px; height: 50px; font-size: 1.5rem; border-radius: 50%; padding:0;" onclick="window.adjustHabitValue(${step})">+</button>
                        </div>
                        <div class="text-muted mt-sm">${unit}</div>
                        ${extraUI}
                    </div>
                </div>
            `;

            window.adjustHabitValue = (val) => {
                const input = document.getElementById('habitInput');
                let cur = parseFloat(input.value) || 0;
                input.value = Math.max(0, cur + val);
            };

            window.showModal(title, content, [
                { text: 'Cancelar', class: 'btn-outline', onclick: 'window.closeModal()' },
                { text: 'Guardar', class: 'btn-primary', onclick: `window.saveHabit('${type}')` }
            ]);
        }

        window.saveHabit = async function(type) {
            const val = parseFloat(document.getElementById('habitInput').value) || 0;
            const h = Habits.getByDate(clientId, selectedDate) || { water: 0, steps: 0, sleep: 0, weight: 0 };
            h[type] = val;
            Habits.save(clientId, h, selectedDate);
            loadHabits(selectedDate);
            window.closeModal();

            // Sincronizar con Supabase garantizado
            const _tid = window.activeTrainerId || localStorage.getItem('activeTrainerId');
            if (window.SupabaseService && _tid && _tid !== 'default' && _tid !== 'admin') {
                try {
                    window.SupabaseService.init();
                    await window.SupabaseService.saveTrainerData(_tid, window.getData());
                    console.log('✅ Hábito sincronizado con Supabase');
                } catch(e) { console.warn('Supabase sync error (habit):', e); }
            }

            showToast('¡Registro guardado!', 'success');
        }


    </script>
    <script src="js/custom-recipes.js?v=528"></script></body>
